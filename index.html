<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIGNORDESTE ANALYTICS</title>
<style>
:root{--bg:#f5f6f8;--ink:#20242a;--muted:#68707c;--line:#dfe3e8;--panel:#fff;--brand:#16603a;--gold:#d39b21;--bad:#b42318;--warn:#b76e00;--ok:#087443;--blue:#175cd3}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{background:#12201a;color:white;padding:18px 14px}.brand{padding:8px 10px 18px;border-bottom:1px solid #ffffff22}.brand b{display:block;font-size:18px}.brand span{font-size:12px;color:#b9c4be}nav{display:grid;gap:4px;margin-top:16px}nav button{border:0;background:transparent;color:#d7ded9;text-align:left;padding:11px 12px;border-radius:8px;cursor:pointer}nav button.active,nav button:hover{background:#ffffff1c;color:white}main{padding:22px;min-width:0}header{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}h1{font-size:24px;margin:0 0 5px}.sub{color:var(--muted);font-size:14px}.filters,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.filters{justify-content:flex-end}select,input,textarea{border:1px solid var(--line);background:white;border-radius:7px;padding:9px 10px;min-height:38px;font:inherit}textarea{min-height:38px;resize:vertical}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(150px,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 10px 26px #20242a12}.card{padding:15px;min-height:92px}.label{font-size:12px;text-transform:uppercase;font-weight:800;color:var(--muted)}.value{font-size:24px;font-weight:850;margin-top:8px}.hint{font-size:12px;color:var(--muted);margin-top:5px}.panel{padding:16px}.panel h2{font-size:16px;margin:0 0 12px}.barrow{display:grid;grid-template-columns:minmax(170px,1fr) 100px;gap:10px;align-items:center;margin:10px 0;font-size:13px}.track{height:9px;background:#edf0f3;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--gold))}.table{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#fafbfc;color:var(--muted);font-size:11px;text-transform:uppercase;position:sticky;top:0}.pill{display:inline-flex;border-radius:99px;padding:4px 8px;font-size:12px;font-weight:800}.ok{background:#dcfae6;color:var(--ok)}.warn{background:#fef0c7;color:var(--warn)}.bad{background:#fee4e2;color:var(--bad)}.info{background:#dbeafe;color:var(--blue)}.btn{border:1px solid var(--line);background:white;border-radius:7px;padding:9px 12px;font-weight:800;cursor:pointer}.primary{background:var(--brand);border-color:var(--brand);color:white}.danger{background:var(--bad);border-color:var(--bad);color:white}.drop{border:1.5px dashed #a8b0b9;border-radius:8px;background:#fbfcfd;padding:18px;display:grid;gap:10px}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.preview{white-space:pre;overflow:auto;max-height:180px;background:#111827;color:#e5e7eb;padding:12px;border-radius:8px;font-size:12px}.mt{margin-top:14px}.muted{color:var(--muted)}.alert{border-left:4px solid var(--blue);background:white;border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:12px;margin:10px 0}.alert.bad{border-left-color:var(--bad)}.alert.warn{border-left-color:var(--warn)}.alert.ok{border-left-color:var(--ok)}@media(max-width:980px){.app{grid-template-columns:1fr}header{display:grid}.cards,.two,.three,.row{grid-template-columns:1fr}.filters{justify-content:flex-start}}
</style>
</head>
<body><div class="app"><aside><div class="brand"><b>BIGNORDESTE</b><span>ANALYTICS</span></div><nav id="nav"></nav></aside><main><header><div><h1 id="title"></h1><div id="sub" class="sub"></div></div><div class="filters"><select id="fLoja"></select><select id="fRegiao"></select><input id="fMes" type="month" value="2026-01"><select id="fCamp"></select></div></header><section id="view"></section></main></div>
<script>
const brlFmt=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}),numFmt=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:2});
const brl=v=>brlFmt.format(+v||0), num=v=>numFmt.format(+v||0), pct=v=>num(v)+'%';
const TYPE_LABEL={resumo_geral_loja:'Resumo geral da loja',campanhas_ofertas:'Campanhas / ofertas',produtos_campanha:'Produtos por campanha',departamentos_campanha:'Departamentos por campanha',cupons_totais:'Cupons totais'};
const TYPE_CFG={
 resumo_geral_loja:{bucket:'resumos',required:['loja','mes','venda_total','custo_total','lucro_total','margem_total','cupons_totais','unidades_totais']},
 campanhas_ofertas:{bucket:'campanhasDados',required:['loja','mes','id_tipooferta','descricao','venda','custo','lucro','margem','quantidade','itens','produtos_distintos','cupons','ticket_medio','preco_medio']},
 produtos_campanha:{bucket:'produtos',required:['loja','mes','id_tipooferta','campanha','id_produto','descricao_produto','quantidade','venda','lucro','margem']},
 departamentos_campanha:{bucket:'departamentos',required:['loja','mes','id_tipooferta','campanha','mercadologico1','descricao_departamento','produtos','quantidade','venda','lucro','margem']},
 cupons_totais:{bucket:'cuponsDados',required:['loja','mes','cupons_totais','campanha','cupons_campanha']}
};
const pages=[['dashboard','Dashboard'],['importacoes','Importacoes'],['consolidacao','Consolidacao 27 Lojas'],['lojas','Lojas'],['campanhas','Campanhas'],['loja','Analise por Loja'],['regiao','Analise por Regiao'],['departamentos','Departamentos'],['produtos','Produtos'],['relatorio','Relatorio Executivo']];
function seed(){let lojas=Array.from({length:27},(_,i)=>({codigo:String(i+1).padStart(2,'0'),nome:'Loja '+String(i+1).padStart(2,'0'),regiao:['Natal','Agreste','Sertao','Litoral'][i%4],cidade:['Natal','Parnamirim','Mossoro','Caico'][i%4],uf:'RN',status:'Ativa'}));let campanhas=['ENCARTE BIG NORDESTE','FDS DE OFERTAS','DIA BIG','SEMANA DE OFERTAS'].map((c,i)=>({id_tipooferta:String(101+i),descricao:c,categoria:['Encarte','Fim de semana','Dia especial','Semanal'][i],ativo:true}));let resumos=[{loja:'Loja 01',mes:'2026-01',venda_total:3042701.83,custo_total:2650820.21,lucro_total:391881.62,margem_total:12.88,cupons_totais:62761,unidades_totais:489300}];let base=[['101','ENCARTE BIG NORDESTE',299097.59,261096.59,38000.99,12.71,53375.052,690,515,10031,29.82,5.60],['102','FDS DE OFERTAS',227879.06,192757.28,35121.78,15.41,39124.8,490,348,8210,27.76,5.82],['103','DIA BIG',200699.76,196485.06,4214.70,2.10,42008.4,430,290,11880,16.89,4.78],['104','SEMANA DE OFERTAS',115847.15,96654.37,19192.78,16.57,18142.2,260,184,5138,22.55,6.39]];
let campanhasDados=base.map(r=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:r[0],descricao:r[1],venda:r[2],custo:r[3],lucro:r[4],margem:r[5],quantidade:r[6],itens:r[7],produtos_distintos:r[8],cupons:r[9],ticket_medio:r[10],preco_medio:r[11]}));let departamentos=[['PERECIVEIS',157302.07,19000,11.9,180,28842],['MERCEARIA DOCE',55296.63,7800,14.1,92,8410],['MERCEARIA SECA',28305.68,4120,14.6,66,5122],['MERCEARIA SALGADA',25518.11,3650,14.3,58,4210],['LIMPEZA',15494.38,2850,18.4,47,2198],['PERFUMARIA',12717.82,2050,16.1,38,1493],['BEBIDAS',3262.89,-210,-6.4,34,950]].map((d,i)=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',mercadologico1:String(i+1),descricao_departamento:d[0],venda:d[1],lucro:d[2],margem:d[3],produtos:d[4],quantidade:d[5]}));
let produtos=Array.from({length:36},(_,i)=>{let venda=[24800,21400,18600,15100,13800,12100,9900,8700,7200,6100][i]||Math.max(800,5400-i*120),m=i==4?-3.2:(i%7==0?5.4:8+i%9);return{loja:'Loja 01',mes:'2026-01',id_tipooferta:i<24?'101':'102',campanha:i<24?'ENCARTE BIG NORDESTE':'FDS DE OFERTAS',id_produto:'P'+(1000+i),descricao_produto:'Produto promocional '+String(i+1).padStart(2,'0'),quantidade:900-i*13,venda,lucro:venda*m/100,margem:m}});let cuponsDados=campanhasDados.map(c=>({loja:c.loja,mes:c.mes,cupons_totais:62761,campanha:c.descricao,cupons_campanha:c.cupons}));return{lojas,campanhas,resumos,campanhasDados,departamentos,produtos,cuponsDados,importacoes:[]}}
let db=JSON.parse(localStorage.getItem('bignordeste.analytics.v2')||localStorage.getItem('bignordeste.analytics')||'null')||seed();db.resumos??=db.resumo||[];db.campanhasDados??=db.resultados||[];db.cuponsDados??=db.cupons||[];db.importacoes??=[];let page='dashboard';function save(){localStorage.setItem('bignordeste.analytics.v2',JSON.stringify(db))}
function filters(){return{loja:fLoja.value,regiao:fRegiao.value,mes:fMes.value,camp:fCamp.value}}function lojaRegiao(nome){return db.lojas.find(l=>l.nome==nome)?.regiao||''}
function inFilter(r){let f=filters();return(f.loja=='Todas'||r.loja==f.loja)&&(!f.mes||r.mes==f.mes)&&(f.camp=='Todas'||r.descricao==f.camp||r.campanha==f.camp)&&(f.regiao=='Todas'||lojaRegiao(r.loja)==f.regiao)}
function campRows(){return db.campanhasDados.filter(inFilter).map(calcCamp)}function resumo(loja,mes){return db.resumos.find(r=>r.loja==loja&&r.mes==mes)||{loja,mes,venda_total:0,cupons_totais:0}}
function cuponsCamp(loja,mes,camp){let x=db.cuponsDados.find(c=>c.loja==loja&&c.mes==mes&&c.campanha==camp);return{x:+(x?.cupons_campanha)||0,total:+(x?.cupons_totais)||0}}
function calcCamp(r){let re=resumo(r.loja,r.mes),cp=cuponsCamp(r.loja,r.mes,r.descricao),cupons=+r.cupons||cp.x,totalCup=+re.cupons_totais||cp.total,part=re.venda_total?+r.venda/re.venda_total*100:0,pen=totalCup?cupons/totalCup*100:0,q=+r.quantidade||0,prod=+r.produtos_distintos||0,lucro=+r.lucro||0,venda=+r.venda||0;return{...r,venda,lucro,cupons,participacao:part,penetracao:pen,ticket_medio:+r.ticket_medio|| (cupons?venda/cupons:0),preco_medio:+r.preco_medio||(q?venda/q:0),lucro_cupom:cupons?lucro/cupons:0,venda_produto:prod?venda/prod:0,lucro_produto:prod?lucro/prod:0,indice_forca:part*pen,indice_eficiencia:part*(+r.margem||0)}}
function totals(rs=campRows()){let venda=rs.reduce((s,r)=>s+r.venda,0),lucro=rs.reduce((s,r)=>s+r.lucro,0),cupons=rs.reduce((s,r)=>s+r.cupons,0),f=filters(),res=db.resumos.filter(r=>(f.loja=='Todas'||r.loja==f.loja)&&r.mes==f.mes&&(f.regiao=='Todas'||lojaRegiao(r.loja)==f.regiao));let vendaTotal=res.reduce((s,r)=>s+(+r.venda_total||0),0),cuponsTotal=res.reduce((s,r)=>s+(+r.cupons_totais||0),0);return{vendaTotal,venda,lucro,cupons,cuponsTotal,margem:venda?lucro/venda*100:0,participacao:vendaTotal?venda/vendaTotal*100:0,penetracao:cuponsTotal?cupons/cuponsTotal*100:0}}
function card(a,b,c){return`<div class="card"><div class="label">${a}</div><div class="value">${b}</div><div class="hint">${c}</div></div>`}function cards(t){return`<div class="grid cards">${card('Venda total',brl(t.vendaTotal),'Base loja/mes')}${card('Venda promocional',brl(t.venda),'Ofertas importadas')}${card('Participacao ofertas',pct(t.participacao),'Promocional / total')}${card('Lucro promocional',brl(t.lucro),'Resultado absoluto')}${card('Margem promocional',pct(t.margem),'Lucro / venda')}${card('Cupons totais',num(t.cuponsTotal),'Movimento')}${card('Cupons impactados',num(t.cupons),'Campanhas')}${card('Penetracao',pct(t.penetracao),'Cupons campanha / total')}</div>`}
function bars(title,rs,val,format=brl){let max=Math.max(1,...rs.map(val));return`<div class="panel"><h2>${title}</h2>${rs.slice(0,12).map(r=>`<div class="barrow"><div><b>${r.descricao||r.campanha||r.loja||r.regiao||r.descricao_departamento}</b><div class="track"><div class="fill" style="width:${Math.max(3,val(r)/max*100)}%"></div></div></div><div>${format(val(r))}</div></div>`).join('')}</div>`}
function campTable(rs){return`<div class="table"><table><thead><tr><th>Loja</th><th>Campanha</th><th>Venda</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Cupons</th><th>Pen.</th><th>Ticket</th><th>Preco</th><th>Lucro/cupom</th><th>Venda/prod.</th><th>Lucro/prod.</th><th>Forca</th><th>Eficiencia</th></tr></thead><tbody>${rs.map(r=>`<tr><td>${r.loja}</td><td><b>${r.descricao}</b></td><td>${brl(r.venda)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${num(r.cupons)}</td><td>${pct(r.penetracao)}</td><td>${brl(r.ticket_medio)}</td><td>${brl(r.preco_medio)}</td><td>${brl(r.lucro_cupom)}</td><td>${brl(r.venda_produto)}</td><td>${brl(r.lucro_produto)}</td><td>${num(r.indice_forca)}</td><td>${num(r.indice_eficiencia)}</td></tr>`).join('')}</tbody></table></div>`}
function dashboard(){let rs=campRows().sort((a,b)=>b.venda-a.venda);return cards(totals(rs))+`<div class="grid two mt">${bars('Ranking por venda',rs,r=>r.venda)}${bars('Ranking por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>r.lucro)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Ranking por penetracao',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}</div><div class="panel mt"><h2>Comparativo de campanhas</h2>${campTable(rs)}</div>`}
function importacoes(){return`<div class="panel"><div class="toolbar"><h2>Importacao real por tipo</h2><button class="btn" onclick="template()">Baixar cabecalho modelo</button><button class="btn danger" onclick="clearImports()">Limpar dados importados</button></div><div class="drop"><div class="row"><select id="il">${db.lojas.map(l=>`<option>${l.nome}</option>`).join('')}</select><input id="im" type="month" value="${fMes.value||'2026-01'}"><select id="it" onchange="showReq()">${Object.keys(TYPE_CFG).map(k=>`<option value="${k}">${TYPE_LABEL[k]}</option>`).join('')}</select><textarea id="io" placeholder="Observacao obrigatoria"></textarea></div><input id="files" type="file" accept=".txt" multiple><div id="req" class="muted"></div><pre id="prev" class="preview" style="display:none"></pre><div id="ir"></div><button class="btn primary" onclick="processImport()">Importar arquivo(s)</button></div></div><div class="panel mt"><h2>Historico de importacoes</h2>${history()}</div>`}
function history(){return db.importacoes.length?`<div class="table"><table><tr><th>Data/hora</th><th>Arquivo</th><th>Loja</th><th>Mes</th><th>Tipo</th><th>Linhas</th><th>Observacao</th></tr>${db.importacoes.map(i=>`<tr><td>${i.data}</td><td>${i.arquivo}</td><td>${i.loja}</td><td>${i.mes}</td><td>${TYPE_LABEL[i.tipo]||i.tipo}</td><td>${i.linhas}</td><td>${i.observacao}</td></tr>`).join('')}</table></div>`:'<p class="muted">Nenhum arquivo importado ainda.</p>'}
function showReq(){if(window.req)req.innerHTML='<b>Colunas obrigatorias:</b> '+TYPE_CFG[it.value].required.join('; ')}function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}function parseNum(v){if(v==null||String(v).trim()==='')return'';let s=String(v).trim();if(/^[-+]?\d{1,3}(\.\d{3})+,\d+$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');let n=Number(s);return Number.isFinite(n)?n:v}
async function readText(file){let buf=await file.arrayBuffer(),text=new TextDecoder('utf-8').decode(buf);if(text.includes('\uFFFD'))text=new TextDecoder('iso-8859-1').decode(buf);return text.replace(/^\uFEFF/,'')}
function parseTxt(text){let lines=text.split(/\r?\n/).filter(x=>x.trim()),head=lines[0].split(';').map(norm);let rows=lines.slice(1).map(line=>{let cells=line.split(';');return Object.fromEntries(head.map((h,i)=>[h,parseNum(cells[i]??'')]))});return{head,rows,preview:lines.slice(0,8).join('\n')}}
async function processImport(){let fs=[...files.files],loja=il.value,mes=im.value,tipo=it.value,obs=io.value.trim();if(!loja||!mes||!tipo||!obs){ir.innerHTML='<span class="pill bad">Informe loja, mes/ano, tipo de arquivo e observacao.</span>';return}if(!fs.length||fs.some(f=>!f.name.toLowerCase().endsWith('.txt'))){ir.innerHTML='<span class="pill bad">Importe somente arquivos .txt.</span>';return}let total=0,errors=[];for(let f of fs){let parsed=parseTxt(await readText(f)),missing=TYPE_CFG[tipo].required.filter(c=>!parsed.head.includes(c));prev.style.display='block';prev.textContent=parsed.preview;if(missing.length){errors.push(`${f.name}: colunas ausentes ${missing.join(', ')}`);continue}let rows=parsed.rows.map(r=>({...r,loja:loja,mes:mes}));saveRows(tipo,rows,loja,mes);db.importacoes.unshift({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,mes,tipo,linhas:rows.length,observacao:obs});total+=rows.length}save();setupFilters();ir.innerHTML=errors.length?`<div class="alert bad">${errors.join('<br>')}</div>`:`<span class="pill ok">${fs.length} arquivo(s), ${total} linhas importadas.</span>`;render()}
function saveRows(tipo,rows,loja,mes){let b=TYPE_CFG[tipo].bucket;db[b]=db[b].filter(r=>!(r.loja==loja&&r.mes==mes&&r.__tipo==tipo)).concat(rows.map(r=>({...r,__tipo:tipo,__importado:true})));if(tipo=='campanhas_ofertas'){rows.forEach(r=>{if(!db.campanhas.some(c=>c.id_tipooferta==String(r.id_tipooferta)))db.campanhas.push({id_tipooferta:String(r.id_tipooferta),descricao:r.descricao,categoria:'Importada',ativo:true})})}}
function template(){let tipo=it?.value||'resumo_geral_loja',blob=new Blob([TYPE_CFG[tipo].required.join(';')+'\n'],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=tipo+'.txt';a.click();URL.revokeObjectURL(a.href)}function clearImports(){if(confirm('Limpar historico e dados importados, mantendo mock inicial?')){db=seed();save();setupFilters();render()}}
function consolidacao(){let rs=consolidated();return`<div class="grid two">${bars('Ranking por venda promocional',rs,r=>r.vendaProm)}${bars('Ranking por participacao das ofertas',[...rs].sort((a,b)=>b.participacao-a.participacao),r=>r.participacao,pct)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Ranking por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>r.lucro)}${bars('Ranking por penetracao',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}${bars('Ranking por indice de forca',[...rs].sort((a,b)=>b.indice_forca-a.indice_forca),r=>r.indice_forca,v=>num(v))}</div><div class="panel mt"><h2>Consolidacao mensal das 27 lojas</h2><div class="table"><table><tr><th>Loja</th><th>Regiao</th><th>Venda total</th><th>Venda promocional</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Pen.</th><th>Forca</th></tr>${rs.map(r=>`<tr><td><b>${r.loja}</b></td><td>${r.regiao}</td><td>${brl(r.vendaTotal)}</td><td>${brl(r.vendaProm)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(r.penetracao)}</td><td>${num(r.indice_forca)}</td></tr>`).join('')}</table></div></div>`}
function consolidated(){let f=filters();return db.lojas.map(l=>{let rs=db.campanhasDados.filter(r=>r.loja==l.nome&&(!f.mes||r.mes==f.mes)).map(calcCamp),re=resumo(l.nome,f.mes),v=rs.reduce((s,r)=>s+r.venda,0),luc=rs.reduce((s,r)=>s+r.lucro,0),cup=rs.reduce((s,r)=>s+r.cupons,0),part=re.venda_total?v/re.venda_total*100:0,pen=re.cupons_totais?cup/re.cupons_totais*100:0;return{loja:l.nome,regiao:l.regiao,vendaTotal:+re.venda_total||0,vendaProm:v,lucro:luc,margem:v?luc/v*100:0,participacao:part,penetracao:pen,indice_forca:part*pen}}).filter(r=>filters().regiao=='Todas'||r.regiao==filters().regiao).sort((a,b)=>b.vendaProm-a.vendaProm)}
function lojas(){return`<div class="panel"><h2>Cadastro de lojas</h2><div class="table"><table><tr><th>Codigo</th><th>Nome</th><th>Regiao</th><th>Cidade</th><th>UF</th><th>Status</th></tr>${db.lojas.map(l=>`<tr><td>${l.codigo}</td><td><b>${l.nome}</b></td><td>${l.regiao}</td><td>${l.cidade}</td><td>${l.uf}</td><td><span class="pill ok">${l.status}</span></td></tr>`).join('')}</table></div></div>`}
function campanhas(){return`<div class="panel"><h2>Campanhas cadastradas/importadas</h2><div class="table"><table><tr><th>ID tipo oferta</th><th>Descricao</th><th>Categoria</th><th>Status</th></tr>${db.campanhas.map(c=>`<tr><td>${c.id_tipooferta}</td><td><b>${c.descricao}</b></td><td>${c.categoria}</td><td><span class="pill ok">Ativa</span></td></tr>`).join('')}</table></div></div>`}
function loja(){let rs=campRows().sort((a,b)=>b.venda-a.venda),deps=db.departamentos.filter(inFilter);return cards(totals(rs))+`<div class="grid two mt">${bars('Campanhas que mais vendem',rs,r=>r.venda)}${bars('Campanhas com maior margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Campanhas com maior alcance',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}${bars('Departamentos que sustentam ofertas',deps.sort((a,b)=>b.venda-a.venda),r=>r.venda)}</div>`}
function regiao(){let data={};consolidated().forEach(r=>{data[r.regiao]??={regiao:r.regiao,vendaProm:0,vendaTotal:0,lucro:0,pen:0,n:0};data[r.regiao].vendaProm+=r.vendaProm;data[r.regiao].vendaTotal+=r.vendaTotal;data[r.regiao].lucro+=r.lucro;data[r.regiao].pen+=r.penetracao;data[r.regiao].n++});let rs=Object.values(data).map(r=>({...r,participacao:r.vendaTotal?r.vendaProm/r.vendaTotal*100:0,margem:r.vendaProm?r.lucro/r.vendaProm*100:0,penetracao:r.n?r.pen/r.n:0}));return`<div class="grid two">${bars('Venda promocional por regiao',rs,r=>r.vendaProm)}${bars('Participacao por regiao',rs,r=>r.participacao,pct)}${bars('Margem por regiao',rs,r=>r.margem,pct)}${bars('Penetracao media por regiao',rs,r=>r.penetracao,pct)}</div>`}
function departamentos(){let rs=db.departamentos.filter(inFilter).sort((a,b)=>b.venda-a.venda),tot=rs.reduce((s,r)=>s+(+r.venda||0),0);return`<div class="grid two">${bars('Venda por departamento',rs,r=>+r.venda||0)}${bars('Margem por departamento',[...rs].sort((a,b)=>b.margem-a.margem),r=>+r.margem||0,pct)}</div><div class="panel mt"><h2>Departamentos</h2><div class="table"><table><tr><th>Loja</th><th>Departamento</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Participacao</th></tr>${rs.map(r=>`<tr><td>${r.loja}</td><td><b>${r.descricao_departamento}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(tot?r.venda/tot*100:0)}</td></tr>`).join('')}</table></div></div>`}
function produtos(){let rs=db.produtos.filter(inFilter).sort((a,b)=>b.venda-a.venda);return`<div class="grid three">${bars('Top produtos por venda',rs,r=>+r.venda||0)}${bars('Top produtos por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>+r.lucro||0)}${bars('Top produtos por quantidade',[...rs].sort((a,b)=>b.quantidade-a.quantidade),r=>+r.quantidade||0,v=>num(v))}</div><div class="panel mt"><h2>Produtos criticos</h2><div class="table"><table><tr><th>Produto</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Diagnostico</th></tr>${rs.map(r=>`<tr><td><b>${r.descricao_produto}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${r.margem<0?'<span class="pill bad">Margem negativa</span>':r.venda>10000&&r.margem<8?'<span class="pill warn">Alta venda e baixa margem</span>':'<span class="pill ok">Normal</span>'}</td></tr>`).join('')}</table></div></div>`}
function diagnostics(){let a=[];campRows().forEach(r=>{if(r.venda>180000&&r.margem<8)a.push(['bad',`${r.loja}: ${r.descricao} tem alta venda (${brl(r.venda)}) e margem baixa (${pct(r.margem)}).`]);if(r.penetracao>12&&r.ticket_medio<20)a.push(['warn',`${r.loja}: ${r.descricao} tem alta penetracao (${pct(r.penetracao)}) e ticket baixo (${brl(r.ticket_medio)}).`]);if(r.participacao<4&&r.margem>15)a.push(['ok',`${r.loja}: ${r.descricao} tem boa margem, mas baixa participacao.`])});db.produtos.filter(r=>inFilter(r)&&r.venda>10000&&r.margem<0).forEach(p=>a.push(['bad',`${p.loja}: ${p.descricao_produto} tem venda alta e margem negativa.`]));return a}
function relatorio(){let lojas=consolidated().filter(r=>r.vendaProm>0),camp=campRows(),reg={};lojas.forEach(l=>{reg[l.regiao]??={regiao:l.regiao,venda:0,lucro:0,n:0};reg[l.regiao].venda+=l.vendaProm;reg[l.regiao].lucro+=l.lucro;reg[l.regiao].n++});let al=diagnostics();return`<div class="grid two"><div class="panel"><h2>Resumo por loja</h2><div class="table"><table><tr><th>Loja</th><th>Venda prom.</th><th>Part.</th><th>Margem</th><th>Pen.</th></tr>${lojas.map(l=>`<tr><td>${l.loja}</td><td>${brl(l.vendaProm)}</td><td>${pct(l.participacao)}</td><td>${pct(l.margem)}</td><td>${pct(l.penetracao)}</td></tr>`).join('')}</table></div></div><div class="panel"><h2>Resumo por regiao</h2><div class="table"><table><tr><th>Regiao</th><th>Venda</th><th>Lucro</th><th>Lojas</th></tr>${Object.values(reg).map(r=>`<tr><td>${r.regiao}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${r.n}</td></tr>`).join('')}</table></div></div></div><div class="panel mt"><h2>Resumo por campanha</h2>${campTable(camp.sort((a,b)=>b.venda-a.venda))}</div><div class="panel mt"><h2>Alertas automaticos e oportunidades</h2>${al.map(x=>`<div class="alert ${x[0]}"><span class="pill ${x[0]}">${x[0]}</span><p>${x[1]}</p></div>`).join('')||'<p class="muted">Sem alertas para os filtros atuais.</p>'}</div>`}
function setupFilters(){let old=[fLoja.value,fRegiao.value,fCamp.value];fLoja.innerHTML='<option>Todas</option>'+db.lojas.map(l=>`<option>${l.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.lojas.map(l=>l.regiao))].map(r=>`<option>${r}</option>`).join('');let camps=[...new Set([...db.campanhasDados.map(r=>r.descricao),...db.produtos.map(r=>r.campanha),...db.departamentos.map(r=>r.campanha)].filter(Boolean))];fCamp.innerHTML='<option>Todas</option>'+camps.map(c=>`<option>${c}</option>`).join('');[fLoja.value,fRegiao.value,fCamp.value]=old;if(!fLoja.value)fLoja.value='Loja 01';if(!fRegiao.value)fRegiao.value='Todas';if(!fCamp.value)fCamp.value='Todas'}function go(p){page=p;render()}function render(){nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${l}</button>`).join('');let meta={dashboard:['Dashboard Executivo','Analise mensal calculada a partir dos arquivos importados.'],importacoes:['Importacoes','Importe multiplos TXT por loja, mes, tipo e observacao.'],consolidacao:['Consolidacao 27 Lojas','Ranking mensal por venda, margem, penetracao e forca.'],lojas:['Lojas','Cadastro das 27 lojas.'],campanhas:['Campanhas','Campanhas importadas ou cadastradas.'],loja:['Analise por Loja','Performance individual da loja selecionada.'],regiao:['Analise por Regiao','Comparativo consolidado por regiao.'],departamentos:['Departamentos','Setores que sustentam as ofertas.'],produtos:['Produtos','Produtos que carregam ou prejudicam campanhas.'],relatorio:['Relatorio Executivo','Resumo por loja, campanha, regiao e oportunidades.']}[page];title.textContent=meta[0];sub.textContent=meta[1];view.innerHTML=({dashboard,importacoes,consolidacao,lojas,campanhas,loja,regiao,departamentos,produtos,relatorio})[page]();if(page=='importacoes')showReq()}['fLoja','fRegiao','fMes','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));setupFilters();render();
</script></body></html>
