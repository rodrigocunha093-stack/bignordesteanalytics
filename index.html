function seed(){let empresas=Array.from({length:27},(_,i)=>({codigo:String(i+1).padStart(2,'0'),id_vr:String(i+1),nome:'Loja '+String(i+1).padStart(2,'0'),regiao:['Natal','Agreste','Sertao','Litoral'][i%4],cidade:['Natal','Parnamirim','Mossoro','Caico'][i%4],uf:'RN',status:'Ativa'}));let campanhas=['ENCARTE BIG NORDESTE','FDS DE OFERTAS','DIA BIG','SEMANA DE OFERTAS'].map((c,i)=>({id_tipooferta:String(101+i),descricao:c,categoria:['Encarte','Fim de semana','Dia especial','Semanal'][i],ativo:true}));let resumos=[{loja:'Loja 01',mes:'2026-01',venda_total:3042701.83,custo_total:2650820.21,lucro_total:391881.62,margem_total:12.88,cupons_totais:62761,unidades_totais:489300,__tipo:'resumo_geral_loja'}];let base=[['101','ENCARTE BIG NORDESTE',299097.59,261096.59,38000.99,12.71,53375.052,690,515,10031,29.82,5.60],['102','FDS DE OFERTAS',227879.06,192757.28,35121.78,15.41,39124.8,490,348,8210,27.76,5.82],['103','DIA BIG',200699.76,196485.06,4214.70,2.10,42008.4,430,290,11880,16.89,4.78],['104','SEMANA DE OFERTAS',115847.15,96654.37,19192.78,16.57,18142.2,260,184,5138,22.55,6.39]];let campanhasDados=base.map(r=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:r[0],descricao:r[1],venda:r[2],custo:r[3],lucro:r[4],margem:r[5],quantidade:r[6],itens:r[7],produtos_distintos:r[8],cupons:r[9],ticket_medio:r[10],preco_medio:r[11],__tipo:'campanhas_ofertas'}));let departamentos=[['PERECIVEIS',157302.07,19000,11.9,180,28842],['MERCEARIA DOCE',55296.63,7800,14.1,92,8410],['MERCEARIA SECA',28305.68,4120,14.6,66,5122],['MERCEARIA SALGADA',25518.11,3650,14.3,58,4210],['LIMPEZA',15494.38,2850,18.4,47,2198],['PERFUMARIA',12717.82,2050,16.1,38,1493],['BEBIDAS',3262.89,-210,-6.4,34,950]].map((d,i)=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',mercadologico1:String(i+1),descricao_departamento:d[0],venda:d[1],lucro:d[2],margem:d[3],produtos:d[4],quantidade:d[5],__tipo:'departamentos_campanha'}));let produtos=Array.from({length:36},(_,i)=>{let venda=[24800,21400,18600,15100,13800,12100,9900,8700,7200,6100][i]||Math.max(800,5400-i*120),m=i==4?-3.2:(i%7==0?5.4:8+i%9);return{loja:'Loja 01',mes:'2026-01',id_tipooferta:i<24?'101':'102',campanha:i<24?'ENCARTE BIG NORDESTE':'FDS DE OFERTAS',id_produto:'P'+(1000+i),descricao_produto:'Produto promocional '+String(i+1).padStart(2,'0'),quantidade:900-i*13,venda,lucro:venda*m/100,margem:m,__tipo:'produtos_campanha'}});let cuponsDados=campanhasDados.map(c=>({loja:c.loja,mes:c.mes,cupons_totais:62761,campanha:c.descricao,cupons_campanha:c.cupons,__tipo:'cupons_totais'}));let importacoes=ORDER.map(t=>({data:new Date().toLocaleString('pt-BR'),arquivo:TYPE_CFG[t].file,loja:'Loja 01',mes:'2026-01',tipo:t,linhas:t=='produtos_campanha'?36:t=='departamentos_campanha'?7:t=='campanhas_ofertas'||t=='cupons_totais'?4:1,observacao:'Mock inicial',ignoradas:0,colunas_faltantes:[]}));return{empresas,campanhas,resumos,campanhasDados,departamentos,produtos,cuponsDados,importacoes}}
let db=JSON.parse(localStorage.getItem('bignordeste.analytics.v5')||localStorage.getItem('bignordeste.analytics.v4')||localStorage.getItem('bignordeste.analytics.v3')||localStorage.getItem('bignordeste.analytics.v2')||'null')||seed();db.empresas??=db.lojas||seed().empresas;db.resumos??=db.resumo||[];db.campanhasDados??=db.resultados||[];db.cuponsDados??=db.cupons||[];db.importacoes??=[];let page='dashboard';function save(){db.lojas=db.empresas;localStorage.setItem('bignordeste.analytics.v5',JSON.stringify(db))}function filters(){return{loja:fLoja.value,regiao:fRegiao.value,mes:fMes.value,camp:fCamp.value}}function emp(nome){return db.empresas.find(l=>l.nome==nome)||{}}function lojaRegiao(nome){return emp(nome).regiao||''}function inFilter(r){let f=filters();return(f.loja=='Todas'||r.loja==f.loja)&&(!f.mes||r.mes==f.mes)&&(f.camp=='Todas'||r.descricao==f.camp||r.campanha==f.camp)&&(f.regiao=='Todas'||lojaRegiao(r.loja)==f.regiao)}function resumo(loja,mes){return db.resumos.find(r=>r.loja==loja&&r.mes==mes)||{loja,mes,venda_total:0,cupons_totais:0}}function cuponsCamp(loja,mes,camp){let x=db.cuponsDados.find(c=>c.loja==loja&&c.mes==mes&&c.campanha==camp);return{x:+(x?.cupons_campanha)||0,total:+(x?.cupons_totais)||0}}function calcCamp(r){let re=resumo(r.loja,r.mes),cp=cuponsCamp(r.loja,r.mes,r.descricao),cupons=+r.cupons||cp.x,totalCup=+re.cupons_totais||cp.total,part=re.venda_total?+r.venda/re.venda_total*100:0,pen=totalCup?cupons/totalCup*100:0,q=+r.quantidade||0,prod=+r.produtos_distintos||0,lucro=+r.lucro||0,venda=+r.venda||0;return{...r,venda,lucro,cupons,participacao:part,penetracao:pen,ticket_medio:+r.ticket_medio||(cupons?venda/cupons:0),preco_medio:+r.preco_medio||(q?venda/q:0),lucro_cupom:cupons?lucro/cupons:0,venda_produto:prod?venda/prod:0,lucro_produto:prod?lucro/prod:0,indice_forca:part*pen,indice_eficiencia:part*(+r.margem||0)}}function campRows(){return db.campanhasDados.filter(inFilter).map(calcCamp)}function totals(rs=campRows()){let venda=rs.reduce((s,r)=>s+r.venda,0),lucro=rs.reduce((s,r)=>s+r.lucro,0),cupons=rs.reduce((s,r)=>s+r.cupons,0),f=filters(),res=db.resumos.filter(r=>(f.loja=='Todas'||r.loja==f.loja)&&r.mes==f.mes&&(f.regiao=='Todas'||lojaRegiao(r.loja)==f.regiao));let vendaTotal=res.reduce((s,r)=>s+(+r.venda_total||0),0),cuponsTotal=res.reduce((s,r)=>s+(+r.cupons_totais||0),0);return{vendaTotal,venda,lucro,cupons,cuponsTotal,margem:venda?lucro/venda*100:0,participacao:vendaTotal?venda/vendaTotal*100:0,penetracao:cuponsTotal?cupons/cuponsTotal*100:0}}
function card(a,b,c){return`<div class="card"><div class="label">${a}</div><div class="value">${b}</div><div class="hint">${c}</div></div>`}function cards(t){return`<div class="grid cards">${card('Venda total',brl(t.vendaTotal),'Base loja/mes')}${card('Venda promocional',brl(t.venda),'Ofertas importadas')}${card('Participacao ofertas',pct(t.participacao),'Promocional / total')}${card('Lucro promocional',brl(t.lucro),'Resultado absoluto')}${card('Margem promocional',pct(t.margem),'Lucro / venda')}${card('Cupons totais',num(t.cuponsTotal),'Movimento')}${card('Cupons impactados',num(t.cupons),'Campanhas')}${card('Penetracao',pct(t.penetracao),'Cupons campanha / total')}</div>`}function bars(title,rs,val,format=brl){let max=Math.max(1,...rs.map(val));return`<div class="panel"><h2>${title}</h2>${rs.slice(0,12).map(r=>`<div class="barrow"><div><b>${r.descricao||r.campanha||r.loja||r.regiao||r.descricao_departamento}</b><div class="track"><div class="fill" style="width:${Math.max(3,val(r)/max*100)}%"></div></div></div><div>${format(val(r))}</div></div>`).join('')}</div>`}function campTable(rs){return`<div class="table"><table><thead><tr><th>Loja</th><th>Campanha</th><th>Venda</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Cupons</th><th>Pen.</th><th>Ticket</th><th>Preco</th><th>Lucro/cupom</th><th>Venda/prod.</th><th>Lucro/prod.</th><th>Forca</th><th>Eficiencia</th></tr></thead><tbody>${rs.map(r=>`<tr><td>${r.loja}</td><td><b>${r.descricao}</b></td><td>${brl(r.venda)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${num(r.cupons)}</td><td>${pct(r.penetracao)}</td><td>${brl(r.ticket_medio)}</td><td>${brl(r.preco_medio)}</td><td>${brl(r.lucro_cupom)}</td><td>${brl(r.venda_produto)}</td><td>${brl(r.lucro_produto)}</td><td>${num(r.indice_forca)}</td><td>${num(r.indice_eficiencia)}</td></tr>`).join('')}</tbody></table></div>`}function dashboard(){let rs=campRows().sort((a,b)=>b.venda-a.venda);return cards(totals(rs))+`<div class="grid two mt">${bars('Ranking por venda',rs,r=>r.venda)}${bars('Ranking por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>r.lucro)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Ranking por penetracao',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}</div><div class="panel mt"><h2>Comparativo de campanhas</h2>${campTable(rs)}</div>`}
function auditData(loja=fLoja.value,mes=fMes.value){if(loja=='Todas')loja='Loja 01';let imports=db.importacoes.filter(i=>i.loja==loja&&i.mes==mes),types=[...new Set(imports.map(i=>i.tipo))],missing=ORDER.filter(t=>!types.includes(t)),res=resumo(loja,mes),camps=db.campanhasDados.filter(r=>r.loja==loja&&r.mes==mes).map(calcCamp),sumCamp=camps.reduce((s,r)=>s+r.venda,0),sumCup=camps.reduce((s,r)=>s+r.cupons,0),cuponsTotal=+res.cupons_totais||0,part=res.venda_total?sumCamp/res.venda_total*100:0,diff=(+res.venda_total||0)-sumCamp,ignored=imports.reduce((s,i)=>s+(+i.ignoradas||0),0),missingCols=imports.flatMap(i=>(i.colunas_faltantes||[]).map(c=>`${i.arquivo}: ${c}`)),alerts=[];if(missing.length)alerts.push(`Arquivos faltantes: ${missing.map(t=>TYPE_LABEL[t]).join(', ')}`);if(!res.venda_total)alerts.push('Resumo geral ausente ou sem venda_total.');if(sumCamp<=0)alerts.push('Campanhas/ofertas ausentes ou com venda zerada.');if(cuponsTotal&&sumCup>cuponsTotal*1.5)alerts.push('Soma dos cupons por campanha muito acima dos cupons totais. Verifique sobreposicao de campanhas.');if(missingCols.length)alerts.push('Existem colunas faltantes em importacoes.');if(ignored>0)alerts.push('Existem linhas ignoradas.');let status=alerts.length&&types.length?'Com erro':missing.length&&types.length?'Parcial':types.length==0?'Pendente':missing.length?'Parcial':'Completo';if(types.length&&missing.length&&!missingCols.length&&ignored==0)status='Parcial';if(!missing.length&&!missingCols.length&&!ignored&&res.venda_total&&sumCamp>0)status='Completo';if(missingCols.length||ignored>0)status='Com erro';return{loja,mes,imports,types,missing,res,camps,sumCamp,sumCup,cuponsTotal,part,diff,ignored,missingCols,alerts,status}}
function auditoria(){let a=auditData();let cls=a.status=='Completo'?'ok':a.status=='Parcial'?'warn':a.status=='Com erro'?'bad':'info';return`<div class="grid cards">${card('Status',`<span class="pill ${cls}">${a.status}</span>`,'Confiabilidade do lote')}${card('Arquivos importados',a.imports.length,'Historico loja/mes')}${card('Tipos importados',a.types.length+' / 5','Cobertura do pacote')}${card('Linhas ignoradas',num(a.ignored),'Erros de processamento')}${card('Venda total resumo',brl(a.res.venda_total),'Resumo geral')}${card('Soma campanhas',brl(a.sumCamp),'Campanhas/ofertas')}${card('Participacao prom.',pct(a.part),'Campanhas / total')}${card('Cupons campanha',num(a.sumCup),'Soma por campanha')}</div><div class="grid two mt"><div class="panel"><h2>Arquivos e linhas</h2><div class="table"><table><tr><th>Arquivo</th><th>Tipo</th><th>Linhas</th><th>Ignoradas</th><th>Colunas faltantes</th><th>Data</th></tr>${a.imports.map(i=>`<tr><td>${i.arquivo}</td><td>${TYPE_LABEL[i.tipo]||i.tipo}</td><td>${i.linhas||0}</td><td>${i.ignoradas||0}</td><td>${(i.colunas_faltantes||[]).join(', ')||'-'}</td><td>${i.data}</td></tr>`).join('')||'<tr><td colspan="6">Nenhuma importacao para loja/mes.</td></tr>'}</table></div></div><div class="panel"><h2>Alertas de inconsistencia</h2>${a.alerts.map(x=>`<div class="alert ${a.status=='Com erro'?'bad':'warn'}">${x}</div>`).join('')||'<div class="alert ok">Pacote sem alertas criticos para os filtros atuais.</div>'}<h2>Arquivos faltantes</h2><p>${a.missing.map(t=>`<span class="pill warn">${TYPE_LABEL[t]}</span>`).join(' ')||'<span class="pill ok">Nenhum</span>'}</p><p class="muted">Diferenca entre venda total do resumo e soma das campanhas: <b>${brl(a.diff)}</b>. Essa diferenca e esperada quando a venda total inclui itens nao promocionais.</p></div></div><div class="panel mt"><h2>Checklist de validacao real</h2>${checklist()}</div>`}
function importacoes(){return`<div class="panel"><div class="toolbar"><h2>Importacao real por tipo</h2><button class="btn" onclick="template()">Baixar cabecalho modelo</button><button class="btn" onclick="go('modelos')">Ver Modelos SQL</button><button class="btn" onclick="go('auditoria')">Auditar importacao</button><button class="btn danger" onclick="clearImports()">Limpar dados importados</button></div><div class="drop"><div class="row"><select id="il">${db.empresas.map(l=>`<option>${l.nome}</option>`).join('')}</select><input id="im" type="month" value="${fMes.value||'2026-01'}"><select id="it" onchange="showReq()">${Object.keys(TYPE_CFG).map(k=>`<option value="${k}">${TYPE_LABEL[k]}</option>`).join('')}</select><textarea id="io" placeholder="Observacao obrigatoria"></textarea></div><input id="files" type="file" accept=".txt" multiple><div id="req" class="muted"></div><pre id="prev" class="preview" style="display:none"></pre><div id="ir"></div><button class="btn primary" onclick="processImport()">Importar arquivo(s)</button></div></div><div class="panel mt"><h2>Checklist de importacao</h2>${checklist()}</div><div class="panel mt"><h2>Historico de importacoes</h2>${history()}</div>`}function checklist(){return`<div class="checklist"><div>1. selecionar loja</div><div>2. selecionar mes</div><div>3. rodar 5 consultas no VR</div><div>4. exportar .txt separado por ;</div><div>5. importar os 5 arquivos no sistema</div><div>6. validar consolidacao</div></div>`}function history(){return db.importacoes.length?`<div class="table"><table><tr><th>Data/hora</th><th>Arquivo</th><th>Loja</th><th>Mes</th><th>Tipo</th><th>Linhas</th><th>Ignoradas</th><th>Colunas faltantes</th><th>Observacao</th></tr>${db.importacoes.map(i=>`<tr><td>${i.data}</td><td>${i.arquivo}</td><td>${i.loja}</td><td>${i.mes}</td><td>${TYPE_LABEL[i.tipo]||i.tipo}</td><td>${i.linhas||0}</td><td>${i.ignoradas||0}</td><td>${(i.colunas_faltantes||[]).join(', ')||'-'}</td><td>${i.observacao||''}</td></tr>`).join('')}</table></div>`:'<p class="muted">Nenhum arquivo importado ainda.</p>'}function showReq(){if(window.req)req.innerHTML='<b>Colunas obrigatorias:</b> '+TYPE_CFG[it.value].required.join('; ')}function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}function parseNum(v){if(v==null||String(v).trim()==='')return'';let s=String(v).trim();if(/^[-+]?\d{1,3}(\.\d{3})+,\d+$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');let n=Number(s);return Number.isFinite(n)?n:v}async function readText(file){let buf=await file.arrayBuffer(),text=new TextDecoder('utf-8').decode(buf);if(text.includes('\uFFFD'))text=new TextDecoder('iso-8859-1').decode(buf);return text.replace(/^\uFEFF/,'')}function parseTxt(text){let lines=text.split(/\r?\n/).filter(x=>x.trim()),head=lines[0].split(';').map(norm);let rows=lines.slice(1).map(line=>{let cells=line.split(';');return Object.fromEntries(head.map((h,i)=>[h,parseNum(cells[i]??'')]))});return{head,rows,preview:lines.slice(0,8).join('\n')}}async function processImport(){let fs=[...files.files],loja=il.value,mes=im.value,tipo=it.value,obs=io.value.trim();if(!loja||!mes||!tipo||!obs){ir.innerHTML='<span class="pill bad">Informe loja, mes/ano, tipo de arquivo e observacao.</span>';return}if(!fs.length||fs.some(f=>!f.name.toLowerCase().endsWith('.txt'))){ir.innerHTML='<span class="pill bad">Importe somente arquivos .txt.</span>';return}let allRows=[],historyRows=[],errors=[];for(let f of fs){let parsed=parseTxt(await readText(f)),missing=TYPE_CFG[tipo].required.filter(c=>!parsed.head.includes(c));prev.style.display='block';prev.textContent=parsed.preview;if(missing.length){errors.push(`${f.name}: colunas ausentes ${missing.join(', ')}`);historyRows.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,mes,tipo,linhas:0,ignoradas:parsed.rows.length,colunas_faltantes:missing,observacao:obs});continue}let rows=parsed.rows.map(r=>({...r,loja,mes}));allRows=allRows.concat(rows);historyRows.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,mes,tipo,linhas:rows.length,ignoradas:0,colunas_faltantes:[],observacao:obs})}if(allRows.length)saveRows(tipo,allRows,loja,mes);db.importacoes.unshift(...historyRows);save();setupFilters();render();if(page=='importacoes'){ir.innerHTML=errors.length?`<div class="alert bad">${errors.join('<br>')}</div>`:`<span class="pill ok">${historyRows.length} arquivo(s), ${allRows.length} linhas importadas.</span>`}}function saveRows(tipo,rows,loja,mes){let b=TYPE_CFG[tipo].bucket;db[b]=db[b].filter(r=>!(r.loja==loja&&r.mes==mes&&r.__tipo==tipo)).concat(rows.map(r=>({...r,__tipo:tipo,__importado:true})));if(tipo=='campanhas_ofertas'){rows.forEach(r=>{if(!db.campanhas.some(c=>c.id_tipooferta==String(r.id_tipooferta)))db.campanhas.push({id_tipooferta:String(r.id_tipooferta),descricao:r.descricao,categoria:'Importada',ativo:true})})}}function template(){let tipo=(window.it&&it.value)||'resumo_geral_loja',blob=new Blob([TYPE_CFG[tipo].required.join(';')+'\n'],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=TYPE_CFG[tipo].file;a.click();URL.revokeObjectURL(a.href)}function clearImports(){if(confirm('Limpar historico e dados importados, mantendo mock inicial?')){db=seed();save();setupFilters();render()}}
function empresas(){return`<div class="panel"><h2>Cadastro de empresas / lojas</h2><div class="row"><input id="eCodigo" placeholder="Codigo interno"><input id="eVr" placeholder="ID loja no VR"><input id="eNome" placeholder="Nome da empresa"><input id="eRegiao" placeholder="Regiao"><input id="eCidade" placeholder="Cidade"><input id="eUf" placeholder="UF"><select id="eStatus"><option>Ativa</option><option>Inativa</option></select><button class="btn primary" onclick="addEmpresa()">Salvar empresa</button></div><p class="muted">Use o ID loja no VR para gerar automaticamente os SQLs de exportacao.</p></div><div class="panel mt"><h2>Empresas cadastradas</h2><div class="table"><table><tr><th>Codigo</th><th>ID VR</th><th>Nome</th><th>Regiao</th><th>Cidade</th><th>UF</th><th>Status</th><th></th></tr>${db.empresas.map((l,i)=>`<tr><td>${l.codigo}</td><td>${l.id_vr||l.codigo}</td><td><b>${l.nome}</b></td><td>${l.regiao}</td><td>${l.cidade||''}</td><td>${l.uf||''}</td><td><span class="pill ok">${l.status||'Ativa'}</span></td><td><button class="btn" onclick="editEmpresa(${i})">Editar</button></td></tr>`).join('')}</table></div></div>`}function addEmpresa(){let codigo=eCodigo.value.trim(),nome=eNome.value.trim();if(!codigo||!nome){alert('Informe codigo e nome.');return}let obj={codigo,id_vr:eVr.value.trim()||codigo,nome,regiao:eRegiao.value.trim()||'Sem regiao',cidade:eCidade.value.trim(),uf:eUf.value.trim(),status:eStatus.value};let idx=db.empresas.findIndex(x=>x.codigo==codigo);if(idx>=0)db.empresas[idx]=obj;else db.empresas.push(obj);save();setupFilters();render()}function editEmpresa(i){let l=db.empresas[i];eCodigo.value=l.codigo;eVr.value=l.id_vr||l.codigo;eNome.value=l.nome;eRegiao.value=l.regiao;eCidade.value=l.cidade||'';eUf.value=l.uf||'';eStatus.value=l.status||'Ativa'}
function modelos(){let loja=fLoja.value=='Todas'?'Loja 01':fLoja.value,empresa=emp(loja),mes=fMes.value||'2026-01',tipo=(window.sqlTipo&&sqlTipo.value)||'resumo_geral_loja',sql=makeSql(tipo,empresa,mes);return`<div class="panel"><h2>Modelos SQL</h2><div class="row"><select id="sqlLoja" onchange="fLoja.value=this.value;render()">${db.empresas.map(l=>`<option ${l.nome==loja?'selected':''}>${l.nome}</option>`).join('')}</select><input id="sqlMes" type="month" value="${mes}" onchange="fMes.value=this.value;render()"><select id="sqlTipo" onchange="render()">${Object.keys(TYPE_CFG).map(k=>`<option value="${k}" ${k==tipo?'selected':''}>${TYPE_LABEL[k]} - ${TYPE_CFG[k].file}</option>`).join('')}</select><button class="btn primary" onclick="copySql()">Copiar SQL</button></div><p class="muted">Troque loja e periodo pelos campos acima. O SQL abaixo ja usa o ID VR cadastrado na empresa, o mes selecionado, a data inicial e a data final correta.</p><pre id="sqlBox" class="sql">${escapeHtml(sql)}</pre></div><div class="panel mt"><h2>Checklist de importacao</h2>${checklist()}</div><div class="panel mt"><h2>Consultas oficiais</h2><div class="table"><table><tr><th>Nome da consulta</th><th>Objetivo</th><th>Colunas esperadas</th><th>Arquivo</th></tr>${Object.entries(TYPE_CFG).map(([k,v])=>`<tr><td><b>${TYPE_LABEL[k]}</b></td><td>${v.objetivo}</td><td>${v.required.join('; ')}</td><td>${v.file}</td></tr>`).join('')}</table></div></div>`}function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function copySql(){navigator.clipboard.writeText(sqlBox.textContent).then(()=>alert('SQL copiado.'))}function makeSql(tipo,e,mes){let id=e.id_vr||e.codigo||1,ini=mes+'-01',d=new Date(ini+'T00:00:00'),fim=new Date(d.getFullYear(),d.getMonth()+1,1).toISOString().slice(0,10),m=mes;let common=`WHERE v.id_loja = ${id}\n  AND v.data >= '${ini}'\n  AND v.data < '${fim}'\n  AND v.cancelado = FALSE`;let margin=`ROUND((SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade)) / NULLIF(SUM(i.valortotal),0) * 100,2)`;if(tipo=='resumo_geral_loja')return`SELECT\n    v.id_loja AS loja,\n    '${m}' AS mes,\n    SUM(i.valortotal) AS venda_total,\n    SUM(i.customediocomimposto * i.quantidade) AS custo_total,\n    SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro_total,\n    ${margin} AS margem_total,\n    COUNT(DISTINCT v.id) AS cupons_totais,\n    SUM(i.quantidade) AS unidades_totais\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\n${common};`;if(tipo=='campanhas_ofertas')return`SELECT\n    v.id_loja AS loja,\n    '${m}' AS mes,\n    i.id_tipooferta,\n    t.descricao,\n    SUM(i.valortotal) AS venda,\n    SUM(i.customediocomimposto * i.quantidade) AS custo,\n    SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro,\n    ${margin} AS margem,\n    SUM(i.quantidade) AS quantidade,\n    COUNT(*) AS itens,\n    COUNT(DISTINCT i.id_produto) AS produtos_distintos,\n    COUNT(DISTINCT v.id) AS cupons,\n    ROUND(SUM(i.valortotal) / NULLIF(COUNT(DISTINCT v.id),0),2) AS ticket_medio,\n    ROUND(SUM(i.valortotal) / NULLIF(SUM(i.quantidade),0),2) AS preco_medio\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\n${common}\n  AND i.oferta = TRUE\nGROUP BY v.id_loja, i.id_tipooferta, t.descricao\nORDER BY venda DESC;`;if(tipo=='produtos_campanha')return`SELECT\n    v.id_loja AS loja,\n    '${m}' AS mes,\n    i.id_tipooferta,\n    t.descricao AS campanha,\n    i.id_produto,\n    p.descricaocompleta AS descricao_produto,\n    SUM(i.quantidade) AS quantidade,\n    SUM(i.valortotal) AS venda,\n    SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro,\n    ${margin} AS margem\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\nINNER JOIN public.produto p ON p.id = i.id_produto\n${common}\n  AND i.oferta = TRUE\nGROUP BY v.id_loja, i.id_tipooferta, t.descricao, i.id_produto, p.descricaocompleta\nORDER BY campanha, venda DESC;`;if(tipo=='departamentos_campanha')return`SELECT\n    v.id_loja AS loja,\n    '${m}' AS mes,\n    i.id_tipooferta,\n    t.descricao AS campanha,\n    p.mercadologico1,\n    m.descricao AS descricao_departamento,\n    COUNT(DISTINCT i.id_produto) AS produtos,\n    SUM(i.quantidade) AS quantidade,\n    SUM(i.valortotal) AS venda,\n    SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro,\n    ${margin} AS margem\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\nINNER JOIN public.produto p ON p.id = i.id_produto\nINNER JOIN public.mercadologico m ON m.mercadologico1 = p.mercadologico1 AND m.nivel = 1\n${common}\n  AND i.oferta = TRUE\nGROUP BY v.id_loja, i.id_tipooferta, t.descricao, p.mercadologico1, m.descricao\nORDER BY campanha, venda DESC;`;return`SELECT\n    v.id_loja AS loja,\n    '${m}' AS mes,\n    (SELECT COUNT(DISTINCT v2.id) FROM pdv.venda v2 WHERE v2.id_loja = ${id} AND v2.data >= '${ini}' AND v2.data < '${fim}' AND v2.cancelado = FALSE) AS cupons_totais,\n    t.descricao AS campanha,\n    COUNT(DISTINCT v.id) AS cupons_campanha\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\n${common}\n  AND i.oferta = TRUE\nGROUP BY v.id_loja, i.id_tipooferta, t.descricao\nORDER BY cupons_campanha DESC;`}
function consolidated(){let f=filters();return db.empresas.map(l=>{let rs=db.campanhasDados.filter(r=>r.loja==l.nome&&(!f.mes||r.mes==f.mes)).map(calcCamp),re=resumo(l.nome,f.mes),v=rs.reduce((s,r)=>s+r.venda,0),luc=rs.reduce((s,r)=>s+r.lucro,0),cup=rs.reduce((s,r)=>s+r.cupons,0),part=re.venda_total?v/re.venda_total*100:0,pen=re.cupons_totais?cup/re.cupons_totais*100:0;return{loja:l.nome,regiao:l.regiao,vendaTotal:+re.venda_total||0,vendaProm:v,lucro:luc,margem:v?luc/v*100:0,participacao:part,penetracao:pen,indice_forca:part*pen}}).filter(r=>filters().regiao=='Todas'||r.regiao==filters().regiao).sort((a,b)=>b.vendaProm-a.vendaProm)}function consolidacao(){let rs=consolidated();return`<div class="grid two">${bars('Ranking por venda promocional',rs,r=>r.vendaProm)}${bars('Ranking por participacao das ofertas',[...rs].sort((a,b)=>b.participacao-a.participacao),r=>r.participacao,pct)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Ranking por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>r.lucro)}${bars('Ranking por penetracao',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}${bars('Ranking por indice de forca',[...rs].sort((a,b)=>b.indice_forca-a.indice_forca),r=>r.indice_forca,v=>num(v))}</div><div class="panel mt"><h2>Consolidacao mensal das 27 lojas</h2><div class="table"><table><tr><th>Loja</th><th>Regiao</th><th>Venda total</th><th>Venda promocional</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Pen.</th><th>Forca</th></tr>${rs.map(r=>`<tr><td><b>${r.loja}</b></td><td>${r.regiao}</td><td>${brl(r.vendaTotal)}</td><td>${brl(r.vendaProm)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(r.penetracao)}</td><td>${num(r.indice_forca)}</td></tr>`).join('')}</table></div></div>`}function campanhas(){return`<div class="panel"><h2>Campanhas cadastradas/importadas</h2><div class="table"><table><tr><th>ID tipo oferta</th><th>Descricao</th><th>Categoria</th><th>Status</th></tr>${db.campanhas.map(c=>`<tr><td>${c.id_tipooferta}</td><td><b>${c.descricao}</b></td><td>${c.categoria}</td><td><span class="pill ok">Ativa</span></td></tr>`).join('')}</table></div></div>`}function loja(){let rs=campRows().sort((a,b)=>b.venda-a.venda),deps=db.departamentos.filter(inFilter);return cards(totals(rs))+`<div class="grid two mt">${bars('Campanhas que mais vendem',rs,r=>r.venda)}${bars('Campanhas com maior margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Campanhas com maior alcance',[...rs].sort((a,b)=>b.penetracao-a.penetracao),r=>r.penetracao,pct)}${bars('Departamentos que sustentam ofertas',deps.sort((a,b)=>b.venda-a.venda),r=>r.venda)}</div>`}function regiao(){let data={};consolidated().forEach(r=>{data[r.regiao]??={regiao:r.regiao,vendaProm:0,vendaTotal:0,lucro:0,pen:0,n:0};data[r.regiao].vendaProm+=r.vendaProm;data[r.regiao].vendaTotal+=r.vendaTotal;data[r.regiao].lucro+=r.lucro;data[r.regiao].pen+=r.penetracao;data[r.regiao].n++});let rs=Object.values(data).map(r=>({...r,participacao:r.vendaTotal?r.vendaProm/r.vendaTotal*100:0,margem:r.vendaProm?r.lucro/r.vendaProm*100:0,penetracao:r.n?r.pen/r.n:0}));return`<div class="grid two">${bars('Venda promocional por regiao',rs,r=>r.vendaProm)}${bars('Participacao por regiao',rs,r=>r.participacao,pct)}${bars('Margem por regiao',rs,r=>r.margem,pct)}${bars('Penetracao media por regiao',rs,r=>r.penetracao,pct)}</div>`}function departamentos(){let rs=db.departamentos.filter(inFilter).sort((a,b)=>b.venda-a.venda),tot=rs.reduce((s,r)=>s+(+r.venda||0),0);return`<div class="grid two">${bars('Venda por departamento',rs,r=>+r.venda||0)}${bars('Margem por departamento',[...rs].sort((a,b)=>b.margem-a.margem),r=>+r.margem||0,pct)}</div><div class="panel mt"><h2>Departamentos</h2><div class="table"><table><tr><th>Loja</th><th>Departamento</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Participacao</th></tr>${rs.map(r=>`<tr><td>${r.loja}</td><td><b>${r.descricao_departamento}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(tot?r.venda/tot*100:0)}</td></tr>`).join('')}</table></div></div>`}function produtos(){let rs=db.produtos.filter(inFilter).sort((a,b)=>b.venda-a.venda);return`<div class="grid three">${bars('Top produtos por venda',rs,r=>+r.venda||0)}${bars('Top produtos por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>+r.lucro||0)}${bars('Top produtos por quantidade',[...rs].sort((a,b)=>b.quantidade-a.quantidade),r=>+r.quantidade||0,v=>num(v))}</div><div class="panel mt"><h2>Produtos criticos</h2><div class="table"><table><tr><th>Produto</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Diagnostico</th></tr>${rs.map(r=>`<tr><td><b>${r.descricao_produto}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${r.margem<0?'<span class="pill bad">Margem negativa</span>':r.venda>10000&&r.margem<8?'<span class="pill warn">Alta venda e baixa margem</span>':'<span class="pill ok">Normal</span>'}</td></tr>`).join('')}</table></div></div>`}function diagnostics(){let a=[];campRows().forEach(r=>{if(r.venda>180000&&r.margem<8)a.push(['bad',`${r.loja}: ${r.descricao} tem alta venda (${brl(r.venda)}) e margem baixa (${pct(r.margem)}).`]);if(r.penetracao>12&&r.ticket_medio<20)a.push(['warn',`${r.loja}: ${r.descricao} tem alta penetracao (${pct(r.penetracao)}) e ticket baixo (${brl(r.ticket_medio)}).`]);if(r.participacao<4&&r.margem>15)a.push(['ok',`${r.loja}: ${r.descricao} tem boa margem, mas baixa participacao.`])});db.produtos.filter(r=>inFilter(r)&&r.venda>10000&&r.margem<0).forEach(p=>a.push(['bad',`${p.loja}: ${p.descricao_produto} tem venda alta e margem negativa.`]));return a}function relatorio(){let lojas=consolidated().filter(r=>r.vendaProm>0),camp=campRows(),reg={};lojas.forEach(l=>{reg[l.regiao]??={regiao:l.regiao,venda:0,lucro:0,n:0};reg[l.regiao].venda+=l.vendaProm;reg[l.regiao].lucro+=l.lucro;reg[l.regiao].n++});let al=diagnostics();return`<div class="grid two"><div class="panel"><h2>Resumo por loja</h2><div class="table"><table><tr><th>Loja</th><th>Venda prom.</th><th>Part.</th><th>Margem</th><th>Pen.</th></tr>${lojas.map(l=>`<tr><td>${l.loja}</td><td>${brl(l.vendaProm)}</td><td>${pct(l.participacao)}</td><td>${pct(l.margem)}</td><td>${pct(l.penetracao)}</td></tr>`).join('')}</table></div></div><div class="panel"><h2>Resumo por regiao</h2><div class="table"><table><tr><th>Regiao</th><th>Venda</th><th>Lucro</th><th>Lojas</th></tr>${Object.values(reg).map(r=>`<tr><td>${r.regiao}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${r.n}</td></tr>`).join('')}</table></div></div></div><div class="panel mt"><h2>Resumo por campanha</h2>${campTable(camp.sort((a,b)=>b.venda-a.venda))}</div><div class="panel mt"><h2>Alertas automaticos e oportunidades</h2>${al.map(x=>`<div class="alert ${x[0]}"><span class="pill ${x[0]}">${x[0]}</span><p>${x[1]}</p></div>`).join('')||'<p class="muted">Sem alertas para os filtros atuais.</p>'}</div>`}
function setupFilters(){let old=[fLoja.value,fRegiao.value,fCamp.value];fLoja.innerHTML='<option>Todas</option>'+db.empresas.map(l=>`<option>${l.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.empresas.map(l=>l.regiao))].map(r=>`<option>${r}</option>`).join('');let camps=[...new Set([...db.campanhasDados.map(r=>r.descricao),...db.produtos.map(r=>r.campanha),...db.departamentos.map(r=>r.campanha)].filter(Boolean))];fCamp.innerHTML='<option>Todas</option>'+camps.map(c=>`<option>${c}</option>`).join('');[fLoja.value,fRegiao.value,fCamp.value]=old;if(!fLoja.value)fLoja.value='Loja 01';if(!fRegiao.value)fRegiao.value='Todas';if(!fCamp.value)fCamp.value='Todas'}function go(p){page=p;render()}function render(){nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${l}</button>`).join('');let meta={dashboard:['Dashboard Executivo','Analise mensal calculada a partir dos arquivos importados.'],importacoes:['Importacoes','Importe multiplos TXT por loja, mes, tipo e observacao.'],auditoria:['Auditoria da Importacao','Valide se os arquivos importados estao confiaveis antes do dashboard.'],modelos:['Modelos SQL','Consultas oficiais do VR para gerar os arquivos TXT padronizados.'],empresas:['Empresas','Cadastro de cada empresa/loja e ID usado no VR.'],consolidacao:['Consolidacao 27 Lojas','Ranking mensal por venda, margem, penetracao e forca.'],campanhas:['Campanhas','Campanhas importadas ou cadastradas.'],loja:['Analise por Loja','Performance individual da loja selecionada.'],regiao:['Analise por Regiao','Comparativo consolidado por regiao.'],departamentos:['Departamentos','Setores que sustentam as ofertas.'],produtos:['Produtos','Produtos que carregam ou prejudicam campanhas.'],relatorio:['Relatorio Executivo','Resumo por loja, campanha, regiao e oportunidades.']}[page];title.textContent=meta[0];sub.textContent=meta[1];view.innerHTML=({dashboard,importacoes,auditoria,modelos,empresas,consolidacao,campanhas,loja,regiao,departamentos,produtos,relatorio})[page]();if(page=='importacoes')showReq()}['fLoja','fRegiao','fMes','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));setupFilters();render();
</script></body></html>
