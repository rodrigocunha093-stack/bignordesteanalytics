<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIGNORDESTE ANALYTICS</title><style>
:root{--bg:#f5f6f8;--ink:#20242a;--muted:#68707c;--line:#dfe3e8;--panel:#fff;--brand:#16603a;--gold:#d39b21;--bad:#b42318;--warn:#b76e00;--ok:#087443;--blue:#175cd3}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}aside{background:#12201a;color:white;padding:18px 14px}.brand{padding:8px 10px 18px;border-bottom:1px solid #ffffff22}.brand b{display:block;font-size:18px}.brand span{font-size:12px;color:#b9c4be}nav{display:grid;gap:4px;margin-top:16px}nav button{border:0;background:transparent;color:#d7ded9;text-align:left;padding:10px 12px;border-radius:8px;cursor:pointer}nav button.active,nav button:hover{background:#ffffff1c;color:white}main{padding:22px;min-width:0}header{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}h1{font-size:24px;margin:0 0 5px}.sub{color:var(--muted);font-size:14px}.filters,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.filters{justify-content:flex-end}select,input,textarea{border:1px solid var(--line);background:white;border-radius:7px;padding:9px 10px;min-height:38px;font:inherit}textarea{resize:vertical}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(5,minmax(140px,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 10px 26px #20242a12}.card{padding:15px;min-height:92px}.label{font-size:12px;text-transform:uppercase;font-weight:800;color:var(--muted)}.value{font-size:23px;font-weight:850;margin-top:8px}.hint{font-size:12px;color:var(--muted);margin-top:5px}.panel{padding:16px}.panel h2{font-size:16px;margin:0 0 12px}.table{overflow:auto;max-height:620px;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#fafbfc;color:var(--muted);font-size:11px;text-transform:uppercase;position:sticky;top:0}.pill{display:inline-flex;border-radius:99px;padding:4px 8px;font-size:12px;font-weight:800;white-space:nowrap}.ok{background:#dcfae6;color:var(--ok)}.warn{background:#fef0c7;color:var(--warn)}.bad{background:#fee4e2;color:var(--bad)}.info{background:#dbeafe;color:var(--blue)}.mutedpill{background:#eef1f4;color:#5f6875}.btn{border:1px solid var(--line);background:white;border-radius:7px;padding:8px 10px;font-weight:800;cursor:pointer}.primary{background:var(--brand);border-color:var(--brand);color:white}.danger{background:var(--bad);border-color:var(--bad);color:white}.drop{border:1.5px dashed #a8b0b9;border-radius:8px;background:#fbfcfd;padding:18px;display:grid;gap:10px}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.preview,pre.sql{white-space:pre;overflow:auto;max-height:320px;background:#111827;color:#e5e7eb;padding:12px;border-radius:8px;font-size:12px}.mt{margin-top:14px}.muted{color:var(--muted)}.checklist{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.checklist div{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fbfcfd;font-size:13px}.alert{border-left:4px solid var(--blue);background:white;border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:12px;margin:10px 0}.alert.bad{border-left-color:var(--bad)}.alert.warn{border-left-color:var(--warn)}.alert.ok{border-left-color:var(--ok)}.barrow{display:grid;grid-template-columns:minmax(170px,1fr) 110px;gap:10px;align-items:center;margin:10px 0;font-size:13px}.track{height:9px;background:#edf0f3;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--gold))}@media(max-width:980px){.app{grid-template-columns:1fr}header{display:grid}.cards,.two,.row,.checklist{grid-template-columns:1fr}.filters{justify-content:flex-start}}

const money=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}),nf=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:2});const brl=v=>money.format(+v||0),num=v=>nf.format(+v||0),pct=v=>num(v)+'%';
const TYPES={resumo_geral_loja:{label:'Resumo geral',file:'resumo_geral_loja.txt',bucket:'resumos',cols:['loja','mes','venda_total','custo_total','lucro_total','margem_total','cupons_totais','unidades_totais']},campanhas_ofertas:{label:'Campanhas/ofertas',file:'campanhas_ofertas.txt',bucket:'campanhas',cols:['loja','mes','id_tipooferta','descricao','venda','custo','lucro','margem','quantidade','itens','produtos_distintos','cupons','ticket_medio','preco_medio']},produtos_campanha:{label:'Produtos',file:'produtos_campanha.txt',bucket:'produtos',cols:['loja','mes','id_tipooferta','campanha','id_produto','descricao_produto','quantidade','venda','lucro','margem']},departamentos_campanha:{label:'Departamentos',file:'departamentos_campanha.txt',bucket:'departamentos',cols:['loja','mes','id_tipooferta','campanha','mercadologico1','descricao_departamento','produtos','quantidade','venda','lucro','margem']},cupons_totais:{label:'Cupons',file:'cupons_campanha.txt',bucket:'cupons',cols:['loja','mes','cupons_totais','campanha','cupons_campanha']}};
const ORDER=['resumo_geral_loja','campanhas_ofertas','produtos_campanha','departamentos_campanha','cupons_totais'];
const pages=[['dashboard','Dashboard'],['importacoes','Importacoes'],['auditoria','Auditoria da Importacao'],['plano','Plano de Coleta 27 Lojas'],['modelos','Modelos SQL'],['empresas','Empresas'],['consolidacao','Consolidacao Final'],['relatorio','Relatorio Executivo']];
function seed(){let empresas=Array.from({length:27},(_,i)=>({codigo:String(i+1).padStart(2,'0'),id_vr:String(i+1),nome:'Loja '+String(i+1).padStart(2,'0'),regiao:['Natal','Agreste','Sertao','Litoral'][i%4],cidade:['Natal','Parnamirim','Mossoro','Caico'][i%4],uf:'RN',status:'Ativa'}));let resumos=[{loja:'Loja 01',mes:'2026-01',venda_total:3042701.83,custo_total:2650820.21,lucro_total:391881.62,margem_total:12.88,cupons_totais:62761,unidades_totais:489300,__tipo:'resumo_geral_loja'}];let base=[['101','ENCARTE BIG NORDESTE',299097.59,261096.59,38000.99,12.71,53375.052,690,515,10031,29.82,5.60],['102','FDS DE OFERTAS',227879.06,192757.28,35121.78,15.41,39124.8,490,348,8210,27.76,5.82],['103','DIA BIG',200699.76,196485.06,4214.70,2.10,42008.4,430,290,11880,16.89,4.78],['104','SEMANA DE OFERTAS',115847.15,96654.37,19192.78,16.57,18142.2,260,184,5138,22.55,6.39]];let campanhas=base.map(r=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:r[0],descricao:r[1],venda:r[2],custo:r[3],lucro:r[4],margem:r[5],quantidade:r[6],itens:r[7],produtos_distintos:r[8],cupons:r[9],ticket_medio:r[10],preco_medio:r[11],__tipo:'campanhas_ofertas'}));let departamentos=[['PERECIVEIS',157302.07,19000,11.9,180,28842],['MERCEARIA DOCE',55296.63,7800,14.1,92,8410],['MERCEARIA SECA',28305.68,4120,14.6,66,5122],['LIMPEZA',15494.38,2850,18.4,47,2198]].map((d,i)=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',mercadologico1:String(i+1),descricao_departamento:d[0],venda:d[1],lucro:d[2],margem:d[3],produtos:d[4],quantidade:d[5],__tipo:'departamentos_campanha'}));let produtos=Array.from({length:20},(_,i)=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',id_produto:'P'+(1000+i),descricao_produto:'Produto promocional '+(i+1),quantidade:900-i*12,venda:24000-i*700,lucro:(24000-i*700)*(i==4?-3.2:10+i%7)/100,margem:i==4?-3.2:10+i%7,__tipo:'produtos_campanha'}));let cupons=campanhas.map(c=>({loja:c.loja,mes:c.mes,cupons_totais:62761,campanha:c.descricao,cupons_campanha:c.cupons,__tipo:'cupons_totais'}));let importacoes=ORDER.map(t=>({data:new Date().toLocaleString('pt-BR'),arquivo:TYPES[t].file,loja:'Loja 01',mes:'2026-01',tipo:t,linhas:t=='produtos_campanha'?20:t=='departamentos_campanha'?4:t=='resumo_geral_loja'?1:4,ignoradas:0,colunas_faltantes:[],observacao:'Mock inicial'}));return{empresas,resumos,campanhas,departamentos,produtos,cupons,importacoes,aprovacoes:{}}}
let db=JSON.parse(localStorage.getItem('bignordeste.analytics.coleta.v1')||localStorage.getItem('bignordeste.analytics.v5')||'null')||seed();db.empresas??=db.lojas||seed().empresas;db.resumos??=[];db.campanhas??=db.campanhasDados||db.resultados||[];db.departamentos??=[];db.produtos??=[];db.cupons??=db.cuponsDados||[];db.importacoes??=[];db.aprovacoes??={};let page='plano';function save(){localStorage.setItem('bignordeste.analytics.coleta.v1',JSON.stringify(db))}const key=(loja,mes)=>loja+'|'+mes;function filters(){return{loja:fLoja.value,regiao:fRegiao.value,mes:fMes.value,camp:fCamp.value}}function empresa(nome){return db.empresas.find(e=>e.nome==nome)||{}}function regiao(nome){return empresa(nome).regiao||''}function res(loja,mes){return db.resumos.find(r=>r.loja==loja&&r.mes==mes)||{venda_total:0,cupons_totais:0}}function rowsCamp(loja=fLoja.value,mes=fMes.value){return db.campanhas.filter(r=>(loja=='Todas'||r.loja==loja)&&r.mes==mes&&(fCamp.value=='Todas'||r.descricao==fCamp.value)).map(calc)}function calc(r){let rr=res(r.loja,r.mes),v=+r.venda||0,l=+r.lucro||0,c=+r.cupons||0,p=rr.venda_total?v/rr.venda_total*100:0,pen=rr.cupons_totais?c/rr.cupons_totais*100:0,prod=+r.produtos_distintos||0,q=+r.quantidade||0;return{...r,venda:v,lucro:l,participacao:p,penetracao:pen,ticket_medio:+r.ticket_medio||(c?v/c:0),preco_medio:+r.preco_medio||(q?v/q:0),lucro_cupom:c?l/c:0,venda_produto:prod?v/prod:0,lucro_produto:prod?l/prod:0,indice_forca:p*pen,indice_eficiencia:p*(+r.margem||0)}}function audit(loja=fLoja.value,mes=fMes.value){if(loja=='Todas')loja='Loja 01';let imps=db.importacoes.filter(i=>i.loja==loja&&i.mes==mes),types=[...new Set(imps.filter(i=>(i.linhas||0)>0).map(i=>i.tipo))],missing=ORDER.filter(t=>!types.includes(t)),rr=res(loja,mes),cs=db.campanhas.filter(r=>r.loja==loja&&r.mes==mes).map(calc),sum=cs.reduce((s,r)=>s+r.venda,0),cup=cs.reduce((s,r)=>s+(+r.cupons||0),0),ignored=imps.reduce((s,i)=>s+(+i.ignoradas||0),0),missCols=imps.flatMap(i=>i.colunas_faltantes||[]),alerts=[];if(missing.length)alerts.push('Arquivos faltantes: '+missing.map(t=>TYPES[t].label).join(', '));if(!rr.venda_total)alerts.push('Resumo geral ausente.');if(!sum)alerts.push('Campanhas/ofertas ausentes.');if(ignored)alerts.push('Existem linhas ignoradas.');if(missCols.length)alerts.push('Existem colunas faltantes.');let st='Pendente';if(types.length)st=missing.length?'Parcial':'Auditado';if(alerts.length&&types.length)st='Com erro';if(db.aprovacoes[key(loja,mes)]?.status=='Aprovado')st='Aprovado';return{loja,mes,imps,types,missing,rr,cs,sum,cup,ignored,missCols,alerts,status:st,part:rr.venda_total?sum/rr.venda_total*100:0,diff:(+rr.venda_total||0)-sum,last:imps[0]?.data||'',obs:db.aprovacoes[key(loja,mes)]?.obs||imps[0]?.observacao||''}}
function statusPill(st){return st=='Aprovado'?`<span class="pill ok">Aprovado</span>`:st=='Auditado'?`<span class="pill info">Auditado</span>`:st=='Importado'||st=='Parcial'?`<span class="pill warn">${st}</span>`:st=='Com erro'?`<span class="pill bad">Com erro</span>`:`<span class="pill mutedpill">Pendente</span>`}function hasType(a,t){return a.types.includes(t)?'<span class="pill ok">Sim</span>':'<span class="pill mutedpill">Nao</span>'}
function card(a,b,c){return`<div class="card"><div class="label">${a}</div><div class="value">${b}</div><div class="hint">${c}</div></div>`}function bars(title,rs,val,format=brl){let max=Math.max(1,...rs.map(val));return`<div class="panel"><h2>${title}</h2>${rs.slice(0,12).map(r=>`<div class="barrow"><div><b>${r.loja||r.descricao}</b><div class="track"><div class="fill" style="width:${Math.max(3,val(r)/max*100)}%"></div></div></div><div>${format(val(r))}</div></div>`).join('')}</div>`}
function planoRows(){let f=filters();return db.empresas.filter(e=>f.regiao=='Todas'||e.regiao==f.regiao).map(e=>({...audit(e.nome,f.mes),regiao:e.regiao}))}function plano(){let rs=planoRows(),total=rs.length,pend=rs.filter(r=>r.status=='Pendente'||r.status=='Parcial').length,comp=rs.filter(r=>r.status=='Aprovado').length,err=rs.filter(r=>r.status=='Com erro').length,av=total?comp/total*100:0;return`<div class="grid cards">${card('Total de lojas',total,'Plano do mes')}${card('Lojas pendentes',pend,'Sem aprovacao')}${card('Lojas completas',comp,'Status Aprovado')}${card('Lojas com erro',err,'Auditoria critica')}${card('% avanco',pct(av),'Aprovadas / total')}</div><div class="panel mt"><h2>Plano de Coleta 27 Lojas</h2><div class="table"><table><tr><th>Loja</th><th>Regiao</th><th>Status</th><th>Resumo?</th><th>Campanhas?</th><th>Produtos?</th><th>Departamentos?</th><th>Cupons?</th><th>Ultima importacao</th><th>Observacao</th><th>Acoes</th></tr>${rs.map(r=>`<tr><td><b>${r.loja}</b></td><td>${r.regiao}</td><td>${statusPill(r.status)}</td><td>${hasType(r,'resumo_geral_loja')}</td><td>${hasType(r,'campanhas_ofertas')}</td><td>${hasType(r,'produtos_campanha')}</td><td>${hasType(r,'departamentos_campanha')}</td><td>${hasType(r,'cupons_totais')}</td><td>${r.last||'-'}</td><td>${r.obs||'-'}</td><td><button class="btn" onclick="openAudit('${r.loja}')">Ver auditoria</button> <button class="btn primary" onclick="approve('${r.loja}')">Aprovar lote</button> <button class="btn" onclick="reprocess('${r.loja}')">Reprocessar</button></td></tr>`).join('')}</table></div></div>`}function openAudit(loja){fLoja.value=loja;go('auditoria')}function approve(loja){let a=audit(loja,fMes.value);if(a.status=='Com erro'||a.status=='Pendente'||a.missing.length){if(!confirm('Este lote nao esta completo. Aprovar mesmo assim?'))return}let obs=prompt('Observacao da aprovacao:',a.obs||'Validado com VR')||'';db.aprovacoes[key(loja,fMes.value)]={status:'Aprovado',data:new Date().toLocaleString('pt-BR'),obs};save();render()}function reprocess(loja){delete db.aprovacoes[key(loja,fMes.value)];fLoja.value=loja;go('importacoes')}
function auditoria(){let a=audit(),cls=a.status=='Aprovado'||a.status=='Auditado'?'ok':a.status=='Com erro'?'bad':a.status=='Parcial'?'warn':'info';return`<div class="grid cards">${card('Status',statusPill(a.status),'Confiabilidade')}${card('Arquivos',a.imps.length,'Historico loja/mes')}${card('Tipos',a.types.length+' / 5','Cobertura')}${card('Linhas ignoradas',num(a.ignored),'Erros')}${card('Participacao',pct(a.part),'Campanhas / total')}</div><div class="grid two mt"><div class="panel"><h2>Arquivos importados</h2><div class="table"><table><tr><th>Arquivo</th><th>Tipo</th><th>Linhas</th><th>Ignoradas</th><th>Colunas faltantes</th><th>Data</th></tr>${a.imps.map(i=>`<tr><td>${i.arquivo}</td><td>${TYPES[i.tipo]?.label||i.tipo}</td><td>${i.linhas||0}</td><td>${i.ignoradas||0}</td><td>${(i.colunas_faltantes||[]).join(', ')||'-'}</td><td>${i.data}</td></tr>`).join('')||'<tr><td colspan="6">Nenhuma importacao.</td></tr>'}</table></div></div><div class="panel"><h2>Totais e alertas</h2><p>Venda total do resumo: <b>${brl(a.rr.venda_total)}</b></p><p>Soma das campanhas: <b>${brl(a.sum)}</b></p><p>Diferenca resumo x campanhas: <b>${brl(a.diff)}</b></p><p>Cupons totais: <b>${num(a.rr.cupons_totais)}</b></p><p>Soma cupons por campanha: <b>${num(a.cup)}</b></p><h2>Arquivos faltantes</h2><p>${a.missing.map(t=>`<span class="pill warn">${TYPES[t].label}</span>`).join(' ')||'<span class="pill ok">Nenhum</span>'}</p>${a.alerts.map(x=>`<div class="alert ${a.status=='Com erro'?'bad':'warn'}">${x}</div>`).join('')||'<div class="alert ok">Sem alertas criticos.</div>'}</div></div>`}
function importacoes(){return`<div class="panel"><div class="toolbar"><h2>Importacao real por tipo</h2><button class="btn" onclick="template()">Baixar cabecalho</button><button class="btn" onclick="go('modelos')">Modelos SQL</button><button class="btn" onclick="go('auditoria')">Auditar</button></div><div class="drop"><div class="row"><select id="il">${db.empresas.map(l=>`<option ${l.nome==fLoja.value?'selected':''}>${l.nome}</option>`).join('')}</select><input id="im" type="month" value="${fMes.value}"><select id="it" onchange="showReq()">${ORDER.map(k=>`<option value="${k}">${TYPES[k].label}</option>`).join('')}</select><textarea id="io" placeholder="Observacao obrigatoria"></textarea></div><input id="files" type="file" accept=".txt" multiple><div id="req" class="muted"></div><pre id="prev" class="preview" style="display:none"></pre><div id="ir"></div><button class="btn primary" onclick="processImport()">Importar arquivo(s)</button></div></div><div class="panel mt"><h2>Historico</h2>${history()}</div>`}function history(){return db.importacoes.length?`<div class="table"><table><tr><th>Data</th><th>Arquivo</th><th>Loja</th><th>Mes</th><th>Tipo</th><th>Linhas</th><th>Ignoradas</th><th>Colunas faltantes</th><th>Obs.</th></tr>${db.importacoes.map(i=>`<tr><td>${i.data}</td><td>${i.arquivo}</td><td>${i.loja}</td><td>${i.mes}</td><td>${TYPES[i.tipo]?.label||i.tipo}</td><td>${i.linhas||0}</td><td>${i.ignoradas||0}</td><td>${(i.colunas_faltantes||[]).join(', ')||'-'}</td><td>${i.observacao||''}</td></tr>`).join('')}</table></div>`:'<p class="muted">Nenhuma importacao.</p>'}function showReq(){if(window.req)req.innerHTML='<b>Colunas obrigatorias:</b> '+TYPES[it.value].cols.join('; ')}function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}function parseNum(v){if(v==null||String(v).trim()==='')return'';let s=String(v).trim();if(/^[-+]?\d{1,3}(\.\d{3})+,\d+$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');let n=Number(s);return Number.isFinite(n)?n:v}async function readText(file){let buf=await file.arrayBuffer(),text=new TextDecoder('utf-8').decode(buf);if(text.includes('\uFFFD'))text=new TextDecoder('iso-8859-1').decode(buf);return text.replace(/^\uFEFF/,'')}function parseTxt(text){let lines=text.split(/\r?\n/).filter(x=>x.trim()),head=lines[0].split(';').map(norm);let rows=lines.slice(1).map(line=>{let cells=line.split(';');return Object.fromEntries(head.map((h,i)=>[h,parseNum(cells[i]??'')]))});return{head,rows,preview:lines.slice(0,8).join('\n')}}async function processImport(){let fs=[...files.files],loja=il.value,mes=im.value,tipo=it.value,obs=io.value.trim();if(!loja||!mes||!tipo||!obs){ir.innerHTML='<span class="pill bad">Informe loja, mes/ano, tipo e observacao.</span>';return}if(!fs.length||fs.some(f=>!f.name.toLowerCase().endsWith('.txt'))){ir.innerHTML='<span class="pill bad">Importe somente .txt.</span>';return}delete db.aprovacoes[key(loja,mes)];let all=[],hist=[],errors=[];for(let f of fs){let p=parseTxt(await readText(f)),missing=TYPES[tipo].cols.filter(c=>!p.head.includes(c));prev.style.display='block';prev.textContent=p.preview;if(missing.length){errors.push(`${f.name}: ${missing.join(', ')}`);hist.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,mes,tipo,linhas:0,ignoradas:p.rows.length,colunas_faltantes:missing,observacao:obs});continue}let rows=p.rows.map(r=>({...r,loja,mes,__tipo:tipo}));all=all.concat(rows);hist.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,mes,tipo,linhas:rows.length,ignoradas:0,colunas_faltantes:[],observacao:obs})}if(all.length)saveRows(tipo,all,loja,mes);db.importacoes.unshift(...hist);save();setupFilters();render();if(page=='importacoes')ir.innerHTML=errors.length?`<div class="alert bad">${errors.join('<br>')}</div>`:`<span class="pill ok">${hist.length} arquivo(s), ${all.length} linhas importadas.</span>`}function saveRows(tipo,rows,loja,mes){let b=TYPES[tipo].bucket;db[b]=db[b].filter(r=>!(r.loja==loja&&r.mes==mes&&r.__tipo==tipo)).concat(rows)}function template(){let tipo=(window.it&&it.value)||'resumo_geral_loja',blob=new Blob([TYPES[tipo].cols.join(';')+'\n']),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=TYPES[tipo].file;a.click();URL.revokeObjectURL(a.href)}
function dashboard(){let rs=rowsCamp().sort((a,b)=>b.venda-a.venda),t=total(rs);return cards(t)+`<div class="grid two mt">${bars('Ranking por venda',rs,r=>r.venda)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}</div><div class="panel mt"><h2>Campanhas</h2>${campTable(rs)}</div>`}function total(rs){let v=rs.reduce((s,r)=>s+r.venda,0),l=rs.reduce((s,r)=>s+r.lucro,0),c=rs.reduce((s,r)=>s+(+r.cupons||0),0),rr=res(fLoja.value=='Todas'?'Loja 01':fLoja.value,fMes.value);return{vendaTotal:+rr.venda_total||0,venda:v,lucro:l,cupons:c,cuponsTotal:+rr.cupons_totais||0,part:rr.venda_total?v/rr.venda_total*100:0,margem:v?l/v*100:0,pen:rr.cupons_totais?c/rr.cupons_totais*100:0}}function cards(t){return`<div class="grid cards">${card('Venda total',brl(t.vendaTotal),'Resumo')}${card('Venda prom.',brl(t.venda),'Campanhas')}${card('Part.',pct(t.part),'Prom./total')}${card('Margem',pct(t.margem),'Promocional')}${card('Penetracao',pct(t.pen),'Cupons')}</div>`}function campTable(rs){return`<div class="table"><table><tr><th>Loja</th><th>Campanha</th><th>Venda</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Pen.</th><th>Forca</th></tr>${rs.map(r=>`<tr><td>${r.loja}</td><td><b>${r.descricao}</b></td><td>${brl(r.venda)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(r.penetracao)}</td><td>${num(r.indice_forca)}</td></tr>`).join('')}</table></div>`}
function approvedStores(){return db.empresas.filter(e=>audit(e.nome,fMes.value).status=='Aprovado')}function consolidacao(){let lojas=approvedStores(),rs=lojas.map(e=>{let a=audit(e.nome,fMes.value),luc=a.cs.reduce((s,r)=>s+r.lucro,0);return{loja:e.nome,regiao:e.regiao,vendaTotal:+a.rr.venda_total||0,vendaProm:a.sum,lucro:luc,margem:a.sum?luc/a.sum*100:0,participacao:a.part,penetracao:a.rr.cupons_totais?a.cup/a.rr.cupons_totais*100:0,indice_forca:a.part*(a.rr.cupons_totais?a.cup/a.rr.cupons_totais*100:0)}}).sort((a,b)=>b.vendaProm-a.vendaProm);return`<div class="alert info">Regra ativa: somente lojas com status <b>Aprovado</b> entram na consolidacao final.</div><div class="grid two mt">${bars('Venda promocional aprovada',rs,r=>r.vendaProm)}${bars('Indice de forca aprovado',[...rs].sort((a,b)=>b.indice_forca-a.indice_forca),r=>r.indice_forca,v=>num(v))}</div><div class="panel mt"><h2>Lojas aprovadas na consolidacao</h2><div class="table"><table><tr><th>Loja</th><th>Regiao</th><th>Venda total</th><th>Venda prom.</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Pen.</th><th>Forca</th></tr>${rs.map(r=>`<tr><td><b>${r.loja}</b></td><td>${r.regiao}</td><td>${brl(r.vendaTotal)}</td><td>${brl(r.vendaProm)}</td><td>${pct(r.participacao)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(r.penetracao)}</td><td>${num(r.indice_forca)}</td></tr>`).join('')||'<tr><td colspan="9">Nenhuma loja aprovada para este mes.</td></tr>'}</table></div></div>`}
function modelos(){let tipo=(window.sqlTipo&&sqlTipo.value)||'resumo_geral_loja';return`<div class="panel"><h2>Modelos SQL</h2><div class="row"><select id="sqlTipo" onchange="render()">${ORDER.map(k=>`<option value="${k}" ${k==tipo?'selected':''}>${TYPES[k].label} - ${TYPES[k].file}</option>`).join('')}</select><button class="btn primary" onclick="copySql()">Copiar SQL</button></div><pre id="sqlBox" class="sql">${sql(tipo)}</pre></div><div class="panel mt"><h2>Consultas oficiais</h2><div class="table"><table><tr><th>Consulta</th><th>Arquivo</th><th>Colunas</th></tr>${ORDER.map(k=>`<tr><td><b>${TYPES[k].label}</b></td><td>${TYPES[k].file}</td><td>${TYPES[k].cols.join('; ')}</td></tr>`).join('')}</table></div></div>`}function sql(t){return`-- Modelo oficial: ${TYPES[t].file}\n-- Troque :id_loja, :mes, :data_inicio, :data_fim\n-- Colunas: ${TYPES[t].cols.join('; ')}\n\nSELECT ...\n-- Consulte a pasta /sql do repositorio para a consulta completa.`}function copySql(){navigator.clipboard.writeText(sqlBox.textContent).then(()=>alert('SQL copiado.'))}
function empresas(){return`<div class="panel"><h2>Cadastro de empresas</h2><div class="row"><input id="eCodigo" placeholder="Codigo"><input id="eVr" placeholder="ID VR"><input id="eNome" placeholder="Nome"><input id="eRegiao" placeholder="Regiao"><input id="eCidade" placeholder="Cidade"><input id="eUf" placeholder="UF"><select id="eStatus"><option>Ativa</option><option>Inativa</option></select><button class="btn primary" onclick="addEmpresa()">Salvar</button></div></div><div class="panel mt"><h2>Empresas</h2><div class="table"><table><tr><th>Codigo</th><th>ID VR</th><th>Nome</th><th>Regiao</th><th>Cidade</th><th>UF</th><th>Status</th><th></th></tr>${db.empresas.map((e,i)=>`<tr><td>${e.codigo}</td><td>${e.id_vr}</td><td><b>${e.nome}</b></td><td>${e.regiao}</td><td>${e.cidade||''}</td><td>${e.uf||''}</td><td>${e.status}</td><td><button class="btn" onclick="editEmpresa(${i})">Editar</button></td></tr>`).join('')}</table></div></div>`}function addEmpresa(){let codigo=eCodigo.value.trim(),nome=eNome.value.trim();if(!codigo||!nome)return alert('Informe codigo e nome.');let obj={codigo,id_vr:eVr.value.trim()||codigo,nome,regiao:eRegiao.value.trim()||'Sem regiao',cidade:eCidade.value.trim(),uf:eUf.value.trim(),status:eStatus.value};let i=db.empresas.findIndex(x=>x.codigo==codigo);if(i>=0)db.empresas[i]=obj;else db.empresas.push(obj);save();setupFilters();render()}function editEmpresa(i){let e=db.empresas[i];eCodigo.value=e.codigo;eVr.value=e.id_vr;eNome.value=e.nome;eRegiao.value=e.regiao;eCidade.value=e.cidade||'';eUf.value=e.uf||'';eStatus.value=e.status||'Ativa'}function relatorio(){return auditoria()+`<div class="panel mt"><h2>Proxima acao</h2><p>Use o Plano de Coleta para aprovar somente lotes validados antes da consolidacao final.</p></div>`}
function setupFilters(){let old=[fLoja.value,fRegiao.value,fCamp.value];fLoja.innerHTML='<option>Todas</option>'+db.empresas.map(e=>`<option>${e.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.empresas.map(e=>e.regiao))].map(r=>`<option>${r}</option>`).join('');fCamp.innerHTML='<option>Todas</option>'+[...new Set(db.campanhas.map(c=>c.descricao).filter(Boolean))].map(c=>`<option>${c}</option>`).join('');[fLoja.value,fRegiao.value,fCamp.value]=old;if(!fLoja.value)fLoja.value='Loja 01';if(!fRegiao.value)fRegiao.value='Todas';if(!fCamp.value)fCamp.value='Todas'}function go(p){page=p;render()}function render(){nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${l}</button>`).join('');let meta={dashboard:['Dashboard Executivo','Analise da loja/mes selecionado.'],importacoes:['Importacoes','Importe os TXT por loja, mes e tipo.'],auditoria:['Auditoria da Importacao','Valide se pode confiar nos dados.'],plano:['Plano de Coleta 27 Lojas','Controle lotes importados, auditados e aprovados.'],modelos:['Modelos SQL','Consultas oficiais para gerar TXT no VR.'],empresas:['Empresas','Cadastro das lojas e ID VR.'],consolidacao:['Consolidacao Final','Somente lojas aprovadas entram aqui.'],relatorio:['Relatorio Executivo','Resumo operacional do lote.']}[page];title.textContent=meta[0];sub.textContent=meta[1];view.innerHTML=({dashboard,importacoes,auditoria,plano,modelos,empresas,consolidacao,relatorio})[page]();if(page=='importacoes')showReq()}['fLoja','fRegiao','fMes','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));setupFilters();render();
</script></body></html>
