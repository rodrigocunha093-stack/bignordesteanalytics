</style></head><body><div class="app"><aside><div class="brand"><b>BIGNORDESTE</b><span>ANALYTICS</span></div><nav id="nav"></nav></aside><main><header><div><h1 id="title"></h1><div id="sub" class="sub"></div></div><div class="filters"><select id="fLoja"></select><select id="fRegiao"></select><input id="fInicio" type="date" value="2026-01-01"><input id="fFim" type="date" value="2026-07-01"><select id="fVisao"><option value="acumulado">Acumulado</option><option value="mensal">Mensal</option></select><select id="fCamp"></select></div></header><section id="view"></section></main></div><script>

function monthsBetween(ini,fim){let out=[],d=new Date(ini+'T00:00:00'),end=new Date(fim+'T00:00:00');while(d<end){out.push(d.toISOString().slice(0,7));d=new Date(d.getFullYear(),d.getMonth()+1,1)}return out}function inPeriod(m){return monthsBetween(fInicio.value,fFim.value).includes(m)}function periodKey(loja){return loja+'|'+fInicio.value+'|'+fFim.value}
function seed(){let empresas=Array.from({length:27},(_,i)=>({codigo:String(i+1).padStart(2,'0'),id_vr:String(i+1),nome:'Loja '+String(i+1).padStart(2,'0'),regiao:['Natal','Agreste','Sertao','Litoral'][i%4],cidade:['Natal','Parnamirim','Mossoro','Caico'][i%4],uf:'RN',status:'Ativa'}));let meses=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'];let resumos=meses.map((m,i)=>({loja:'Loja 01',mes:m,venda_total:3042701.83+i*85000,custo_total:2650820.21+i*72000,lucro_total:391881.62+i*13000,margem_total:12.88,cupons_totais:62761+i*900,unidades_totais:489300+i*14000,produtos_distintos:740,__tipo:'resumo_geral_loja'}));let nomes=['ENCARTE BIG NORDESTE','FDS DE OFERTAS','DIA BIG','SEMANA DE OFERTAS'];let campanhas=meses.flatMap((m,mi)=>nomes.map((n,i)=>({loja:'Loja 01',mes:m,id_tipooferta:String(101+i),descricao:n,venda:[299097,227879,200699,115847][i]+mi*6000,custo:[261096,192757,196485,96654][i]+mi*4500,lucro:[38000,35121,4214,19192][i]+mi*900,margem:[12.71,15.41,2.10,16.57][i],quantidade:[53375,39124,42008,18142][i],itens:[690,490,430,260][i],produtos_distintos:[515,348,290,184][i],cupons:[10031,8210,11880,5138][i],ticket_medio:[29.82,27.76,16.89,22.55][i],preco_medio:[5.60,5.82,4.78,6.39][i],__tipo:'campanhas_ofertas'})));let departamentos=meses.map(m=>({loja:'Loja 01',mes:m,id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',mercadologico1:'1',descricao_departamento:'PERECIVEIS',produtos:180,quantidade:28842,venda:157302,lucro:19000,margem:11.9,__tipo:'departamentos_campanha'}));let produtos=meses.map(m=>({loja:'Loja 01',mes:m,id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',id_produto:'P1000',descricao_produto:'Produto promocional 01',quantidade:900,venda:24800,lucro:2480,margem:10,__tipo:'produtos_campanha'}));let cupons=campanhas.map(c=>({loja:c.loja,mes:c.mes,cupons_totais:resumos.find(r=>r.mes==c.mes).cupons_totais,campanha:c.descricao,cupons_campanha:c.cupons,__tipo:'cupons_totais'}));let importacoes=ORDER.map(t=>({data:new Date().toLocaleString('pt-BR'),arquivo:TYPES[t].file,loja:'Loja 01',periodo:'2026-01-01 a 2026-07-01',tipo:t,linhas:t=='resumo_geral_loja'?6:t=='campanhas_ofertas'||t=='cupons_totais'?24:6,ignoradas:0,colunas_faltantes:[],observacao:'Mock periodo jan-jun'}));return{empresas,resumos,campanhas,departamentos,produtos,cupons,importacoes,aprovacoes:{}}}
let db=JSON.parse(localStorage.getItem('bignordeste.analytics.periodo.v1')||'null')||seed();let page='decisao';function save(){localStorage.setItem('bignordeste.analytics.periodo.v1',JSON.stringify(db))}function empresa(nome){return db.empresas.find(e=>e.nome==nome)||{}}function statusPill(st){return st=='Aprovado'?`<span class="pill ok">Aprovado</span>`:st=='Auditado'?`<span class="pill info">Auditado</span>`:st=='Com erro'?`<span class="pill bad">Com erro</span>`:st=='Parcial'||st=='Importado'?`<span class="pill warn">${st}</span>`:`<span class="pill mutedpill">Pendente</span>`}function scopeRows(bucket,loja=fLoja.value){return db[bucket].filter(r=>(loja=='Todas'||r.loja==loja)&&inPeriod(r.mes)&&(fRegiao.value=='Todas'||empresa(r.loja).regiao==fRegiao.value))}function resumos(loja=fLoja.value){return scopeRows('resumos',loja)}function campanhas(loja=fLoja.value){return scopeRows('campanhas',loja).filter(r=>fCamp.value=='Todas'||r.descricao==fCamp.value).map(calc)}function calc(r){let rr=db.resumos.find(x=>x.loja==r.loja&&x.mes==r.mes)||{},v=+r.venda||0,l=+r.lucro||0,c=+r.cupons||0,part=rr.venda_total?v/rr.venda_total*100:0,pen=rr.cupons_totais?c/rr.cupons_totais*100:0,prod=+r.produtos_distintos||0,q=+r.quantidade||0;return{...r,venda:v,lucro:l,participacao:part,penetracao:pen,ticket_medio:+r.ticket_medio||(c?v/c:0),preco_medio:+r.preco_medio||(q?v/q:0),lucro_cupom:c?l/c:0,venda_produto:prod?v/prod:0,lucro_produto:prod?l/prod:0,indice_forca:part*pen,indice_eficiencia:part*(+r.margem||0)}}function total(loja=fLoja.value){let cs=campanhas(loja),rs=resumos(loja),v=cs.reduce((s,r)=>s+r.venda,0),l=cs.reduce((s,r)=>s+r.lucro,0),vt=rs.reduce((s,r)=>s+(+r.venda_total||0),0),ct=rs.reduce((s,r)=>s+(+r.cupons_totais||0),0),cup=cs.reduce((s,r)=>s+(+r.cupons||0),0);return{v,l,vt,ct,cup,part:vt?v/vt*100:0,margem:v?l/v*100:0,pen:ct?cup/ct*100:0}}function card(a,b,c){return`<div class="card"><div class="label">${a}</div><div class="value">${b}</div><div class="hint">${c}</div></div>`}function cards(t){return`<div class="grid cards">${card('Venda total',brl(t.vt),'Periodo')}${card('Venda prom.',brl(t.v),'Campanhas')}${card('Part.',pct(t.part),'Prom./total')}${card('Margem',pct(t.margem),'Promocional')}${card('Penetracao',pct(t.pen),'Cupons')}</div>`}function bars(title,rows,val,fmt=brl,label){let m=Math.max(1,...rows.map(val));let name=label||((r)=>r.mes||r.loja||r.descricao);return`<div class="panel"><h2>${title}</h2>${rows.slice(0,12).map(r=>`<div class="barrow"><div><b>${name(r)}</b><div class="track"><div class="fill" style="width:${Math.max(3,val(r)/m*100)}%"></div></div></div><div>${fmt(val(r))}</div></div>`).join('')}</div>`}function dashCampaignRows(){let cs=campanhas(),t=total(),rows=sumBy(cs,r=>r.descricao,(r,k)=>({descricao:k,venda:0,lucro:0,cupons:0,quantidade:0,produtos:0}),(a,r)=>{a.venda+=r.venda;a.lucro+=r.lucro;a.cupons+=+r.cupons||0;a.quantidade+=+r.quantidade||0;a.produtos+=+r.produtos_distintos||0});rows.forEach(r=>{r.margem=r.venda?r.lucro/r.venda*100:0;r.participacao=t.vt?r.venda/t.vt*100:0;r.penetracao=t.ct?r.cupons/t.ct*100:0});let max={venda:Math.max(1,...rows.map(r=>r.venda)),lucro:Math.max(1,...rows.map(r=>r.lucro)),pen:Math.max(1,...rows.map(r=>r.penetracao)),margem:Math.max(1,...rows.map(r=>Math.max(0,r.margem)))};rows.forEach(r=>{r.score=Math.round((r.venda/max.venda*30)+(Math.max(0,r.lucro)/max.lucro*25)+(r.penetracao/max.pen*25)+(Math.max(0,r.margem)/max.margem*20));r.recomendacao=r.margem<5?'Revisar composicao':r.score>=80?'Repetir/Reforcar':r.score>=65?'Manter com ajuste':'Revisar mecanica'});return rows.sort((a,b)=>b.venda-a.venda)}
function dashDepartments(camp){let rows=scopeRows('departamentos').filter(r=>!camp||r.campanha==camp),tv=rows.reduce((s,r)=>s+(+r.venda||0),0),out=sumBy(rows,r=>r.descricao_departamento,(r,k)=>({departamento:k,venda:0,lucro:0,produtos:0}),(a,r)=>{a.venda+=+r.venda||0;a.lucro+=+r.lucro||0;a.produtos+=+r.produtos||0});out.forEach(r=>{r.part=tv?r.venda/tv*100:0;r.margem=r.venda?r.lucro/r.venda*100:0});return out.sort((a,b)=>b.venda-a.venda)}
function dashProducts(camp){let rows=scopeRows('produtos').filter(r=>!camp||r.campanha==camp),out=sumBy(rows,r=>r.id_produto+'|'+r.descricao_produto+'|'+r.campanha,(r,k)=>({produto:r.descricao_produto,campanha:r.campanha,venda:0,lucro:0,quantidade:0}),(a,r)=>{a.venda+=+r.venda||0;a.lucro+=+r.lucro||0;a.quantidade+=+r.quantidade||0});out.forEach(r=>r.margem=r.venda?r.lucro/r.venda*100:0);return out.sort((a,b)=>b.venda-a.venda)}

function dashMonthRows(){return monthsBetween(fInicio.value,fFim.value).map(m=>{let cs=campanhas().filter(r=>r.mes==m),rs=resumos().filter(r=>r.mes==m),v=cs.reduce((s,r)=>s+r.venda,0),l=cs.reduce((s,r)=>s+r.lucro,0),vt=rs.reduce((s,r)=>s+(+r.venda_total||0),0);return{mes:m,venda:v,lucro:l,part:vt?v/vt*100:0,margem:v?l/v*100:0,incompleto:!rs.length||!cs.length}})}

lass="panel mt"><h2>Resposta para a Jessica</h2><div class="answer-grid"><div class="answer"><div class="label">Campanha mais forte</div><b>${top.descricao||'-'}</b><div class="hint">Venda e score promocional</div></div><div class="answer"><div class="label">Melhor equilibrio venda/margem</div><b>${balanced.descricao||'-'}</b><div class="hint">Margem saudavel com escala</div></div><div class="answer"><div class="label">Maior risco de margem</div><b>${risk.descricao||'-'}</b><div class="hint">${pct(risk.margem||0)}</div></div><div class="answer"><div class="label">Departamento que sustenta</div><b>${deptTop.departamento||'-'}</b><div class="hint">${deptTop.part?pct(deptTop.part):'Sem dados'}</div></div></div></div><div class="grid two mt"><div class="panel"><h2>Campanha x Venda x Margem</h2><div class="matrix"><div class="quadrant"><div class="quad-title">Alta venda / alta margem</div>${quad(true,true).map(r=>badge(r.descricao,'ok')).join(' ')||'<span class="muted">Sem campanhas</span>'}</div><div class="quadrant"><div class="quad-title">Alta venda / baixa margem</div>${quad(true,false).map(r=>badge(r.descricao,'warn')).join(' ')||'<span class="muted">Sem campanhas</span>'}</div><div class="quadrant"><div class="quad-title">Baixa venda / alta margem</div>${quad(false,true).map(r=>badge(r.descricao,'info')).join(' ')||'<span class="muted">Sem campanhas</span>'}</div><div class="quadrant"><div class="quad-title">Baixa venda / baixa margem</div>${quad(false,false).map(r=>badge(r.descricao,'bad')).join(' ')||'<span class="muted">Sem campanhas</span>'}</div></div></div><div class="panel"><h2>Ranking inteligente de campanhas</h2>${camps.map(r=>`<div class="campaign-card"><b>${r.descricao}</b> ${r.margem<5?badge('Critico','bad'):r.score>=80?badge('Recomendado','ok'):badge('Atencao','warn')}<div class="metric-row"><div class="metric"><span class="label">Venda</span><br>${brl(r.venda)}</div><div class="metric"><span class="label">Lucro</span><br>${brl(r.lucro)}</div><div clas function importacoes(){return`<div class="panel"><div class="toolbar"><h2>Importar periodo mensalizado</h2><button class="btn" onclick="template()">Baixar cabecalho</button><button class="btn" onclick="go('auditoria')">Auditar</button></div><div class="drop"><div class="row"><select id="il">${db.empresas.map(e=>`<option ${e.nome==fLoja.value?'selected':''}>${e.nome}</option>`).join('')}</select><input id="ii" type="date" value="${fInicio.value}"><input id="ifim" type="date" value="${fFim.value}"><select id="it" onchange="showReq()">${ORDER.map(k=>`<option value="${k}">${TYPES[k].label}</option>`).join('')}</select></div><textarea id="io" placeholder="Observacao opcional"></textarea><input id="files" type="file" accept=".txt" multiple><div id="req" class="muted"></div><pre id="prev" class="preview" style="display:none"></pre><div id="ir"></div><button class="btn primary" onclick="processImport()">Importar arquivo(s)</button></div></div><div class="panel mt"><h2>Historico</h2>${history()}</div>`}function history(){return db.importacoes.length?`<div class="table"><table><tr><th>Data</th><th>Arquivo</th><th>Loja</th><th>Periodo</th><th>Tipo</th><th>Linhas</th><th>Ignoradas</th><th>Colunas faltantes</th><th>Obs.</th></tr>${db.importacoes.map(i=>`<tr><td>${i.data}</td><td>${i.arquivo}</td><td>${i.loja}</td><td>${i.periodo||''}</td><td>${TYPES[i.tipo]?.label||i.tipo}</td><td>${i.linhas||0}</td><td>${i.ignoradas||0}</td><td>${(i.colunas_faltantes||[]).join(', ')||'-'}</td><td>${i.observacao||''}</td></tr>`).join('')}</table></div>`:'<p class="muted">Nenhuma importacao.</p>'}function showReq(){if(window.req)req.innerHTML='<b>Colunas obrigatorias:</b> '+TYPES[it.value].cols.join('; ')}function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}function parseNum(v){if(v==null||String(v).trim()==='')return'';let s=String(v).trim();if(/^[-+]?\d{1,3}(\.\d{3})+,\d+$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');let n=Number(s);return Number.isFinite(n)?n:v}async function readText(file){let buf=await file.arrayBuffer(),text=new TextDecoder('utf-8').decode(buf);if(text.includes('\uFFFD'))text=new TextDecoder('iso-8859-1').decode(buf);return text.replace(/^\uFEFF/,'')}function parseTxt(text){let lines=text.split(/\r?\n/).filter(x=>x.trim()),head=lines[0].split(';').map(norm);let rows=lines.slice(1).map(line=>{let cells=line.split(';');return Object.fromEntries(head.map((h,i)=>[h,parseNum(cells[i]??'')]))});return{head,rows,preview:lines.slice(0,8).join('\n')}}async function processImport(){let fs=[...files.files],loja=il.value,ini=ii.value,fim=ifim.value,tipo=it.value,obs=io.value.trim();if(!loja||!ini||!fim||!tipo)return ir.innerHTML='<span class="pill bad">Informe loja, data inicial, data final e tipo.</span>';if(!obs)obs='Sem observacao';if(!fs.length||fs.some(f=>!f.name.toLowerCase().endsWith('.txt')))return ir.innerHTML='<span class="pill bad">Importe somente .txt.</span>';delete db.aprovacoes[periodKey(loja)];let allowed=monthsBetween(ini,fim),all=[],hist=[],errors=[];for(let f of fs){let p=parseTxt(await readText(f)),missing=TYPES[tipo].cols.filter(c=>!p.head.includes(c));prev.style.display='block';prev.textContent=p.preview;if(missing.length){errors.push(`${f.name}: ${missing.join(', ')}`);hist.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,periodo:ini+' a '+fim,tipo,linhas:0,ignoradas:p.rows.length,colunas_faltantes:missing,observacao:obs});continue}let rows=p.rows.filter(r=>allowed.includes(String(r.mes))).map(r=>({...r,loja,__loja_vr:r.loja||'',__tipo:tipo}));all=all.concat(rows);hist.push({data:new Date().toLocaleString('pt-BR'),arquivo:f.name,loja,periodo:ini+' a '+fim,tipo,linhas:rows.length,ignoradas:p.rows.length-rows.length,colunas_faltantes:[],observacao:obs})}if(all.length)saveRows(tipo,all,loja,allowed);db.importacoes.unshift(...hist);save();setupFilters();render();if(page=='importacoes')ir.innerHTML=errors.length?`<div class="alert bad">${errors.join('<br>')}</div>`:`<span class="pill ok">${hist.length} arquivo(s), ${all.length} linhas importadas.</span>`}function saveRows(tipo,rows,loja,months){let b=TYPES[tipo].bucket;db[b]=db[b].filter(r=>!(r.loja==loja&&months.includes(r.mes)&&r.__tipo==tipo)).concat(rows)}function template(){let tipo=(window.it&&it.value)||'resumo_geral_loja',blob=new Blob([TYPES[tipo].cols.join(';')+'\n']),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=TYPES[tipo].file;a.click();URL.revokeObjectURL(a.href)}
function audit(loja=fLoja.value){if(loja=='Todas')loja='Loja 01';let months=monthsBetween(fInicio.value,fFim.value),imps=db.importacoes.filter(i=>i.loja==loja&&i.periodo==fInicio.value+' a '+fFim.value),present={};ORDER.forEach(t=>present[t]=db[TYPES[t].bucket].some(r=>r.loja==loja&&months.includes(r.mes)&&r.__tipo==t));let missing=ORDER.filter(t=>!present[t]),t=total(loja),ignored=imps.reduce((s,i)=>s+(+i.ignoradas||0),0),cols=imps.flatMap(i=>i.colunas_faltantes||[]),alerts=[];if(missing.length)alerts.push('Arquivos faltantes: '+missing.map(t=>TYPES[t].label).join(', '));if(!t.vt)alerts.push('Resumo geral ausente no periodo.');if(!t.v)alerts.push('Campanhas/ofertas ausentes no periodo.');if(ignored)alerts.push('Existem linhas ignoradas.');if(cols.length)alerts.push('Existem colunas faltantes.');let st='Pendente';if(ORDER.length-missing.length>0)st=missing.length?'Parcial':'Auditado';if(alerts.length&&st!='Pendente')st='Com erro';if(db.aprovacoes[periodKey(loja)]?.status=='Aprovado')st='Aprovado';return{loja,months,imps,present,missing,total:t,ignored,cols,alerts,status:st,last:imps[0]?.data||'',obs:db.aprovacoes[periodKey(loja)]?.obs||imps[0]?.observacao||''}}function statusPill(st){return st=='Aprovado'?'<span class="pill ok">Aprovado</span>':st=='Auditado'?'<span class="pill info">Auditado</span>':st=='Com erro'?'<span class="pill bad">Com erro</span>':st=='Parcial'?'<span class="pill warn">Parcial</span>':'<span class="pill mutedpill">Pendente</span>'}function auditoria(){let a=audit();return`<div class="grid cards">${card('Status',statusPill(a.status),'Periodo')}${card('Arquivos',a.imps.length,'Historico')}${card('Meses',a.months.length,'No periodo')}${card('Linhas ignoradas',num(a.ignored),'Importacao')}${card('Part. prom.',pct(a.total.part),'Campanhas / total')}</div><div class="grid two mt"><div class="panel"><h2>Arquivos importados</h2>${history()}</div><div class="panel"><h2>Totais e alertas</h2><p>Venda total resumo: <b>${brl(a.total.vt)}</b></p><p>Soma campanhas: <b>${brl(a.total.v)}</b></p><p>Diferenca: <b>${brl(a.total.vt-a.total.v)}</b></p><p>Cupons totais: <b>${num(a.total.ct)}</b></p><p>Cupons campanhas: <b>${num(a.total.cup)}</b></p><h2>Arquivos faltantes</h2><p>${a.missing.map(t=>`<span class="pill warn">${TYPES[t].label}</span>`).join(' ')||'<span class="pill ok">Nenhum</span>'}</p>${a.alerts.map(x=>`<div class="alert ${a.status=='Com erro'?'bad':'warn'}">${x}</div>`).join('')||'<div class="alert ok">Sem alertas criticos.</div>'}</div></div>`}
function plano(){let rs=db.empresas.filter(e=>fRegiao.value=='Todas'||e.regiao==fRegiao.value).map(e=>({...audit(e.nome),regiao:e.regiao})),tot=rs.length,ap=rs.filter(r=>r.status=='Aprovado').length,err=rs.filter(r=>r.status=='Com erro').length,pend=rs.filter(r=>r.status!='Aprovado').length;return`<div class="grid cards">${card('Total lojas',tot,'Periodo')}${card('Pendentes',pend,'Nao aprovadas')}${card('Completas',ap,'Aprovadas')}${card('Com erro',err,'Auditoria')}${card('% avanco',pct(tot?ap/tot*100:0),'Aprovadas')}</div><div class="panel mt"><h2>Plano de Coleta 27 Lojas</h2><div class="table"><table><tr><th>Loja</th><th>Regiao</th><th>Status</th><th>Resumo?</th><th>Campanhas?</th><th>Produtos?</th><th>Departamentos?</th><th>Cupons?</th><th>Ultima importacao</th><th>Observacao</th><th>Acoes</th></tr>${rs.map(r=>`<tr><td><b>${r.loja}</b></td><td>${r.regiao}</td><td>${statusPill(r.status)}</td>${ORDER.map(t=>`<td>${r.present[t]?'<span class="pill ok">Sim</span>':'<span class="pill mutedpill">Nao</span>'}</td>`).join('')}<td>${r.last||'-'}</td><td>${r.obs||'-'}</td><td><button class="btn" onclick="openAudit('${r.loja}')">Ver auditoria</button> <button class="btn primary" onclick="approve('${r.loja}')">Aprovar lote</button> <button class="btn" onclick="reprocess('${r.loja}')">Reprocessar</button></td></tr>`).join('')}</table></div></div>`}function openAudit(l){fLoja.value=l;go('auditoria')}function approve(l){let a=audit(l);if(a.status=='Com erro'||a.status=='Pendente'||a.missing.length){if(!confirm('Lote incompleto ou com erro. Aprovar mesmo assim?'))return}db.aprovacoes[periodKey(l)]={status:'Aprovado',data:new Date().toLocaleString('pt-BR'),obs:prompt('Observacao:',a.obs||'Validado com VR')||''};save();render()}function reprocess(l){delete db.aprovacoes[periodKey(l)];fLoja.value=l;go('importacoes')}
function consolidacao(){let lojas=db.empresas.filter(e=>audit(e.nome).status=='Aprovado'),data=[];if(fVisao.value=='mensal'){lojas.forEach(e=>monthsBetween(fInicio.value,fFim.value).forEach(m=>{let cs=db.campanhas.filter(r=>r.loja==e.nome&&r.mes==m).map(calc),rr=db.resumos.find(r=>r.loja==e.nome&&r.mes==m)||{},v=cs.reduce((s,r)=>s+r.venda,0),l=cs.reduce((s,r)=>s+r.lucro,0);data.push({loja:e.nome,mes:m,regiao:e.regiao,vt:+rr.venda_total||0,v,l,margem:v?l/v*100:0,part:rr.venda_total?v/rr.venda_total*100:0})}))}else{lojas.forEach(e=>{let t=total(e.nome);data.push({loja:e.nome,mes:'Periodo',regiao:e.regiao,vt:t.vt,v:t.v,l:t.l,margem:t.margem,part:t.part})})}return`<div class="alert info">Regra ativa: apenas lojas aprovadas entram na Consolidacao Final.</div><div class="panel mt"><h2>${fVisao.value=='mensal'?'Visao mensal':'Visao acumulada do periodo'}</h2><div class="table"><table><tr><th>Loja</th><th>Mes</th><th>Regiao</th><th>Venda total</th><th>Venda prom.</th><th>Part.</th><th>Lucro</th><th>Margem</th></tr>${data.map(r=>`<tr><td>${r.loja}</td><td>${r.mes}</td><td>${r.regiao}</td><td>${brl(r.vt)}</td><td>${brl(r.v)}</td><td>${pct(r.part)}</td><td>${brl(r.l)}</td><td>${pct(r.margem)}</td></tr>`).join('')||'<tr><td colspan="8">Nenhuma loja aprovada.</td></tr>'}</table></div></div>`}
function modelos(){let loja=fLoja.value=='Todas'?'Loja 01':fLoja.value,tipo=(window.sqlTipo&&sqlTipo.value)||'resumo_geral_loja';return`<div class="panel"><h2>Modelos SQL por periodo mensalizado</h2><div class="row"><select id="sqlTipo" onchange="render()">${ORDER.map(k=>`<option value="${k}" ${k==tipo?'selected':''}>${TYPES[k].label} - ${TYPES[k].file}</option>`).join('')}</select><button class="btn primary" onclick="copySql()">Copiar SQL</button></div><p class="muted">Use loja, data inicial e data final. A coluna mes e gerada por TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM').</p><pre id="sqlBox" class="sql">${makeSql(tipo,empresa(loja),fInicio.value,fFim.value)}</pre></div>`}function makeSql(tipo,e,ini,fim){let id=e.id_vr||1;if(tipo=='cupons_totais')return `SELECT
    v.id_loja AS loja,

    TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,

    ct.cupons_totais,

    t.descricao AS campanha,

    COUNT(DISTINCT v.id) AS cupons_campanha

FROM pdv.vendaitem i

INNER JOIN pdv.venda v
    ON v.id = i.id_venda

INNER JOIN public.tipooferta t
    ON t.id = i.id_tipooferta

INNER JOIN (
    SELECT
        id_loja,
        DATE_TRUNC('month', data) AS mes_ref,
        COUNT(DISTINCT id) AS cupons_totais
    FROM pdv.venda
    WHERE id_loja = 1
      AND data >= '2026-01-01'
      AND data < '2026-07-01'
      AND cancelado = FALSE
    GROUP BY
        id_loja,
        DATE_TRUNC('month', data)
) ct
    ON ct.id_loja = v.id_loja
   AND ct.mes_ref = DATE_TRUNC('month', v.data)

WHERE v.id_loja = 1
  AND v.data >= '2026-01-01'
  AND v.data < '2026-07-01'
  AND v.cancelado = FALSE
  AND i.oferta = TRUE

GROUP BY
    v.id_loja,
    DATE_TRUNC('month', v.data),
    ct.cupons_totais,
    t.descricao

ORDER BY
    mes,
    cupons_campanha DESC;`;
if(tipo=='departamentos_campanha')return `SELECT
    v.id_loja AS loja,

    TO_CHAR(
        DATE_TRUNC('month', v.data),
        'YYYY-MM'
    ) AS mes,

    i.id_tipooferta,

    t.descricao AS campanha,

    p.mercadologico1,

    m.descricao AS descricao_departamento,

    COUNT(DISTINCT i.id_produto) AS produtos,

    SUM(i.quantidade) AS quantidade,

    SUM(i.valortotal) AS venda,

    SUM(i.valortotal)
      - SUM(i.customediocomimposto * i.quantidade) AS lucro,

    ROUND(
        (
            SUM(i.valortotal)
            - SUM(i.customediocomimposto * i.quantidade)
        )
        /
        NULLIF(SUM(i.valortotal),0)
        * 100
    ,2) AS margem

FROM pdv.vendaitem i

INNER JOIN pdv.venda v
    ON v.id = i.id_venda

INNER JOIN public.tipooferta t
    ON t.id = i.id_tipooferta

INNER JOIN public.produto p
    ON p.id = i.id_produto

INNER JOIN public.mercadologico m
    ON m.mercadologico1 = p.mercadologico1
   AND m.nivel = 1

WHERE v.id_loja = 1
  AND v.data >= '2026-01-01'
  AND v.data < '2026-07-01'
  AND v.cancelado = FALSE
  AND i.oferta = TRUE

GROUP BY
    v.id_loja,
    DATE_TRUNC('month', v.data),
    i.id_tipooferta,
    t.descricao,
    p.mercadologico1,
    m.descricao

ORDER BY
    mes,
    campanha,
    venda DESC;`;
if(tipo=='produtos_campanha')return `SELECT
    v.id_loja AS loja,

    TO_CHAR(
        DATE_TRUNC('month', v.data),
        'YYYY-MM'
    ) AS mes,

    i.id_tipooferta,

    t.descricao AS campanha,

    i.id_produto,

    p.descricaocompleta AS descricao_produto,

    SUM(i.quantidade) AS quantidade,

    SUM(i.valortotal) AS venda,

    SUM(i.valortotal)
      - SUM(i.customediocomimposto * i.quantidade) AS lucro,

    ROUND(
        (
            SUM(i.valortotal)
            - SUM(i.customediocomimposto * i.quantidade)
        )
        /
        NULLIF(SUM(i.valortotal),0)
        * 100
    ,2) AS margem

FROM pdv.vendaitem i

INNER JOIN pdv.venda v

INNER JOIN public.tipooferta t

INNER JOIN public.produto p

WHERE v.id_loja = 1

  AND i.oferta = TRUE

GROUP BY

ORDER BY

if(tipo=='campanhas_ofertas')return `SELECT
    v.id_loja AS loja,

    TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,

    i.id_tipooferta,

INNER JOIN pdv.vendaitem i

INNER JOIN public.tipooferta t

WHERE v.id_loja = 1
  AND v.data >= '2026-01-01'

GROUP BY

ORDER BY

if(tipo=='resumo_geral_loja')return`SELECT\n    v.id_loja AS loja,\n    TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n    SUM(i.valortotal) AS venda_total,\n    SUM(i.customediocomimposto * i.quantidade) AS custo_total,\n    SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro_total,\n    ROUND((SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade)) / NULLIF(SUM(i.valortotal),0) * 100,2) AS margem_total,\n    COUNT(DISTINCT v.id) AS cupons_totais,\n    SUM(i.quantidade) AS unidades_totais,\n    COUNT(DISTINCT i.id_produto) AS produtos_distintos\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nWHERE v.id_loja = ${id}\n  AND v.data >= '${ini}'\n  AND v.data < '${fim}'\n  AND v.cancelado = FALSE\nGROUP BY v.id_loja, DATE_TRUNC('month', v.data)\nORDER BY mes;`;return`-- Modelo: ${TYPES[tipo].file}\n-- Troque loja e periodo. A consulta oficial completa esta na pasta /sql.\nSELECT v.id_loja AS loja, TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes, ...\nWHERE v.id_loja = ${id}\n  AND v.data >= '${ini}'\n  AND v.data < '${fim}'\nGROUP BY v.id_loja, DATE_TRUNC('month', v.data), ...\nORDER BY mes;`}function copySql(){navigator.clipboard.writeText(sqlBox.textContent).then(()=>alert('SQL copiado.'))}
function sumBy(rows,keyFn,seedFn,addFn){let out={};rows.forEach(r=>{let k=keyFn(r);if(!out[k])out[k]=seedFn(r,k);addFn(out[k],r)});return Object.values(out)}
function selectedCampaignName(){return fCamp.value!='Todas'?fCamp.value:(decisionCampaigns()[0]?.descricao||'')}
function decisionCampaigns(){let cs=campanhas(),t=total(),rows=sumBy(cs,r=>r.descricao,(r,k)=>({descricao:k,venda:0,lucro:0,cupons:0,quantidade:0,produtos:0,itens:0,meses:new Set()}),(a,r)=>{a.venda+=r.venda;a.lucro+=r.lucro;a.cupons+=+r.cupons||0;a.quantidade+=+r.quantidade||0;a.produtos+=+r.produtos_distintos||0;a.itens+=+r.itens||0;a.meses.add(r.mes)});rows.forEach(r=>{r.margem=r.venda?r.lucro/r.venda*100:0;r.participacao=t.vt?r.venda/t.vt*100:0;r.penetracao=t.ct?r.cupons/t.ct*100:0});let max={part:Math.max(1,...rows.map(r=>r.participacao)),lucro:Math.max(1,...rows.map(r=>r.lucro)),pen:Math.max(1,...rows.map(r=>r.penetracao)),margem:Math.max(1,...rows.map(r=>Math.max(0,r.margem)))};rows.forEach(r=>{r.score=Math.round((Math.max(0,r.participacao)/max.part*30)+(Math.max(0,r.lucro)/max.lucro*25)+(Math.max(0,r.penetracao)/max.pen*25)+(Math.max(0,r.margem)/max.margem*20));r.classe=r.score>=90?'Excelente':r.score>=80?'Recomendada':r.score>=70?'Manter':r.score>=60?'Atencao':'Revisar';r.statusMargem=r.margem<5?'CRITICA':r.margem<10?'ATENCAO':'SAUDAVEL'});return rows.sort((a,b)=>b.score-a.score)}
function decTable(headers,rows){return`<div class="table"><table><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>${rows.join('')}</table></div>`}
function conclusion(text,tone='info'){return`<div class="alert ${tone}"><b>Conclusao:</b> ${text}</div>`}
function action(text){return`<div class="alert ok"><b>Proxima acao:</b> ${text}</div>`}
function marginPill(v){return v=='CRITICA'?'<span class="pill bad">CRITICA</span>':v=='ATENCAO'?'<span class="pill warn">ATENCAO</span>':'<span class="pill ok">SAUDAVEL</span>'}
function decisionDepartments(camp){let rows=scopeRows('departamentos').filter(r=>!camp||r.campanha==camp),totalVenda=rows.reduce((s,r)=>s+(+r.venda||0),0);let out=sumBy(rows,r=>r.descricao_departamento,(r,k)=>({departamento:k,venda:0,lucro:0,quantidade:0,produtos:0}),(a,r)=>{a.venda+=+r.venda||0;a.lucro+=+r.lucro||0;a.quantidade+=+r.quantidade||0;a.produtos+=+r.produtos||0});out.forEach(r=>{r.part=totalVenda?r.venda/totalVenda*100:0;r.margem=r.venda?r.lucro/r.venda*100:0});return out.sort((a,b)=>b.venda-a.venda)}
function decisionProducts(camp){let rows=scopeRows('produtos').filter(r=>!camp||r.campanha==camp);let out=sumBy(rows,r=>r.id_produto+'|'+r.descricao_produto,(r,k)=>({id_produto:r.id_produto,produto:r.descricao_produto,venda:0,lucro:0,quantidade:0}),(a,r)=>{a.venda+=+r.venda||0;a.lucro+=+r.lucro||0;a.quantidade+=+r.quantidade||0});out.forEach(r=>r.margem=r.venda?r.lucro/r.venda*100:0);return out.sort((a,b)=>b.venda-a.venda)}
function storeRank(){let lojas=(fRegiao.value=='Todas'?db.empresas:db.empresas.filter(e=>e.regiao==fRegiao.value));return lojas.map(e=>{let t=total(e.nome);return{loja:e.nome,regiao:e.regiao,...t}}).filter(r=>r.v||r.vt).sort((a,b)=>b.v-a.v)}
function regionRank(){let lojas=storeRank();let out=sumBy(lojas,r=>r.regiao,(r,k)=>({regiao:k,v:0,l:0,vt:0,ct:0,cup:0}),(a,r)=>{a.v+=r.v;a.l+=r.l;a.vt+=r.vt;a.ct+=r.ct;a.cup+=r.cup});out.forEach(r=>{r.part=r.vt?r.v/r.vt*100:0;r.margem=r.v?r.l/r.v*100:0;r.pen=r.ct?r.cup/r.ct*100:0});return out.sort((a,b)=>b.v-a.v)}
function produtoInsight(rows){let text=(rows.slice(0,20).map(r=>r.produto).join(' ')||'').toUpperCase();if(/FRANGO|CARNE|SUINO|LINGUICA|PEITO|FILE/.test(text))return'Proteinas aparecem entre os principais motores da campanha.';if(/ARROZ|FEIJAO|OLEO|LEITE|ACUCAR|CAFE/.test(text))return'Itens de abastecimento basico sustentam parte relevante do resultado.';return'Os produtos lideres concentram a maior parte da leitura comercial da campanha.'}
function decisionInsights(camps,depts,stores,regions){let top=camps[0]||{},profit=[...camps].sort((a,b)=>b.lucro-a.lucro)[0]||{},bad=[...camps].sort((a,b)=>a.margem-b.margem)[0]||{},dept=depts[0]||{},month=monthsBetween(fInicio.value,fFim.value).map(m=>({mes:m,venda:campanhas().filter(r=>r.mes==m).reduce((s,r)=>s+r.venda,0)})).sort((a,b)=>b.venda-a.venda)[0]||{};let out=[];if(top.descricao)out.push(`${top.descricao} foi responsavel por ${pct(total().v?top.venda/total().v*100:0)} da venda promocional.`);if(dept.departamento)out.push(`${dept.departamento} representa ${pct(dept.part)} do faturamento da campanha analisada.`);if(bad.descricao&&bad.margem<5)out.push(`${bad.descricao} gera trafego, mas apresenta margem critica de ${pct(bad.margem)}.`);if(profit.descricao)out.push(`${profit.descricao} lidera em lucro absoluto com ${brl(profit.lucro)}.`);if(month.mes)out.push(`${month.mes} foi o melhor mes promocional do periodo.`);if(stores[0])out.push(`${stores[0].loja} e a loja com maior venda promocional no filtro atual.`);if(regions[0])out.push(`${regions[0].regiao} lidera a analise regional em venda promocional.`);return out}
function decisao(){let camps=decisionCampaigns(),top=camps[0]||{},client=[...camps].sort((a,b)=>b.penetracao-a.penetracao)[0]||{},profit=[...camps].sort((a,b)=>b.lucro-a.lucro)[0]||{},margins=[...camps].sort((a,b)=>a.margem-b.margem),bad=margins[0]||{},camp=selectedCampaignName(),depts=decisionDepartments(camp),prods=decisionProducts(camp),stores=storeRank(),regions=regionRank(),insights=decisionInsights(camps,depts,stores,regions);let deptTop=depts[0]||{},bestStore=stores[0]||{},worstStore=stores[stores.length-1]||{};return `<div class="grid cards">${card('Campanha lider',top.descricao||'-',top.venda?brl(top.venda):'Sem dados')}${card('Maior alcance',client.descricao||'-',client.penetracao?pct(client.penetracao):'Sem dados')}${card('Maior lucro',profit.descricao||'-',profit.lucro?brl(profit.lucro):'Sem dados')}${card('Risco de margem',bad.descricao||'-',bad.margem?pct(bad.margem):'Sem dados')}${card('Campanha analisada',camp||'-','Departamentos e produtos')}</div><div class="panel mt"><h2>1. Qual campanha gera mais resultado?</h2>${decTable(['Campanha','Venda','Lucro','Margem','Participacao','Penetracao'],camps.map(r=>`<tr><td><b>${r.descricao}</b></td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(r.participacao)}</td><td>${pct(r.penetracao)}</td></tr>`))}${top.descricao?conclusion(`${top.descricao} foi a campanha mais relevante do periodo, representando ${pct(top.participacao)} das vendas da loja e gerando ${brl(top.lucro)} de lucro.`):conclusion('Importe campanhas para gerar a leitura.','warn')}</div><div class="grid two mt"><div class="panel"><h2>2. Qual campanha traz mais clientes?</h2>${decTable(['Campanha','Cupons','Penetracao'],[...camps].sort((a,b)=>b.penetracao-a.penetracao).map(r=>`<tr><td><b>${r.descricao}</b></td><td>${num(r.cupons)}</td><td>${pct(r.penetracao)}</td></tr>`))}${client.descricao?conclusion(`${client.descricao} impactou ${pct(client.penetracao)} dos clientes da loja, sendo a campanha de maior alcance.`):''}</div><div class="panel"><h2>3. Qual campanha gera mais lucro?</h2>${decTable(['Campanha','Lucro','Venda','Margem'],[...camps].sort((a,b)=>b.lucro-a.lucro).map(r=>`<tr><td><b>${r.descricao}</b></td><td>${brl(r.lucro)}</td><td>${brl(r.venda)}</td><td>${pct(r.margem)}</td></tr>`))}${profit.descricao?conclusion(`${profit.descricao} entrega o maior lucro absoluto: ${brl(profit.lucro)}.`):''}</div></div><div class="grid two mt"><div class="panel"><h2>4. Qual campanha destroi margem?</h2>${decTable(['Campanha','Margem','Venda','Status'],margins.map(r=>`<tr><td><b>${r.descricao}</b></td><td>${pct(r.margem)}</td><td>${brl(r.venda)}</td><td>${marginPill(r.statusMargem)}</td></tr>`))}${bad.descricao?conclusion(`${bad.descricao} apresenta ${bad.margem<5?'margem critica':'a menor margem'} de ${pct(bad.margem)}.`,bad.margem<5?'bad':'warn'):''}</div><div class="panel"><h2>5. Vale repetir a campanha?</h2>${decTable(['Campanha','Score','Classificacao','Proxima acao'],camps.map(r=>`<tr><td><b>${r.descricao}</b></td><td>${r.score}</td><td>${r.classe}</td><td>${r.score>=80?'Repetir e proteger verba':r.score>=60?'Manter com ajuste':'Revisar mecanica e margem'}</td></tr>`))}${top.descricao?action(`${top.descricao} deve receber prioridade de verba promocional enquanto mantiver margem e alcance.`):''}</div></div><div class="panel mt"><h2>6. O que sustenta a campanha?</h2>${decTable(['Departamento','Venda','Participacao','Lucro','Margem'],depts.map(r=>`<tr><td><b>${r.departamento}</b></td><td>${brl(r.venda)}</td><td>${pct(r.part)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td></tr>`))}${deptTop.departamento?conclusion(`${camp} e sustentada principalmente por ${deptTop.departamento}, com ${pct(deptTop.part)} da venda da campanha.`):conclusion('Importe departamentos para explicar o que sustenta a campanha.','warn')}</div><div class="panel mt"><h2>7. Produtos ancora</h2>${decTable(['Produto','Venda','Lucro','Quantidade','Margem'],prods.slice(0,20).map(r=>`<tr><td><b>${r.produto}</b></td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${num(r.quantidade)}</td><td>${pct(r.margem)}</td></tr>`))}${prods.length?conclusion(produtoInsight(prods)):conclusion('Importe produtos para identificar os itens ancora.','warn')}</div><div class="grid two mt"><div class="panel"><h2>8. Analise de lojas</h2>${decTable(['Loja','Venda prom.','Participacao','Lucro','Penetracao'],stores.map(r=>`<tr><td><b>${r.loja}</b></td><td>${brl(r.v)}</td><td>${pct(r.part)}</td><td>${brl(r.l)}</td><td>${pct(r.pen)}</td></tr>`))}${bestStore.loja?conclusion(`${bestStore.loja} e a melhor loja no filtro atual. ${worstStore.loja&&worstStore.loja!=bestStore.loja?worstStore.loja+' exige acompanhamento por estar na ultima posicao.':''}`):''}</div><div class="panel"><h2>9. Analise regional</h2>${decTable(['Regiao','Venda prom.','Lucro','Participacao','Penetracao'],regions.map(r=>`<tr><td><b>${r.regiao}</b></td><td>${brl(r.v)}</td><td>${brl(r.l)}</td><td>${pct(r.part)}</td><td>${pct(r.pen)}</td></tr>`))}${regions[0]?conclusion(`${regions[0].regiao} concentra o melhor desempenho regional no periodo.`):''}</div></div><div class="panel mt"><h2>10. Insights automaticos</h2>${insights.map(x=>`<div class="alert info">${x}</div>`).join('')||'<div class="alert warn">Importe os arquivos do periodo para gerar insights automaticos.</div>'}${action(top.score>=80?`Investir mais verba em ${top.descricao}, monitorando margem e ruptura dos produtos ancora.`:'Revisar mecanica promocional antes de ampliar verba.')}</div>`}
function empresas(){return`<div class="panel"><h2>Empresas</h2><div class="table"><table><tr><th>Codigo</th><th>ID VR</th><th>Nome</th><th>Regiao</th></tr>${db.empresas.map(e=>`<tr><td>${e.codigo}</td><td>${e.id_vr}</td><td>${e.nome}</td><td>${e.regiao}</td></tr>`).join('')}</table></div></div>`}function relatorio(){return auditoria()}function setupFilters(){let old=[fLoja.value,fRegiao.value,fCamp.value];fLoja.innerHTML='<option>Todas</option>'+db.empresas.map(e=>`<option>${e.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.empresas.map(e=>e.regiao))].map(r=>`<option>${r}</option>`).join('');fCamp.innerHTML='<option>Todas</option>'+[...new Set(db.campanhas.map(c=>c.descricao))].map(c=>`<option>${c}</option>`).join('');[fLoja.value,fRegiao.value,fCamp.value]=old;if(!fLoja.value)fLoja.value='Loja 01';if(!fRegiao.value)fRegiao.value='Todas';if(!fCamp.value)fCamp.value='Todas'}function go(p){page=p;render()}function render(){nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${l}</button>`).join('');let meta={decisao:['Centro de Decisao','Diagnostico, conclusao, recomendacao e proxima acao.'],dashboard:['Dashboard','Analise mensal ou acumulada do periodo.'],importacoes:['Importacoes','Importe arquivos com varias linhas de mes.'],auditoria:['Auditoria','Valide periodo importado.'],plano:['Plano de Coleta 27 Lojas','Controle aprovacao por periodo.'],modelos:['Modelos SQL','Consultas por periodo agrupadas mes a mes.'],empresas:['Empresas','Cadastro de lojas.'],consolidacao:['Consolidacao Final','Somente lojas aprovadas.'],relatorio:['Relatorio Executivo','Resumo de auditoria.']}[page];title.textContent=meta[0];sub.textContent=meta[1];view.innerHTML=({decisao,dashboard,importacoes,auditoria,plano,modelos,empresas,consolidacao,relatorio})[page]();if(page=='importacoes')showReq()}['fLoja','fRegiao','fInicio','fFim','fVisao','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));setupFilters();render();
</script></body></html>
