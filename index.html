<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIGNORDESTE ANALYTICS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root{--bg:#f0f2f5;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--panel:#fff;--brand:#0d9f5e;--brand-dark:#064e30;--brand-light:#ecfdf5;--gold:#f59e0b;--bad:#ef4444;--warn:#f97316;--ok:#10b981;--blue:#3b82f6;--purple:#8b5cf6;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* Sidebar */
aside{background:#111827;color:white;padding:0;display:flex;flex-direction:column}
.brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.brand-logo{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:18px;height:18px;fill:white}
.brand b{display:block;font-size:15px;font-weight:700;letter-spacing:.2px}
.brand span{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px}
nav{display:flex;flex-direction:column;gap:1px;padding:10px 8px;flex:1}
nav button{border:0;background:transparent;color:rgba(255,255,255,.55);text-align:left;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;transition:all .15s}
nav button:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
nav button.active{background:rgba(255,255,255,.1);color:white;font-weight:600}
nav button svg{width:16px;height:16px;opacity:.5;flex-shrink:0}
nav button.active svg{opacity:.9}
.nav-badge{margin-left:auto;background:var(--brand);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.3)}
.sidebar-footer .cloud-status{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.cloud-dot{width:6px;height:6px;border-radius:50%;background:#4b5563}
.cloud-dot.online{background:#34d399}

/* Main */
main{padding:20px 24px;min-width:0;overflow-y:auto;max-height:100vh}
header{display:flex;justify-content:space-between;gap:12px;margin-bottom:20px;align-items:center}
h1{font-size:20px;font-weight:700;margin:0;color:var(--ink)}
.sub{color:var(--muted);font-size:12px;margin-top:2px}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.toolbar{display:flex;gap:8px;align-items:center}
select,input[type="date"]{border:1px solid var(--line);background:white;border-radius:6px;padding:6px 8px;height:32px;font:inherit;font-size:12px;color:var(--ink)}
select:focus,input:focus{outline:none;border-color:var(--brand)}
textarea{border:1px solid var(--line);background:white;border-radius:6px;padding:8px;font:inherit;font-size:12px;resize:vertical}

/* Grid */
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}

/* KPI Cards */
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative}
.kpi .lb{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.kpi .vl{font-size:22px;font-weight:800;color:var(--ink);line-height:1.2}
.kpi .delta{font-size:11px;font-weight:600;margin-top:4px}
.kpi .delta.up{color:var(--ok)}
.kpi .delta.down{color:var(--bad)}
.kpi-accent{border-left:3px solid var(--brand)}
.range-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.range-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.range-card .lb{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.range-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;align-items:flex-start}
.range-row+.range-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.range-row span{color:var(--muted);font-weight:700}
.range-row b{color:var(--ink);font-weight:800;text-align:right}

/* Panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.panel-title{font-size:14px;font-weight:700;margin:0 0 4px;color:var(--ink)}
.panel-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-header .panel-title{margin:0}
.metric-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:flex-end}
.metric-controls label{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#475569;border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:#fff;cursor:pointer;white-space:nowrap}
.metric-controls input{accent-color:var(--green)}

/* Charts - BI SIZED */
.chart-xl{position:relative;width:100%;height:380px}
.chart-full{position:relative;width:100%;height:calc(100vh - 190px);min-height:520px}
.chart-lg{position:relative;width:100%;height:300px}
.chart-md{position:relative;width:100%;height:240px}
.chart-sm{position:relative;width:100%;height:180px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:100;display:flex;align-items:stretch;justify-content:center;padding:28px}
.modal-card{background:#fff;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.35);width:min(1500px,100%);display:flex;flex-direction:column;padding:18px}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:10px}
.modal-head h3{margin:0;font-size:18px}
.modal-head .sub{font-size:12px;color:var(--muted);margin-top:2px}

/* Tables */
.table-wrap{overflow:auto;max-height:500px;border:1px solid var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left}
th{background:#f9fafb;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.4px;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--ink)}
th .sa{font-size:9px;margin-left:2px;opacity:.3}
th.sorted .sa{opacity:1;color:var(--brand)}
tbody tr:nth-child(even){background:#f9fafb}
tbody tr:hover{background:#f0fdf4}
td b{font-weight:600}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap}
.p-ok{background:#dcfce7;color:#166534}
.p-warn{background:#fef3c7;color:#92400e}
.p-bad{background:#fee2e2;color:#991b1b}
.p-info{background:#dbeafe;color:#1e40af}
.p-muted{background:#f3f4f6;color:#6b7280}

/* Buttons */
.btn{border:1px solid var(--line);background:white;border-radius:6px;padding:5px 10px;font-weight:600;cursor:pointer;font-size:11px;transition:all .12s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:#9ca3af;background:#f9fafb}
.btn svg{width:12px;height:12px}
.primary{background:var(--brand);border-color:var(--brand);color:white}
.primary:hover{background:#0b8a50}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Hero */
.hero{background:linear-gradient(135deg,#111827 0%,#1e3a2f 50%,#0d3d28 100%);color:white;border-radius:var(--radius);padding:24px;margin-bottom:16px}
.hero h2{margin:0 0 4px;font-size:18px;font-weight:700}
.hero .sub{color:rgba(255,255,255,.6);font-size:12px}
.hero-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
.hero-kpi{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px}
.hero-kpi .lb{color:rgba(255,255,255,.5);font-size:10px;font-weight:600;letter-spacing:.3px}
.hero-kpi .vl{font-size:18px;font-weight:800;margin-top:4px}
.hero-kpi .sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:2px}

/* Import */
.drop{border:2px dashed #d1d5db;border-radius:var(--radius);background:#fafbfc;padding:20px;display:grid;gap:12px}
.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.preview,pre.sql{white-space:pre;overflow:auto;max-height:360px;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono','Fira Code',monospace;line-height:1.6}

/* Utilities */
.mt{margin-top:16px}
.mt2{margin-top:24px}
.muted{color:var(--muted)}
.alert{border-left:3px solid var(--blue);background:white;border:1px solid var(--line);border-left-width:3px;border-radius:8px;padding:12px;margin:8px 0;font-size:12px;border-radius:0}
.alert.a-bad{border-left-color:var(--bad)}
.alert.a-warn{border-left-color:var(--warn)}
.alert.a-ok{border-left-color:var(--ok)}
.alert b{font-weight:700}

/* Decision cards */
.dcard{border:1px solid var(--line);border-radius:var(--radius);background:#fff;padding:14px;margin-bottom:10px}
.dcard .topline{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.dcard h4{font-size:13px;font-weight:700;margin:0}
.dcard .desc{font-size:11px;color:var(--muted);margin-top:2px}
.bar6{height:5px;background:#f3f4f6;border-radius:99px;overflow:hidden;margin:8px 0}
.bar6 span{display:block;height:100%;border-radius:99px}
.metrics5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.mbox{background:#f9fafb;border-radius:6px;padding:6px 8px;font-size:11px}
.mbox .lb{font-size:9px;color:var(--muted);font-weight:600}
.mbox b{display:block;font-size:13px;margin-top:1px}
.verdict{font-size:12px;font-weight:700;margin-top:8px;color:var(--brand-dark)}

/* Risk */
.risk-grid{display:grid;gap:6px}
.risk{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px}
.risk .rl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:80px}

/* Actions */
.action-list{counter-reset:act;display:grid;gap:6px}
.action-step{border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:0 8px 8px 0;background:#fff;padding:10px 12px;font-size:12px}
.action-step:before{counter-increment:act;content:counter(act);display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%;background:var(--brand-light);color:var(--brand);font-weight:800;font-size:11px;margin-right:8px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:white;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Fade */
#view{transition:opacity .15s ease}
#view.fade{opacity:0}

/* Print */
@media print{
  aside,.filters,.btn,nav,header .filters{display:none!important}
  .app{display:block!important}
  main{padding:10px!important;max-height:none!important;overflow:visible!important}
  .hero{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .kpi,.panel{box-shadow:none!important;break-inside:avoid}
  .print-header{display:block!important}
  body{font-size:10px}
}
.print-header{display:none}

/* Responsive */
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  aside{display:block;position:sticky;top:0;z-index:20}
  aside .brand,.sidebar-footer{display:none}
  nav{flex-direction:row;overflow:auto;padding:8px;background:#111827}
  nav button{white-space:nowrap;flex:0 0 auto}
  header{flex-direction:column;align-items:stretch}
  .kpis,.g2,.g3,.g4,.row,.hero-kpis,.metrics5{grid-template-columns:1fr}
  .filters{justify-content:flex-start}
}
</style>
</head>
<body>
<div class="print-header"><h1>BIGNORDESTE ANALYTICS</h1><p id="printDate"></p></div>
<div class="toast" id="toast"></div>
<div class="app">
<aside>
  <div class="brand"><div class="brand-logo"><div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></div><div><b>BIGNORDESTE</b><span>analytics</span></div></div></div>
  <nav id="nav"></nav>
  <div class="sidebar-footer"><div class="cloud-status"><span class="cloud-dot" id="cloudDot"></span> <span id="cloudLabel">Offline</span></div><div>v2.0</div></div>
</aside>
<main>
  <header>
    <div><h1 id="title"></h1><div id="sub" class="sub"></div></div>
    <div class="filters">
      <select id="fLoja"></select>
      <select id="fRegiao"></select>
      <input id="fInicio" type="date" value="2026-01-01">
      <input id="fFim" type="date" value="2026-07-01">
      <select id="fVisao"><option value="acumulado">Acumulado</option><option value="mensal">Mensal</option></select>
      <select id="fCamp"></select>
    </div>
  </header>
  <section id="view"></section>
</main>
</div>
<script>
/* ===== CHART PALETTE ===== */
const PAL={green:'#0d9f5e',greenLight:'rgba(13,159,94,.12)',gold:'#f59e0b',goldLight:'rgba(245,158,11,.12)',blue:'#3b82f6',blueLight:'rgba(59,130,246,.12)',red:'#ef4444',redLight:'rgba(239,68,68,.12)',purple:'#8b5cf6',purpleLight:'rgba(139,92,246,.12)',teal:'#14b8a6',gray:'#6b7280',dark:'#111827'};
const COLORS=[PAL.green,PAL.gold,PAL.blue,PAL.red,PAL.purple,PAL.teal];
const BG_COLORS=[PAL.greenLight,PAL.goldLight,PAL.blueLight,PAL.redLight,PAL.purpleLight,'rgba(20,184,166,.12)'];
const SOLID_COLORS=['#059669','#d97706','#2563eb','#dc2626','#7c3aed','#0d9488'];

/* ===== FORMATTERS ===== */
const money=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}),nf=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:1}),STORE_KEY='bignordeste.analytics.periodo.v1',MONTH_METRICS_KEY='bignordeste.analytics.monthMetrics.v1';
const brl=v=>money.format(+v||0),num=v=>nf.format(+v||0),pct=v=>num(v)+'%';
function brlShort(v){v=+v||0;if(Math.abs(v)>=1e6)return'R$ '+num(v/1e6)+'M';if(Math.abs(v)>=1e3)return'R$ '+num(v/1e3)+'K';return brl(v)}
function readMonthMetrics(){try{return JSON.parse(localStorage.getItem(MONTH_METRICS_KEY)||'null')||['vt','venda','lucro','margem','pen','produtos']}catch(e){return['vt','venda','lucro','margem','pen','produtos']}}
let monthMetrics=readMonthMetrics();
function toggleMonthMetric(k){monthMetrics=monthMetrics.includes(k)?monthMetrics.filter(x=>x!=k):[...monthMetrics,k];if(!monthMetrics.length)monthMetrics=['venda'];try{localStorage.setItem(MONTH_METRICS_KEY,JSON.stringify(monthMetrics))}catch(e){}render()}
function monthMetricControls(){let opts=[['vt','Venda total'],['venda','Venda prom.'],['lucro','Lucro'],['margem','Margem'],['pen','Penetracao'],['produtos','Prod. distintos']];return opts.map(([k,l])=>`<label><input type="checkbox" ${monthMetrics.includes(k)?'checked':''} onchange="toggleMonthMetric('${k}')">${l}</label>`).join('')}

/* ===== ICONS ===== */
const ICONS={decisao:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',dashboard:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>',importacoes:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>',auditoria:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>',plano:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>',modelos:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>',empresas:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>',consolidacao:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>',relatorio:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',exp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'};

/* ===== CHART ENGINE ===== */
let activeCharts={};
function destroyCharts(){Object.values(activeCharts).forEach(c=>{try{c.destroy()}catch(e){}});activeCharts={}}
Chart.register(ChartDataLabels);
Chart.defaults.font.family='Inter,system-ui,sans-serif';
Chart.defaults.font.size=11;
Chart.defaults.color='#6b7280';
Chart.defaults.plugins.datalabels={display:false};

function mkChart(id,type,labels,datasets,opts={}){
  setTimeout(()=>{
    let el=document.getElementById(id);if(!el)return;
    if(activeCharts[id])try{activeCharts[id].destroy()}catch(e){}
    let base={responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:'easeOutQuart'},interaction:{mode:'index',intersect:false},plugins:{legend:{display:labels.length<=8,position:'bottom',labels:{boxWidth:10,padding:14,font:{size:11,weight:'500'},usePointStyle:true}},tooltip:{backgroundColor:'#111827',titleFont:{size:12,weight:'600'},bodyFont:{size:11},padding:12,cornerRadius:8,displayColors:true,boxWidth:8,callbacks:{}},datalabels:{display:false}},scales:{}};
    if(type==='doughnut'||type==='pie'||type==='radar'||type==='polarArea'){delete base.scales;if(type==='doughnut'||type==='pie'){base.cutout=type==='doughnut'?'65%':0;base.plugins.datalabels={display:true,color:'#fff',font:{weight:'700',size:12},formatter:(v,ctx)=>{let sum=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);return sum?Math.round(v/sum*100)+'%':''}}}if(type==='radar'){base.scales={r:{beginAtZero:true,max:100,ticks:{display:false,stepSize:25},grid:{color:'#e5e7eb'},pointLabels:{font:{size:11,weight:'600'}}}}}}
    else{base.scales={x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45}},y:{grid:{color:'#f3f4f6'},ticks:{font:{size:10}},beginAtZero:true}}}
    let cfg={type,data:{labels,datasets},options:{...base,...opts}};
    if(opts.scales)cfg.options.scales={...base.scales,...opts.scales};
    if(opts.plugins)cfg.options.plugins={...base.plugins,...opts.plugins};

/* ===== DECISAO ===== */
function decisao(){
  let t=total(),camps=campRows(),top=camps[0]||{},bad=[...camps].sort((a,b)=>a.margem-b.margem)[0]||{},profit=[...camps].sort((a,b)=>b.lucro-a.lucro)[0]||{},client=[...camps].sort((a,b)=>b.penetracao-a.penetracao)[0]||{},bl=blocoRows(),fair=dailyFairSummary(),strongReal=[...fair].sort((a,b)=>(b.partPeriodo-b.partMes)-(a.partPeriodo-a.partMes))[0]||{},camp=fCamp.value!='Todos os blocos'?fCamp.value:(bl.find(b=>b.venda)?.bloco||''),depts=deptRows(camp),prods=prodRows(camp),stores=storeRank(),regions=regionRank();
  let html=`<div class="hero"><h2>Centro de Decisao Comercial</h2><div class="sub">Diagnostico, priorizacao e plano de acao para campanhas promocionais</div><div class="hero-kpis"><div class="hero-kpi"><div class="lb">Diagnostico</div><div class="vl" style="font-size:14px">${top.descricao?'Defender '+top.descricao.substring(0,20):'Importe dados'}</div></div><div class="hero-kpi"><div class="lb">Oferta pesa</div><div class="vl">${pct(t.part)}</div><div class="sub">da venda total</div></div><div class="hero-kpi"><div class="lb">Melhor campanha</div><div class="vl" style="font-size:14px">${top.descricao||'-'}</div><div class="sub">score ${top.score||0}</div></div><div class="hero-kpi"><div class="lb">Risco</div><div class="vl" style="font-size:14px">${bad.descricao||'-'}</div><div class="sub">margem ${pct(bad.margem||0)}</div></div></div></div>`;
  if(fair.length)html+=`<div class="panel mt"><div class="panel-title">Diagnostico por periodo real</div><div class="panel-sub">Corrige a distorcao de comparar campanhas curtas contra o mes inteiro</div><div class="action-list mt"><div class="action-step">${strongReal.bloco} tem ${pct(strongReal.partMes||0)} de participacao no mes, mas chega a ${pct(strongReal.partPeriodo||0)} nos dias em que ocorreu.</div><div class="action-step">Maior venda por dia: ${(fair[0]||{}).bloco||'-'} com ${brlShort((fair[0]||{}).vendaDia||0)} por dia ativo.</div></div></div>`;
  // Charts: Radar + Scatter
  html+=`<div class="grid g2">${camps.length>=2?`<div class="panel"><div class="panel-title">Radar comparativo</div><div class="panel-sub">5 dimensoes normalizadas por campanha</div><div class="chart-xl"><canvas id="cRadar"></canvas></div></div>`:''}<div class="panel"><div class="panel-title">Quadrante margem x score</div><div class="panel-sub">Tamanho = participacao na venda</div><div class="chart-xl"><canvas id="cBubble"></canvas></div></div></div>`;
  // Blocos
  html+=`<div class="panel mt"><div class="panel-header"><div><div class="panel-title">Blocos comerciais: venda, lucro e margem</div><div class="panel-sub">Comparativo Dia Big vs Encarte vs Demais</div></div>${csvBtn('CSV',"exportBlocos()")}</div><div class="chart-lg"><canvas id="cBlocoD"></canvas></div></div>`;
  // Campaign decision cards
  html+=`<div class="panel mt"><div class="panel-title">Decisao por campanha</div><div class="panel-sub">Score 0-100 baseado em venda, lucro, penetracao e margem</div><div class="grid g2 mt">${camps.map((r,i)=>{let mx=Math.max(1,...camps.map(c=>c.venda));return`<div class="dcard"><div class="topline"><div><h4>${r.descricao}</h4><div class="desc">${r.classe} | ${r.statusM}</div></div><span class="pill ${r.statusM=='CRITICA'?'p-bad':r.statusM=='ATENCAO'?'p-warn':'p-ok'}">${pct(r.margem)}</span></div><div class="bar6"><span style="width:${Math.max(3,r.venda/mx*100)}%;background:${COLORS[i%6]}"></span></div><div class="metrics5"><div class="mbox"><div class="lb">Venda</div><b>${brlShort(r.venda)}</b></div><div class="mbox"><div class="lb">Lucro</div><b>${brlShort(r.lucro)}</b></div><div class="mbox"><div class="lb">Margem</div><b>${pct(r.margem)}</b></div><div class="mbox"><div class="lb">Pen.</div><b>${pct(r.penetracao)}</b></div><div class="mbox"><div class="lb">Score</div><b>${r.score}</b></div></div><div class="verdict">${r.score>=80?'Repetir e ampliar':r.score>=65?'Manter com ajuste':r.margem<5?'Rever custo e sortimento':'Revisar mecanica'}</div></div>`}).join('')}</div></div>`;
  // Departments + Products
  html+=`<div class="grid g2 mt"><div class="panel"><div class="panel-header"><div><div class="panel-title">Departamentos</div><div class="panel-sub">${camp||'Todos os blocos'}</div></div>${csvBtn('CSV',"exportDepts()")}</div><div class="chart-lg"><canvas id="cDeptD"></canvas></div></div><div class="panel"><div class="panel-header"><div><div class="panel-title">Top produtos</div></div>${csvBtn('CSV',"exportProds()")}</div>${sortableTable('tProd',['Produto','Venda','Lucro','Margem'],prods.slice(0,10).map(r=>[r.produto,brl(r.venda),brl(r.lucro),pct(r.margem)]),['text','num','num','num'])}</div></div>`;
  // Stores + Regions
  html+=`<div class="grid g2 mt"><div class="panel"><div class="panel-header"><div><div class="panel-title">Ranking de lojas</div></div>${csvBtn('CSV',"exportStores()")}</div><div class="chart-lg"><canvas id="cStores"></canvas></div></div><div class="panel"><div class="panel-header"><div><div class="panel-title">Desempenho regional</div></div></div><div class="chart-lg"><canvas id="cRegion"></canvas></div></div></div>`;
  // Action plan

  steps.push('Comparar lojas aprovadas para replicar mecanica onde margem e penetracao forem maiores.');

  // Render charts
  setTimeout(()=>{
    // Radar
    if(camps.length>=2){let mx={v:Math.max(1,...camps.map(c=>c.venda)),l:Math.max(1,...camps.map(c=>Math.abs(c.lucro))),p:Math.max(1,...camps.map(c=>c.penetracao))};mkChart('cRadar','radar',['Venda','Lucro','Margem','Penetracao','Score'],camps.slice(0,5).map((c,i)=>({label:c.descricao.substring(0,18),data:[c.venda/mx.v*100,Math.max(0,c.lucro)/mx.l*100,Math.min(100,c.margem*3),c.penetracao/mx.p*100,c.score],borderColor:COLORS[i],backgroundColor:COLORS[i]+'20',borderWidth:2,pointRadius:4,pointBackgroundColor:COLORS[i]})))}
    // Bubble
    if(camps.length>=2)mkChart('cBubble','bubble',[],[{data:camps.map((c,i)=>({x:c.margem,y:c.score,r:Math.max(8,c.participacao*2)})),backgroundColor:camps.map((_,i)=>COLORS[i%6]+'80'),borderColor:camps.map((_,i)=>COLORS[i%6]),borderWidth:2}],{plugins:{tooltip:{callbacks:{label:ctx=>{let c=camps[ctx.dataIndex];return c.descricao+' | M: '+pct(c.margem)+' | S: '+c.score}}},datalabels:{display:true,color:PAL.dark,font:{size:10,weight:'700'},formatter:(v,ctx)=>camps[ctx.dataIndex]?.descricao?.substring(0,10)||''}},scales:{x:{title:{display:true,text:'Margem %'},ticks:{callback:v=>v+'%'}},y:{title:{display:true,text:'Score'},max:100}}});
    // Blocos grouped bar
    if(bl.some(r=>r.venda)){let bLabels=['Venda','Lucro','Margem %'];mkChart('cBlocoD','bar',bl.map(r=>r.bloco),[{label:'Venda',data:bl.map(r=>r.venda),backgroundColor:[PAL.green,PAL.red,PAL.blue],borderRadius:6,barPercentage:.5},{label:'Lucro',data:bl.map(r=>r.lucro),backgroundColor:[PAL.green+'88',PAL.red+'88',PAL.blue+'88'],borderRadius:6,barPercentage:.5}],{plugins:{datalabels:{display:true,anchor:'end',align:'top',font:{size:11,weight:'700'},color:PAL.dark,formatter:v=>brlShort(v)},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+brl(ctx.raw)}}},scales:{y:{ticks:{callback:v=>brlShort(v)}}}})}
    // Departments horizontal
    let d=deptRows(camp);if(d.length)mkChart('cDeptD','bar',d.slice(0,8).map(x=>x.departamento.substring(0,15)),[{label:'Venda',data:d.slice(0,8).map(x=>x.venda),backgroundColor:COLORS.concat(COLORS),borderRadius:4}],{indexAxis:'y',plugins:{datalabels:{display:true,anchor:'end',align:'right',font:{size:10,weight:'600'},color:PAL.dark,formatter:(v,ctx)=>brlShort(v)+' ('+pct(d[ctx.dataIndex]?.part||0)+')'},tooltip:{callbacks:{label:ctx=>brl(ctx.raw)}}},scales:{x:{ticks:{callback:v=>brlShort(v)}}}});
    // Stores
    let st=storeRank().slice(0,15);if(st.length)mkChart('cStores','bar',st.map(s=>s.loja),[{label:'Venda prom.',data:st.map(s=>s.v),backgroundColor:PAL.green,borderRadius:4},{label:'Lucro',data:st.map(s=>s.l),backgroundColor:PAL.gold,borderRadius:4}],{indexAxis:'y',plugins:{datalabels:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+brl(ctx.raw)}}},scales:{x:{ticks:{callback:v=>brlShort(v)}}}});
    // Regions
    let rg=regionRank();if(rg.length)mkChart('cRegion','bar',rg.map(r=>r.regiao),[{label:'Venda',data:rg.map(r=>r.v),backgroundColor:PAL.green,borderRadius:6},{label:'Lucro',data:rg.map(r=>r.l),backgroundColor:PAL.gold,borderRadius:6}],{plugins:{datalabels:{display:true,anchor:'end',align:'top',font:{size:11,weight:'700'},color:PAL.dark,formatter:v=>brlShort(v)},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+brl(ctx.raw)}}},scales:{y:{ticks:{callback:v=>brlShort(v)}}}});
  },120);
  return html;
}

function periodoCampanha(){let rows=dailyOffers(),cycles=dailyCycles(),fair=dailyFairSummary(),best=fair[0]||{},diaLabel=fLoja.value=='Todas'||fRegiao.value!='Todas'?'loja-dia':'dia';let html=`<div class="grid kpis">${kpi('Dias com campanha',[...new Set(rows.map(r=>r.data))].length,'dias calendario',true)}${kpi('Venda no periodo real',best.bloco?brlShort(best.venda):'-',best.bloco||'sem diarios')}${kpi('Part. periodo real',best.bloco?pct(best.partPeriodo):'-','contra venda dos loja-dias')}${kpi('Venda por '+diaLabel,best.bloco?brlShort(best.vendaDia):'-','campanha/bloco')}</div>`;if(!rows.length)return html+`<div class="alert a-warn mt">Importe venda_diario.txt e venda_dia_campanha.txt para liberar a analise diaria.</div>`;html+=`<div class="panel mt"><div class="panel-header"><div><div class="panel-title">Comparativo justo</div><div class="panel-sub">Participacao mensal versus participacao nos periodos reais. Em visao consolidada, a base e loja-dia.</div></div>${csvBtn('CSV',"exportFair()")}</div>${sortableTable('tFair',['Bloco','Venda campanha','Venda total periodo','Part. mes','Part. periodo','Loja-dias','Venda/loja-dia','Lucro/loja-dia','Pen. periodo'],fair.map(r=>[r.bloco,brl(r.venda),brl(r.vendaTotalPeriodo),pct(r.partMes),pct(r.partPeriodo),r.diasAtivos,brl(r.vendaDia),brl(r.lucroDia),pct(r.penPeriodo)]),['text','num','num','num','num','num','num','num','num'])}</div>`;

function showReq(){if(window.req)req.innerHTML='Colunas: '+TYPES[it.value].cols.join(', ')}
function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}
function parseNum(v){if(v==null||String(v).trim()==='')return'';let s=String(v).trim();if(/^[-+]?\d{1,3}(\.\d{3})+,\d+$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');let n=Number(s);return Number.isFinite(n)?n:v}
function monthKey(v){let s=String(v??'').trim();if(!s)return'';let m=s.match(/^(\d{4})[-\/](\d{1,2})(?:[-\/]\d{1,2})?$/);if(m)return m[1]+'-'+m[2].padStart(2,'0');m=s.match(/^(\d{1,2})[-\/](\d{4})$/);if(m)return m[2]+'-'+m[1].padStart(2,'0');m=s.match(/^\d{1,2}[-\/](\d{1,2})[-\/](\d{4})$/);if(m)return m[2]+'-'+m[1].padStart(2,'0');return s.slice(0,7)}
function dateKey(v){let s=String(v??'').trim();if(!s)return'';let m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');return s.slice(0,10)}
function inDatePeriod(d,ini,fim){let x=dateKey(d);return x&&x>=ini&&x<fim}
async function readText(f){let b=await f.arrayBuffer(),t=new TextDecoder('utf-8').decode(b);if(t.includes('\uFFFD'))t=new TextDecoder('iso-8859-1').decode(b);return t.replace(/^\uFEFF/,'')}
function parseTxt(text){let lines=text.split(/\r?\n/).filter(x=>x.trim()),head=lines[0].split(';').map(norm);let rows=lines.slice(1).map(line=>{let cells=line.split(';');return Object.fromEntries(head.map((h,i)=>[h,parseNum(cells[i]??'')]))});return{head,rows,preview:lines.slice(0,8).join('\n')}}

async function processImport(){

    Object.values(grouped).forEach(g=>{let b=TYPES[g.tipo].bucket,cfg=TYPES[g.tipo];db[b]=db[b].filter(r=>!(r.loja==g.loja&&r.__tipo==g.tipo&&(cfg.diario?inDatePeriod(r.data,ini,fim):allowed.includes(monthKey(r.mes))))).concat(g.rows)});

function audit(loja=fLoja.value){if(loja=='Todas')loja='Loja 01';let months=monthsBetween(fInicio.value,fFim.value),key=periodKey(loja),mark=db.aprovacoes[key]||{},imps=db.importacoes.filter(i=>i.loja==loja&&i.periodo==fInicio.value+' a '+fFim.value),present={};ORDER.forEach(t=>present[t]=db[TYPES[t].bucket].some(r=>r.loja==loja&&months.includes(monthKey(r.mes))&&r.__tipo==t));let missing=ORDER.filter(t=>!present[t]),t=total(loja,false),ignored=imps.reduce((s,i)=>s+(+i.ignoradas||0),0),alerts=[];if(missing.length)alerts.push('Faltam: '+missing.map(t=>TYPES[t].label).join(', '));if(!t.vt)alerts.push('Resumo geral ausente.');if(ignored)alerts.push('Linhas ignoradas.');let st='Pendente';if(ORDER.length-missing.length>0)st=missing.length?'Parcial':'Auditado';if(alerts.length&&st!='Pendente')st='Com erro';if(mark.status=='Reaberto'&&st=='Auditado')st='Reaberto';if(mark.status=='Aprovado')st='Aprovado';return{loja,months,imps,present,missing,total:t,ignored,alerts,status:st,reaberto:mark.status=='Reaberto',last:imps[0]?.data||'',obs:mark.obs||imps[0]?.observacao||''}}

function modelos(){let loja=fLoja.value=='Todas'?'Loja 01':fLoja.value,tipo=(window.sqlTipo&&sqlTipo.value)||'resumo_geral_loja';return`<div class="panel"><div class="panel-title">Modelos SQL</div><div class="panel-sub">Consultas mensais de importacao e consultas diarias de apoio</div><div class="row mt"><select id="sqlTipo" onchange="render()">${SQL_ORDER.map(k=>`<option value="${k}" ${k==tipo?'selected':''}>${SQL_MODELS[k].label}</option>`).join('')}</select><button class="btn primary" onclick="copySql()">Copiar SQL</button></div><pre id="sqlBox" class="sql" style="margin-top:12px">${makeSql(tipo,empresa(loja),fInicio.value,fFim.value)}</pre></div>`}
function makeSql(tipo,e,ini,fim){let id=e.id_vr||1;if(tipo=='ofertas_dia_campanha')return`SELECT\n  v.id_loja AS loja,\n  v.data AS data,\n  i.id_tipooferta,\n  t.descricao AS campanha,\n  SUM(i.valortotal) AS venda_oferta,\n  SUM(i.customediocomimposto * i.quantidade) AS custo_oferta,\n  SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro_oferta,\n  ROUND((SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade)) / NULLIF(SUM(i.valortotal),0) * 100,2) AS margem_oferta,\n  SUM(i.quantidade) AS quantidade_oferta,\n  COUNT(DISTINCT v.id) AS cupons_oferta,\n  COUNT(DISTINCT i.id_produto) AS produtos_oferta\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE AND i.oferta=TRUE\nGROUP BY v.id_loja, v.data, i.id_tipooferta, t.descricao\nORDER BY v.data, venda_oferta DESC;`;if(tipo=='venda_diaria_loja')return`SELECT\n  v.id_loja AS loja,\n  v.data AS data,\n  SUM(i.valortotal) AS venda_total,\n  SUM(i.customediocomimposto * i.quantidade) AS custo_total,\n  SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade) AS lucro_total,\n  ROUND((SUM(i.valortotal) - SUM(i.customediocomimposto * i.quantidade)) / NULLIF(SUM(i.valortotal),0) * 100,2) AS margem_total,\n  COUNT(DISTINCT v.id) AS cupons_totais,\n  SUM(i.quantidade) AS unidades_totais\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda = v.id\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE\nGROUP BY v.id_loja, v.data\nORDER BY v.data;`;if(tipo=='cupons_totais')return`SELECT\n  v.id_loja AS loja,\n  TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n  ct.cupons_totais,\n  t.descricao AS campanha,\n  COUNT(DISTINCT v.id) AS cupons_campanha\nFROM pdv.vendaitem i\nINNER JOIN pdv.venda v ON v.id = i.id_venda\nINNER JOIN public.tipooferta t ON t.id = i.id_tipooferta\nINNER JOIN (\n  SELECT id_loja, DATE_TRUNC('month',data) AS mes_ref, COUNT(DISTINCT id) AS cupons_totais\n  FROM pdv.venda WHERE id_loja=${id} AND data>='${ini}' AND data<'${fim}' AND cancelado=FALSE\n  GROUP BY id_loja, DATE_TRUNC('month',data)\n) ct ON ct.id_loja=v.id_loja AND ct.mes_ref=DATE_TRUNC('month',v.data)\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE AND i.oferta=TRUE\nGROUP BY v.id_loja, DATE_TRUNC('month',v.data), ct.cupons_totais, t.descricao\nORDER BY mes, cupons_campanha DESC;`;if(tipo=='departamentos_campanha')return`SELECT\n  v.id_loja AS loja,\n  TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n  i.id_tipooferta, t.descricao AS campanha,\n  p.mercadologico1, m.descricao AS descricao_departamento,\n  COUNT(DISTINCT i.id_produto) AS produtos,\n  SUM(i.quantidade) AS quantidade,\n  SUM(i.valortotal) AS venda,\n  SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade) AS lucro,\n  ROUND((SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade))/NULLIF(SUM(i.valortotal),0)*100,2) AS margem\nFROM pdv.vendaitem i\nINNER JOIN pdv.venda v ON v.id=i.id_venda\nINNER JOIN public.tipooferta t ON t.id=i.id_tipooferta\nINNER JOIN public.produto p ON p.id=i.id_produto\nINNER JOIN public.mercadologico m ON m.mercadologico1=p.mercadologico1 AND m.nivel=1\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE AND i.oferta=TRUE\nGROUP BY v.id_loja, DATE_TRUNC('month',v.data), i.id_tipooferta, t.descricao, p.mercadologico1, m.descricao\nORDER BY mes, campanha, venda DESC;`;if(tipo=='produtos_campanha')return`SELECT\n  v.id_loja AS loja,\n  TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n  i.id_tipooferta, t.descricao AS campanha,\n  i.id_produto, p.descricaocompleta AS descricao_produto,\n  SUM(i.quantidade) AS quantidade,\n  SUM(i.valortotal) AS venda,\n  SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade) AS lucro,\n  ROUND((SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade))/NULLIF(SUM(i.valortotal),0)*100,2) AS margem\nFROM pdv.vendaitem i\nINNER JOIN pdv.venda v ON v.id=i.id_venda\nINNER JOIN public.tipooferta t ON t.id=i.id_tipooferta\nINNER JOIN public.produto p ON p.id=i.id_produto\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE AND i.oferta=TRUE\nGROUP BY v.id_loja, DATE_TRUNC('month',v.data), i.id_tipooferta, t.descricao, i.id_produto, p.descricaocompleta\nORDER BY mes, campanha, venda DESC;`;if(tipo=='campanhas_ofertas')return`SELECT\n  v.id_loja AS loja,\n  TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n  i.id_tipooferta, t.descricao,\n  SUM(i.valortotal) AS venda,\n  SUM(i.customediocomimposto*i.quantidade) AS custo,\n  SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade) AS lucro,\n  ROUND((SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade))/NULLIF(SUM(i.valortotal),0)*100,2) AS margem,\n  SUM(i.quantidade) AS quantidade,\n  COUNT(*) AS itens,\n  COUNT(DISTINCT i.id_produto) AS produtos_distintos,\n  COUNT(DISTINCT v.id) AS cupons,\n  ROUND(SUM(i.valortotal)/NULLIF(COUNT(DISTINCT v.id),0),2) AS ticket_medio,\n  ROUND(SUM(i.valortotal)/NULLIF(SUM(i.quantidade),0),2) AS preco_medio\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda=v.id\nINNER JOIN public.tipooferta t ON t.id=i.id_tipooferta\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE AND i.oferta=TRUE\nGROUP BY v.id_loja, DATE_TRUNC('month',v.data), i.id_tipooferta, t.descricao\nORDER BY mes, venda DESC;`;return`SELECT\n  v.id_loja AS loja,\n  TO_CHAR(DATE_TRUNC('month', v.data), 'YYYY-MM') AS mes,\n  SUM(i.valortotal) AS venda_total,\n  SUM(i.customediocomimposto*i.quantidade) AS custo_total,\n  SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade) AS lucro_total,\n  ROUND((SUM(i.valortotal)-SUM(i.customediocomimposto*i.quantidade))/NULLIF(SUM(i.valortotal),0)*100,2) AS margem_total,\n  COUNT(DISTINCT v.id) AS cupons_totais,\n  SUM(i.quantidade) AS unidades_totais,\n  COUNT(DISTINCT i.id_produto) AS produtos_distintos\nFROM pdv.venda v\nINNER JOIN pdv.vendaitem i ON i.id_venda=v.id\nWHERE v.id_loja=${id} AND v.data>='${ini}' AND v.data<'${fim}' AND v.cancelado=FALSE\nGROUP BY v.id_loja, DATE_TRUNC('month',v.data)\nORDER BY mes;`}
function copySql(){navigator.clipboard.writeText(sqlBox.textContent).then(()=>showToast('SQL copiado'))}

/* ===== EMPRESAS ===== */
function regioes(){return [...new Set(['Joao Pessoa','Campina Grande','Litoral','Brejo','Agreste','Natal','Sertao',...db.empresas.map(e=>e.regiao).filter(Boolean)])].sort()}
function empresas(){let rs=regioes();return`<div class="panel"><div class="panel-header"><div><div class="panel-title">Empresas</div><div class="panel-sub">Edite a regiao para consolidar lojas corretamente</div></div>${csvBtn('CSV',"exportEmpresas()")}</div><div class="table-wrap"><table><thead><tr><th>Codigo</th><th>ID VR</th><th>Nome</th><th>Regiao</th><th>Cidade</th><th>UF</th></tr></thead><tbody>${db.empresas.map(e=>`<tr><td>${e.codigo}</td><td>${e.id_vr}</td><td><b>${e.nome}</b></td><td><select onchange="updateRegion('${e.nome}',this.value)">${rs.map(r=>`<option value="${r}" ${r==e.regiao?'selected':''}>${r}</option>`).join('')}<option value="__nova__">Nova regiao...</option></select></td><td>${e.cidade||'-'}</td><td>${e.uf||'-'}</td></tr>`).join('')}</tbody></table></div></div>`}
function updateRegion(nome,val){let e=db.empresas.find(x=>x.nome==nome);if(!e)return;if(val=='__nova__'){val=(prompt('Nova regiao:',e.regiao||'')||e.regiao||'').trim()}if(!val)return;e.regiao=val;save();setupFilters();render()}
function exportEmpresas(){exportCSV('empresas.csv',['Codigo','ID VR','Nome','Regiao','Cidade','UF'],db.empresas.map(e=>[e.codigo,e.id_vr,e.nome,e.regiao,e.cidade||'',e.uf||'']))}

/* ===== RELATORIO ===== */
function relatorio(){return auditoria()}

/* ===== NAV ===== */
function setupFilters(){let o=[fLoja.value,fRegiao.value,fCamp.value];fLoja.innerHTML='<option>Todas</option>'+db.empresas.map(e=>`<option>${e.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.empresas.map(e=>e.regiao))].map(r=>`<option>${r}</option>`).join('');let blocos=['Todos os blocos','Encarte Big Nordeste','Dia Big','Demais Encartes'];fCamp.innerHTML=blocos.map(c=>`<option>${c}</option>`).join('');[fLoja.value,fRegiao.value,fCamp.value]=o;if(!fLoja.value)fLoja.value='Loja 01';if(!fRegiao.value)fRegiao.value='Todas';if(!blocos.includes(fCamp.value))fCamp.value='Todos os blocos'}
function go(p){if(SHARE_MODE&&!pages.some(([id])=>id==p))p='decisao';page=p;render()}
function render(){
  destroyCharts();
  if(!pages.some(([id])=>id==page))page=pages[0][0];
  let pd=document.getElementById('printDate');if(pd)pd.textContent=new Date().toLocaleString('pt-BR');
  let ap=db.empresas.filter(e=>audit(e.nome).status=='Aprovado').length;
  nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${ICONS[id]||''}${l}${id=='plano'?'<span class="nav-badge">'+ap+'/27</span>':''}</button>`).join('');
  let meta={decisao:['Centro de Decisao','Diagnostico e plano de acao'],dashboard:['Dashboard','Visao geral do periodo'],periodo:['Periodo de Campanha','Analise diaria e comparativo justo'],importacoes:['Importacoes','Importar arquivos .txt'],auditoria:['Auditoria','Validar periodo'],plano:['Plano de Coleta','Controle 27 lojas'],modelos:['Modelos SQL','Consultas VR'],empresas:['Empresas','Cadastro'],consolidacao:['Consolidacao','Lojas aprovadas'],relatorio:['Relatorio','Resumo']}[page];
  title.textContent=meta[0];sub.textContent=meta[1];
  view.classList.add('fade');
  setTimeout(()=>{view.innerHTML=({decisao,dashboard,periodo:periodoCampanha,importacoes,auditoria,plano,modelos,empresas,consolidacao,relatorio})[page]();view.classList.remove('fade');if(page=='importacoes')showReq()},80);
}
['fLoja','fRegiao','fInicio','fFim','fVisao','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));
setupFilters();render();loadCloud();
