<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIGNORDESTE ANALYTICS</title>
<style>
:root{--bg:#f5f6f8;--ink:#20242a;--muted:#68707c;--line:#dfe3e8;--panel:#fff;--brand:#16603a;--gold:#d39b21;--bad:#b42318;--warn:#b76e00;--ok:#087443}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:255px 1fr;min-height:100vh}aside{background:#12201a;color:#fff;padding:18px 14px}.brand{padding:8px 10px 18px;border-bottom:1px solid #ffffff22}.brand b{display:block;font-size:18px}.brand span{font-size:12px;color:#b9c4be}nav{display:grid;gap:4px;margin-top:16px}nav button{border:0;background:transparent;color:#d7ded9;text-align:left;padding:11px 12px;border-radius:8px;cursor:pointer}nav button.active,nav button:hover{background:#ffffff1c;color:#fff}main{padding:22px;min-width:0}header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:18px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);font-size:14px}.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}select,input{border:1px solid var(--line);background:white;border-radius:7px;padding:9px 10px;min-height:38px}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(150px,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 10px 26px #20242a12}.card{padding:15px;min-height:92px}.label{font-size:12px;text-transform:uppercase;font-weight:800;color:var(--muted)}.value{font-size:24px;font-weight:850;margin-top:8px}.hint{font-size:12px;color:var(--muted);margin-top:5px}.panel{padding:16px;min-width:0}.panel h2{font-size:16px;margin:0 0 12px}.barrow{display:grid;grid-template-columns:minmax(150px,1fr) 90px;gap:10px;align-items:center;margin:10px 0;font-size:13px}.track{height:9px;background:#edf0f3;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--gold))}.table{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#fafbfc;color:var(--muted);font-size:11px;text-transform:uppercase;position:sticky;top:0}.pill{display:inline-flex;border-radius:99px;padding:4px 8px;font-size:12px;font-weight:800}.ok{background:#dcfae6;color:var(--ok)}.warn{background:#fef0c7;color:var(--warn)}.bad{background:#fee4e2;color:var(--bad)}.info{background:#dbeafe;color:#175cd3}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.btn{border:1px solid var(--line);background:white;border-radius:7px;padding:9px 12px;font-weight:800;cursor:pointer}.primary{background:var(--brand);border-color:var(--brand);color:white}.danger{background:var(--bad);border-color:var(--bad);color:white}.drop{border:1.5px dashed #a8b0b9;border-radius:8px;background:#fbfcfd;padding:18px;display:grid;gap:10px}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.preview{white-space:pre;overflow:auto;max-height:180px;background:#111827;color:#e5e7eb;padding:12px;border-radius:8px;font-size:12px}.mt{margin-top:14px}.muted{color:var(--muted)}.alert{border-left:4px solid #175cd3;background:white;border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:12px;margin:10px 0}.alert.bad{border-left-color:var(--bad);background:white;color:inherit}.alert.warn{border-left-color:var(--warn);background:white;color:inherit}@media(max-width:950px){.app{grid-template-columns:1fr}header{display:grid}.cards,.two,.three,.row{grid-template-columns:1fr}.filters{justify-content:flex-start}}
</style>
</head>
<body><div class="app"><aside><div class="brand"><b>BIGNORDESTE</b><span>ANALYTICS</span></div><nav id="nav"></nav></aside><main><header><div><h1 id="title"></h1><div id="sub" class="sub"></div></div><div class="filters"><select id="fLoja"></select><select id="fRegiao"></select><input id="fMes" type="month" value="2026-01"><select id="fCamp"></select></div></header><section id="view"></section></main></div>
<script>
const fmtBRL=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}),fmt=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:2});
const brl=v=>fmtBRL.format(+v||0), pct=v=>fmt.format(+v||0)+'%';
const types={resumo:['loja','mes','venda_total','custo_total','lucro_total','margem_total','cupons_totais','unidades_totais'],campanhas:['loja','mes','id_tipooferta','descricao','venda','custo','lucro','margem','quantidade','itens','produtos_distintos','cupons','ticket_medio','preco_medio'],produtos:['loja','mes','id_tipooferta','campanha','id_produto','descricao_produto','quantidade','venda','lucro','margem'],departamentos:['loja','mes','id_tipooferta','campanha','mercadologico1','descricao_departamento','produtos','quantidade','venda','lucro','margem'],cupons:['loja','mes','cupons_totais','campanha','cupons_campanha']};
function seed(){let lojas=Array.from({length:27},(_,i)=>({nome:'Loja '+String(i+1).padStart(2,'0'),codigo:String(i+1).padStart(2,'0'),regiao:['Natal','Agreste','Sertao','Litoral'][i%4],cidade:['Natal','Parnamirim','Mossoro','Caico'][i%4],uf:'RN',status:'Ativa'}));let campanhas=['ENCARTE BIG NORDESTE','FDS DE OFERTAS','DIA BIG','SEMANA DE OFERTAS'].map((c,i)=>({id_tipooferta:String(101+i),descricao:c,categoria:['Encarte','Fim de semana','Dia especial','Semanal'][i],ativo:true}));let resumo=[{loja:'Loja 01',mes:'2026-01',venda_total:3042701.83,custo_total:2650820.21,lucro_total:391881.62,margem_total:12.88,cupons_totais:62761,unidades_totais:489300}];let base=[['101','ENCARTE BIG NORDESTE',299097.59,261096.59,38000.99,12.71,53375.052,690,515,10031,29.82,5.60],['102','FDS DE OFERTAS',227879.06,192757.28,35121.78,15.41,39124.8,490,348,8210,27.76,5.82],['103','DIA BIG',200699.76,196485.06,4214.70,2.10,42008.4,430,290,11880,16.89,4.78],['104','SEMANA DE OFERTAS',115847.15,96654.37,19192.78,16.57,18142.2,260,184,5138,22.55,6.39]];
let resultados=base.map(r=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:r[0],descricao:r[1],venda:r[2],custo:r[3],lucro:r[4],margem:r[5],quantidade:r[6],itens:r[7],produtos_distintos:r[8],cupons:r[9],ticket_medio:r[10],preco_medio:r[11]}));let departamentos=[['PERECIVEIS',157302.07,19000,11.9,180,28842],['MERCEARIA DOCE',55296.63,7800,14.1,92,8410],['MERCEARIA SECA',28305.68,4120,14.6,66,5122],['MERCEARIA SALGADA',25518.11,3650,14.3,58,4210],['LIMPEZA',15494.38,2850,18.4,47,2198],['PERFUMARIA',12717.82,2050,16.1,38,1493],['BEBIDAS',3262.89,-210,-6.4,34,950]].map((d,i)=>({loja:'Loja 01',mes:'2026-01',id_tipooferta:'101',campanha:'ENCARTE BIG NORDESTE',mercadologico1:String(i+1),descricao_departamento:d[0],venda:d[1],lucro:d[2],margem:d[3],produtos:d[4],quantidade:d[5]}));
let produtos=Array.from({length:36},(_,i)=>{let venda=[24800,21400,18600,15100,13800,12100,9900,8700,7200,6100][i]||Math.max(800,5400-i*120),m=i==4?-3.2:(i%7==0?5.4:8+i%9);return{loja:'Loja 01',mes:'2026-01',id_tipooferta:i<24?'101':'102',campanha:i<24?'ENCARTE BIG NORDESTE':'FDS DE OFERTAS',id_produto:'P'+(1000+i),descricao_produto:'Produto promocional '+String(i+1).padStart(2,'0'),quantidade:900-i*13,venda,lucro:venda*m/100,margem:m}});return{lojas,campanhas,resumo,resultados,departamentos,produtos,cupons:[],importacoes:[]}}
let db=JSON.parse(localStorage.getItem('bignordeste.analytics')||'null')||seed(),page='dashboard';function save(){localStorage.setItem('bignordeste.analytics',JSON.stringify(db))}
function filters(){return{loja:fLoja.value,regiao:fRegiao.value,mes:fMes.value,camp:fCamp.value}}
function rows(){let f=filters(),valid=new Set((f.regiao=='Todas'?db.lojas:db.lojas.filter(l=>l.regiao==f.regiao)).map(l=>l.nome));return db.resultados.filter(r=>(f.loja=='Todas'||r.loja==f.loja)&&valid.has(r.loja)&&(!f.mes||r.mes==f.mes)&&(f.camp=='Todas'||r.descricao==f.camp))}
function resumo(){let f=filters();return db.resumo.find(r=>(f.loja=='Todas'||r.loja==f.loja)&&r.mes==f.mes)||db.resumo[0]||{}}
function total(rs=rows()){let re=resumo(),v=rs.reduce((s,r)=>s+(+r.venda||0),0),l=rs.reduce((s,r)=>s+(+r.lucro||0),0),c=rs.reduce((s,r)=>s+(+r.cupons||0),0);return{vendaTotal:+re.venda_total||0,vendaProm:v,lucro:l,margem:v?l/v*100:0,part:(+re.venda_total)?v/re.venda_total*100:0,cuponsTotais:+re.cupons_totais||0,cupons:c,pen:(+re.cupons_totais)?c/re.cupons_totais*100:0}}
function enrich(r){let re=db.resumo.find(x=>x.loja==r.loja&&x.mes==r.mes)||{},part=re.venda_total?r.venda/re.venda_total*100:0,pen=re.cupons_totais?r.cupons/re.cupons_totais*100:0;return{...r,part,pen,lucroCupom:r.cupons?r.lucro/r.cupons:0,forca:part*pen,eficiencia:part*r.margem}}
function card(a,b,c){return `<div class="card"><div class="label">${a}</div><div class="value">${b}</div><div class="hint">${c}</div></div>`}
function cards(t){return `<div class="grid cards">${card('Venda total',brl(t.vendaTotal),'Base mensal')}${card('Venda promocional',brl(t.vendaProm),'Todas as ofertas')}${card('Participacao ofertas',pct(t.part),'Promocional / total')}${card('Lucro promocional',brl(t.lucro),'Resultado absoluto')}${card('Margem promocional',pct(t.margem),'Lucro / venda')}${card('Cupons totais',fmt.format(t.cuponsTotais),'Movimento da loja')}${card('Cupons impactados',fmt.format(t.cupons),'Soma das campanhas')}${card('Penetracao',pct(t.pen),'Cupons campanha / total')}</div>`}
function bars(title,rs,val,format=brl){let max=Math.max(1,...rs.map(val));return `<div class="panel"><h2>${title}</h2>${rs.map(r=>`<div class="barrow"><div><b>${r.descricao||r.campanha||r.descricao_departamento}</b><div class="track"><div class="fill" style="width:${Math.max(3,val(r)/max*100)}%"></div></div></div><div>${format(val(r))}</div></div>`).join('')}</div>`}
function campaignTable(rs){return `<div class="table"><table><thead><tr><th>Campanha</th><th>Venda</th><th>Part.</th><th>Lucro</th><th>Margem</th><th>Cupons</th><th>Penetracao</th><th>Produtos</th><th>Qtd.</th><th>Ticket</th><th>Preco</th><th>Lucro/Cupom</th><th>Forca</th><th>Eficiencia</th></tr></thead><tbody>${rs.map(enrich).map(r=>`<tr><td><b>${r.descricao}</b></td><td>${brl(r.venda)}</td><td>${pct(r.part)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${fmt.format(r.cupons)}</td><td>${pct(r.pen)}</td><td>${fmt.format(r.produtos_distintos)}</td><td>${fmt.format(r.quantidade)}</td><td>${brl(r.ticket_medio)}</td><td>${brl(r.preco_medio)}</td><td>${brl(r.lucroCupom)}</td><td>${fmt.format(r.forca)}</td><td>${fmt.format(r.eficiencia)}</td></tr>`).join('')}</tbody></table></div>`}
function dashboard(){let rs=rows().sort((a,b)=>b.venda-a.venda);return cards(total(rs))+`<div class="grid two mt">${bars('Ranking por venda',rs,r=>r.venda)}${bars('Ranking por lucro',[...rs].sort((a,b)=>b.lucro-a.lucro),r=>r.lucro)}${bars('Ranking por margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Ranking por penetracao',rs.map(enrich).sort((a,b)=>b.pen-a.pen),r=>r.pen,pct)}</div><div class="panel mt"><h2>Comparativo de campanhas</h2>${campaignTable(rs)}</div>`}
function importacoes(){let opts=Object.keys(types).map(k=>`<option value="${k}">${k}</option>`).join('');return `<div class="panel"><div class="toolbar"><h2>Importador TXT</h2><button class="btn" onclick="template()">Baixar modelo</button></div><div class="drop"><div class="row"><select id="it" onchange="req()">${opts}</select><select id="il">${db.lojas.map(l=>`<option>${l.nome}</option>`)}</select><input id="im" type="month" value="2026-01"><select id="ic"><option value="">Sem campanha</option>${db.campanhas.map(c=>`<option>${c.descricao}</option>`)}</select></div><input id="file" type="file" accept=".txt"><div id="req" class="muted"></div><pre id="prev" class="preview" style="display:none"></pre><div id="ir"></div><button class="btn primary" onclick="processImport()">Processar importacao</button></div></div><div class="panel mt"><h2>Historico de importacoes</h2>${history()}</div>`}
function history(){return db.importacoes.length?`<div class="table"><table><tr><th>Data</th><th>Loja</th><th>Mes</th><th>Tipo</th><th>Campanha</th><th>Arquivo</th><th>Linhas</th><th>Status</th></tr>${db.importacoes.map(i=>`<tr><td>${i.data}</td><td>${i.loja}</td><td>${i.mes}</td><td>${i.tipo}</td><td>${i.campanha||'-'}</td><td>${i.arquivo}</td><td>${i.linhas}</td><td><span class="pill ok">Processado</span></td></tr>`).join('')}</table></div>`:'<p class="muted">Nenhuma importacao executada ainda.</p>'}
function req(){if(window.req)req.innerHTML='<b>Colunas obrigatorias:</b> '+types[it.value].join('; ')}
function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}function n(v){if(v==null||String(v).trim()==='')return'';let x=Number(String(v).trim().replace(',','.'));return Number.isFinite(x)?x:v}
async function processImport(){let f=file.files[0];if(!f||!f.name.toLowerCase().endsWith('.txt')){ir.innerHTML='<span class="pill bad">Selecione um .txt</span>';return}let buf=await f.arrayBuffer(),text=new TextDecoder('utf-8').decode(buf);if(text.includes('\uFFFD'))text=new TextDecoder('iso-8859-1').decode(buf);let lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(Boolean),head=lines[0].split(';').map(norm),missing=types[it.value].filter(c=>!head.includes(c));prev.style.display='block';prev.textContent=lines.slice(0,8).join('\n');if(missing.length){ir.innerHTML='<span class="pill bad">Colunas ausentes: '+missing.join(', ')+'</span>';return}let parsed=lines.slice(1).map(l=>Object.fromEntries(head.map((h,i)=>[h,n((l.split(';')[i]??''))]))),loja=il.value,mes=im.value,camp=ic.value;if(db.importacoes.some(i=>i.loja==loja&&i.mes==mes&&i.tipo==it.value&&(i.campanha||'')==camp)&&!confirm('Ja existe importacao igual. Reprocessar e substituir?'))return;saveRows(it.value,parsed,loja,mes,camp);db.importacoes.unshift({data:new Date().toLocaleString('pt-BR'),loja,mes,tipo:it.value,campanha:camp,arquivo:f.name,linhas:parsed.length});save();ir.innerHTML='<span class="pill ok">'+parsed.length+' linhas processadas.</span>';setup();render()}
function saveRows(t,rs,loja,mes,camp){let a=rs.map(r=>({...r,loja:r.loja||loja,mes:r.mes||mes,campanha:r.campanha||camp}));if(t=='resumo')db.resumo=db.resumo.filter(r=>!(r.loja==loja&&r.mes==mes)).concat(a);if(t=='campanhas')db.resultados=db.resultados.filter(r=>!(r.loja==loja&&r.mes==mes&&(!camp||r.descricao==camp))).concat(a.map(r=>({...r,descricao:r.descricao||camp})));if(t=='produtos')db.produtos=db.produtos.concat(a);if(t=='departamentos')db.departamentos=db.departamentos.concat(a);if(t=='cupons')db.cupons=db.cupons.concat(a)}function template(){let c=types[it.value].join(';')+'\n',b=new Blob([c]);let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='modelo_'+it.value+'.txt';a.click()}
function lojas(){return `<div class="panel"><h2>Cadastro de lojas</h2><div class="table"><table><tr><th>Codigo</th><th>Nome</th><th>Regiao</th><th>Cidade</th><th>UF</th><th>Status</th></tr>${db.lojas.map(l=>`<tr><td>${l.codigo}</td><td><b>${l.nome}</b></td><td>${l.regiao}</td><td>${l.cidade}</td><td>${l.uf}</td><td><span class="pill ok">${l.status}</span></td></tr>`).join('')}</table></div></div>`}
function campanhasCad(){return `<div class="panel"><h2>Cadastro de campanhas</h2><div class="table"><table><tr><th>ID</th><th>Descricao</th><th>Categoria</th><th>Status</th></tr>${db.campanhas.map(c=>`<tr><td>${c.id_tipooferta}</td><td><b>${c.descricao}</b></td><td>${c.categoria}</td><td><span class="pill ok">Ativa</span></td></tr>`).join('')}</table></div></div>`}
function loja(){let rs=rows().sort((a,b)=>b.venda-a.venda),deps=db.departamentos.filter(d=>rs.some(r=>r.descricao==d.campanha));return cards(total(rs))+`<div class="grid two mt">${bars('Campanhas que mais vendem',rs,r=>r.venda)}${bars('Campanhas com maior margem',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}${bars('Campanhas com maior alcance',rs.map(enrich).sort((a,b)=>b.pen-a.pen),r=>r.pen,pct)}${bars('Departamentos que sustentam ofertas',deps.sort((a,b)=>b.venda-a.venda),r=>r.venda)}</div>`}
function regiao(){let rr=regionRows();return `<div class="grid two">${bars('Venda promocional por regiao',rr,r=>r.vendaProm)}${bars('Participacao das ofertas por regiao',rr,r=>r.part,pct)}</div>`}function regionRows(){let m={};db.lojas.forEach(l=>m[l.regiao]||={campanha:l.regiao,vendaProm:0,vendaTotal:0,lucro:0});db.resultados.forEach(r=>{let l=db.lojas.find(x=>x.nome==r.loja);if(l){m[l.regiao].vendaProm+=+r.venda||0;m[l.regiao].lucro+=+r.lucro||0}});db.resumo.forEach(r=>{let l=db.lojas.find(x=>x.nome==r.loja);if(l)m[l.regiao].vendaTotal+=+r.venda_total||0});return Object.values(m).map(r=>({...r,part:r.vendaTotal?r.vendaProm/r.vendaTotal*100:0,margem:r.vendaProm?r.lucro/r.vendaProm*100:0}))}
function departamentos(){let rs=db.departamentos.sort((a,b)=>b.venda-a.venda),tot=rs.reduce((s,r)=>s+(+r.venda||0),0);return `<div class="grid two">${bars('Venda por departamento',rs,r=>r.venda)}${bars('Margem por departamento',[...rs].sort((a,b)=>b.margem-a.margem),r=>r.margem,pct)}</div><div class="panel mt"><h2>Departamentos</h2><div class="table"><table><tr><th>Departamento</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Participacao</th></tr>${rs.map(r=>`<tr><td><b>${r.descricao_departamento}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${pct(tot?r.venda/tot*100:0)}</td></tr>`)}</table></div></div>`}
function produtos(){let rs=db.produtos.sort((a,b)=>b.venda-a.venda);return `<div class="grid three">${bars('Top venda',rs.slice(0,10),r=>r.venda)}${bars('Top lucro',[...rs].sort((a,b)=>b.lucro-a.lucro).slice(0,10),r=>r.lucro)}${bars('Top quantidade',[...rs].sort((a,b)=>b.quantidade-a.quantidade).slice(0,10),r=>r.quantidade,v=>fmt.format(v))}</div><div class="panel mt"><h2>Produtos criticos</h2><div class="table"><table><tr><th>Produto</th><th>Campanha</th><th>Venda</th><th>Lucro</th><th>Margem</th><th>Diagnostico</th></tr>${rs.map(r=>`<tr><td><b>${r.descricao_produto}</b></td><td>${r.campanha}</td><td>${brl(r.venda)}</td><td>${brl(r.lucro)}</td><td>${pct(r.margem)}</td><td>${r.margem<0?'<span class="pill bad">Margem negativa</span>':r.venda>10000&&r.margem<8?'<span class="pill warn">Alta venda e baixa margem</span>':'<span class="pill ok">Normal</span>'}</td></tr>`).join('')}</table></div></div>`}
function alerts(){let a=[];rows().map(enrich).forEach(r=>{if(r.venda>180000&&r.margem<8)a.push(['bad',`${r.descricao} tem alta venda (${brl(r.venda)}) e margem baixa (${pct(r.margem)}).`]);if(r.pen>12&&r.ticket_medio<20)a.push(['warn',`${r.descricao} tem alta penetracao (${pct(r.pen)}) e ticket baixo (${brl(r.ticket_medio)}).`]);if(r.part<4&&r.margem>15)a.push(['ok',`${r.descricao} tem boa margem, mas baixa participacao.`])});db.produtos.filter(p=>p.venda>10000&&p.margem<0).forEach(p=>a.push(['bad',`${p.descricao_produto} tem venda alta e margem negativa.`]));return a}
function relatorio(){let rs=rows().map(enrich).sort((a,b)=>b.venda-a.venda),top=rs[0],dep=db.departamentos.filter(d=>d.campanha==top?.descricao).sort((a,b)=>b.venda-a.venda)[0],txt=top?`O ${top.descricao} foi a campanha com maior venda, lucro absoluto e penetracao. Representou ${pct(top.part)} da venda total da loja, alcancou ${pct(top.pen)} dos cupons e teve margem de ${pct(top.margem)}. O resultado foi sustentado principalmente por ${dep?.descricao_departamento||'departamentos importados'}, que respondeu por ${pct(dep?dep.venda/top.venda*100:0)} da campanha.`:'Sem dados suficientes.';return `<div class="panel"><h2>Leitura automatica</h2><p style="font-size:18px;line-height:1.5">${txt}</p><button class="btn primary" onclick="exportReport()">Exportar relatorio JSON</button></div><div class="panel mt"><h2>Diagnostico automatico</h2>${alerts().map(x=>`<div class="alert ${x[0]}"><span class="pill ${x[0]}">${x[0]}</span><p>${x[1]}</p></div>`).join('')}</div>`}function exportReport(){let b=new Blob([JSON.stringify({totais:total(),diagnosticos:alerts()},null,2)]);let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='relatorio_bignordeste_analytics.json';a.click()}
const pages=[['dashboard','Dashboard'],['importacoes','Importacoes'],['lojas','Lojas'],['campanhasCad','Campanhas'],['loja','Analise por Loja'],['regiao','Analise por Regiao'],['departamentos','Departamentos'],['produtos','Produtos'],['relatorio','Relatorio Executivo']];function setup(){fLoja.innerHTML='<option>Todas</option>'+db.lojas.map(l=>`<option>${l.nome}</option>`).join('');fRegiao.innerHTML='<option>Todas</option>'+[...new Set(db.lojas.map(l=>l.regiao))].map(r=>`<option>${r}</option>`).join('');fCamp.innerHTML='<option>Todas</option>'+[...new Set(db.resultados.map(r=>r.descricao))].map(c=>`<option>${c}</option>`).join('');fLoja.value=fLoja.value||'Loja 01';fRegiao.value=fRegiao.value||'Todas';fCamp.value=fCamp.value||'Todas'}
function go(p){page=p;render()}function render(){nav.innerHTML=pages.map(([id,l])=>`<button class="${id==page?'active':''}" onclick="go('${id}')">${l}</button>`).join('');let meta={dashboard:['Dashboard Executivo','Desempenho geral da loja no mes.'],importacoes:['Importacoes','Upload, preview, validacao, historico e reprocessamento.'],lojas:['Lojas','Cadastro das 27 lojas e regioes.'],campanhasCad:['Campanhas','Tipos de oferta e campanhas cadastradas.'],loja:['Analise por Loja','Forca, margem, alcance e sustentacao por departamento.'],regiao:['Analise por Regiao','Comparativo entre lojas e regioes.'],departamentos:['Departamentos','Participacao, venda, lucro, margem e volume.'],produtos:['Produtos','Itens que carregam ou prejudicam campanhas.'],relatorio:['Relatorio Executivo','Conclusoes automaticas e exportacao.']}[page];title.textContent=meta[0];sub.textContent=meta[1];view.innerHTML=({dashboard,importacoes,lojas,campanhasCad,loja,regiao,departamentos,produtos,relatorio})[page]();if(page=='importacoes')req()}['fLoja','fRegiao','fMes','fCamp'].forEach(id=>document.getElementById(id).addEventListener('change',render));setup();render();
</script></body></html>
